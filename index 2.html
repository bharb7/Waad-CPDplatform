<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Waad Academy — School Improvement Platform</title>
<style>
:root{
  --navy:#1F4E79;--teal:#0F6E56;--amber:#7B4F0C;--red:#993C1D;
  --purple:#3C3489;--forest:#375C15;--bg:#f4f6fb;--white:#fff;
  --border:#e5e7eb;--text:#1a1a2e;--muted:#6b7280;--light:#f9fafb;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);min-height:100vh;font-size:14px}
input,select,textarea,button{font-family:inherit;font-size:13px}
button{cursor:pointer}
/* Layout */
.app{display:flex;min-height:100vh}
.sidebar{width:200px;background:var(--navy);min-height:100vh;flex-shrink:0;display:flex;flex-direction:column}
.sidebar-logo{padding:16px 14px 12px;border-bottom:1px solid rgba(255,255,255,.1)}
.sidebar-logo h1{color:#fff;font-size:15px;font-weight:700}
.sidebar-logo p{color:rgba(255,255,255,.5);font-size:10px;margin-top:2px}
.nav-item{display:flex;align-items:center;gap:8px;padding:9px 14px;color:rgba(255,255,255,.7);text-decoration:none;cursor:pointer;border:none;background:none;width:100%;text-align:left;font-size:12.5px;transition:background .15s}
.nav-item:hover{background:rgba(255,255,255,.08);color:#fff}
.nav-item.active{background:rgba(255,255,255,.15);color:#fff;font-weight:600}
.main{flex:1;overflow:auto}
.topbar{background:#fff;border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;justify-content:space-between}
.topbar h2{font-size:16px;font-weight:700;color:var(--text)}
.content{padding:20px;max-width:1200px}
/* Cards */
.card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:14px}
.card-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:10px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
/* KPI cards */
.kpi{background:#fff;border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center}
.kpi-val{font-size:28px;font-weight:800;color:var(--navy)}
.kpi-label{font-size:11px;color:var(--muted);margin-top:3px}
/* Buttons */
.btn{padding:6px 13px;border-radius:6px;border:none;font-weight:600;font-size:12px}
.btn-primary{background:var(--navy);color:#fff}
.btn-success{background:var(--teal);color:#fff}
.btn-danger{background:#fee2e2;color:var(--red);border:1px solid #fecaca}
.btn-ghost{background:var(--light);color:var(--text);border:1px solid var(--border)}
.btn-sm{padding:3px 8px;font-size:11px;border-radius:4px}
/* Form */
.form-group{margin-bottom:10px}
.form-label{font-size:11px;color:var(--muted);font-weight:600;display:block;margin-bottom:3px}
.form-control{width:100%;padding:7px 9px;border:1px solid var(--border);border-radius:6px;font-size:13px;background:#fafafa}
.form-control:focus{outline:2px solid var(--navy);border-color:var(--navy);background:#fff}
textarea.form-control{resize:vertical;min-height:60px}
/* Table */
table{width:100%;border-collapse:collapse;font-size:12.5px}
th{padding:7px 10px;text-align:left;font-size:11px;font-weight:600;color:var(--muted);background:var(--light);border-bottom:2px solid var(--border)}
td{padding:7px 10px;border-bottom:1px solid #f3f4f6}
tr:hover td{background:#fafafa}
/* Badges */
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600}
.badge-green{background:#d1fae5;color:#065f46}
.badge-amber{background:#fef3c7;color:#92400e}
.badge-red{background:#fee2e2;color:#991b1b}
.badge-blue{background:#dbeafe;color:#1e40af}
.badge-gray{background:#f3f4f6;color:#374151}
.badge-purple{background:#ede9fe;color:#5b21b6}
/* Progress bar */
.pbar{height:6px;background:#e5e7eb;border-radius:3px;overflow:hidden;margin-top:4px}
.pbar-fill{height:100%;border-radius:3px;transition:width .4s}
.pbar-navy{background:var(--navy)}
.pbar-teal{background:var(--teal)}
.pbar-amber{background:var(--amber)}
/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:#fff;border-radius:12px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:1}
.modal-header h3{font-size:14px;font-weight:700}
.modal-body{padding:16px}
.modal-footer{padding:12px 16px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
/* Login */
.login-wrap{min-height:100vh;background:var(--navy);display:flex;align-items:center;justify-content:center}
.login-box{background:#fff;border-radius:14px;padding:32px;width:340px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.login-logo{text-align:center;margin-bottom:20px}
.login-logo div:first-child{font-size:40px;margin-bottom:6px}
.login-logo h1{font-size:20px;font-weight:800;color:var(--navy)}
.login-logo p{font-size:12px;color:var(--muted);margin-top:2px}
/* Mech pill */
.mech-pill{display:inline-block;padding:2px 7px;border-radius:3px;font-size:10px;margin:2px;cursor:pointer}
.mech-on{background:var(--teal);color:#fff;font-weight:600}
.mech-off{background:#f3f4f6;color:#9ca3af}
/* Score dots */
.score-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin:0 1px}
/* Tabs */
.tabs{display:flex;gap:4px;margin-bottom:14px;flex-wrap:wrap}
.tab{padding:6px 14px;border-radius:6px;border:none;font-size:12px;font-weight:500;background:var(--light);color:var(--muted)}
.tab.active{background:var(--navy);color:#fff;font-weight:600}
/* Alerts */
.alert{padding:10px 14px;border-radius:8px;margin-bottom:12px;font-size:13px}
.alert-info{background:#dbeafe;color:#1e40af;border:1px solid #bfdbfe}
.alert-warn{background:#fef3c7;color:#92400e;border:1px solid #fde68a}
.alert-success{background:#d1fae5;color:#065f46;border:1px solid #a7f3d0}
/* Utility */
.flex{display:flex}.items-center{align-items:center}.justify-between{justify-content:space-between}
.gap-2{gap:8px}.gap-3{gap:12px}.mb-2{margin-bottom:8px}.mb-3{margin-bottom:12px}
.text-sm{font-size:12px}.text-xs{font-size:11px}.text-muted{color:var(--muted)}
.font-bold{font-weight:700}.font-semibold{font-weight:600}
.w-full{width:100%}.hidden{display:none}
.rtl{direction:auto}
@media(max-width:768px){.sidebar{width:56px}.sidebar-logo p,.nav-label{display:none}.grid-2,.grid-3,.grid-4{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="app"></div>
<script>

  {id:'sc2',category:'Individual - Leadership Training',program:'NPQSL',facilitator:'Best Practice Network',delivery:'Course',type:'External',duration:'18 months',startDate:'2026-09-01',endDate:'2028-03-31',month:'September',venue:'Online',target:'NPQSL Candidate',status:'active',cpdId:null},

  {id:'sc4',category:'Internal - SDP-Based Training',program:'Higher-order Questioning',facilitator:'Ahmad Al Moghrabi',delivery:'WLC',type:'Internal',duration:'60 min',startDate:'2027-04-09',endDate:'2027-04-09',month:'April',venue:'TBC',target:'All Depts',status:'planned',cpdId:null},
  {id:'sc5',category:'External - Learning Framework-Related Training',program:'Safeguarding & Child Protection',facilitator:'Child Safeguarding.com',delivery:'Online',type:'External',duration:'Half day',startDate:'2026-10-15',endDate:'2026-10-15',month:'October',venue:'Auditorium',target:'All Staff',status:'planned',cpdId:null},
  {id:'sc6',category:'Orientation PDs',program:'Staff Orientation & Induction',facilitator:'Senior Leadership',delivery:'Workshop',type:'Internal',duration:'2 days',startDate:'2026-08-25',endDate:'2026-08-26',month:'September',venue:'School',target:'All Staff',status:'done',cpdId:null},

let S = {

function uid(){return Math.random().toString(36).slice(2,10)+'_'+Date.now().toString(36)}

// ═══ LOAD / SAVE ═════════════════════════════════════════════════════════════
function loadAll(){
  S.teachers=sget('teachers')||SEED_TEACHERS;
  S.groups=sget('groups')||SEED_GROUPS;
  S.observations=sget('obs')||[];
  S.triplets=sget('trips')||[];
  S.lwalks=sget('lwalks')||[];
  S.cpd=sget('cpd')||[];

  S.dhM=sget('dhM')||{};
  S.branding=sget('branding')||{name:'Waad Academy',logos:[]};

  S.session=sget('session')||null;
}
function save(key,val){sset(key,val)}

// ═══ COMPUTED ════════════════════════════════════════════════════════════════
function avg(arr){const v=arr.filter(x=>x>0);return v.length?v.reduce((a,b)=>a+b,0)/v.length:0}
function domAvg(scores){const all=Object.values(scores||{}).flat();return avg(all)}
function scScore(scores){return avg([...(scores?.d3||[]),...(scores?.d4||[])])}
function tStats(t){
  const obs=S.observations.filter(o=>o.tid===t.id);
  const last=obs[obs.length-1];
  const prev=obs[obs.length-2];
  const la=last?domAvg(last.scores):0;
  const pa=prev?domAvg(prev.scores):0;
  const trend=la&&pa?la-pa:0;
  return{obs,last,la,pa,trend,sc:last?scScore(last.scores):0,conf:last?.conf||0,count:obs.length,trips:S.triplets.filter(tr=>tr.oid===t.id||tr.cid===t.id||tr.fid===t.id).length};
}
function mechActive(id){
  if(S.mechM[id]!==undefined)return S.mechM[id];
  const obs=scopedObs(), trips=S.triplets;
  if(id===1)return obs.some(o=>o.bio);
  if(id===2)return S.cpd.some(c=>c.during);
  if(id===3)return obs.some(o=>o.bio);
  if(id===5)return S.cpd.some(c=>c.before);
  if(id===8)return obs.some(o=>o.bio);
  if(id===9)return obs.some(o=>(o.scores?.d4||[]).some(v=>v>=3));
  if(id===10)return obs.some(o=>o.ebi)||trips.some(t=>t.careNotes);
  if(id===11)return obs.some(o=>o.slLinked)||trips.some(t=>t.slLinked);
  if(id===12)return trips.some(t=>t.action);
  if(id===13)return trips.some(t=>t.action&&t.fu);
  if(id===14)return trips.filter(t=>t.status==='complete').length>=2;
  return false;
}
function totalMechs(){return MECHS.filter(m=>mechActive(m.id)).length}
function totalDH(){return DH_PILLARS.filter(p=>S.dhM[p.id]!==undefined?S.dhM[p.id]:mechActive(p.id*2-1)||mechActive(p.id*2)).length}

function myRole(){
  if(!S.session)return DEFAULT_ROLES.viewer;
  if(S.session.role==='admin')return DEFAULT_ROLES.admin;
  return S.roleCfg[S.session.role]||DEFAULT_ROLES.viewer;
}
function isAdmin(){return S.session?.role==='admin'}
function canEdit(){return isAdmin()||myRole()?.canEdit}
function isScoped(){return !isAdmin()&&!!myRole()?.scoped&&(S.session?.depts||[]).length>0}
function myDepts(){return S.session?.depts||[]}

function scopedObs(){
  if(!isScoped())return S.observations;
  return S.observations.filter(o=>{
    if(!o.tid)return false;
    const t=S.teachers.find(t=>t.id===o.tid);
    return t&&myDepts().includes(t.dept);
  });
}
function scopedTeachers(){
  if(!isScoped())return S.teachers;
  return S.teachers.filter(t=>myDepts().includes(t.dept));
}

// ═══ RENDER ENGINE ════════════════════════════════════════════════════════════
function render(){
  document.getElementById('app').innerHTML = S.session ? renderApp() : renderLogin();

}

function showToast(msg,type='success'){
  clearTimeout(S.toastTimer);
  S.toast={msg,type};
  render();
  S.toastTimer=setTimeout(()=>{S.toast=null;render();},3000);
}

  ];

    const t=S.teachers.find(t=>t.id===i.tid);

      <div class="flex justify-between items-center">

      ${i.evidence?'<div class="text-xs text-muted mt-1">'+i.evidence+'</div>':''}

function openModal(type, data={}){
  S.modal = renderModal(type, data);
  render();
}

function renderModal(type, data={}){
  const M=(title,body,footer)=>`
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h3>${title}</h3>
        <button class="btn btn-ghost btn-sm" data-close-modal>✕</button>
      </div>
      <div class="modal-body">${body}</div>
      <div class="modal-footer">${footer}</div>
    </div>
  </div>`;

  const FI=(id,label,val='',type='text',placeholder='')=>
    `<div class="form-group"><label class="form-label">${label}</label>
    <input class="form-control rtl" id="${id}" type="${type}" value="${val||''}" placeholder="${placeholder}"></div>`;
  const FS=(id,label,opts,val='')=>
    `<div class="form-group"><label class="form-label">${label}</label>
    <select class="form-control" id="${id}">${opts.map(o=>typeof o==='string'?'<option '+(val===o?'selected':'')+'>'+o+'</option>':'<option value="'+o.v+'" '+(val===o.v?'selected':'')+'>'+o.l+'</option>').join('')}</select></div>`;
  const FTA=(id,label,val='',rows=3)=>
    `<div class="form-group"><label class="form-label">${label}</label>
    <textarea class="form-control rtl" id="${id}" rows="${rows}">${val||''}</textarea></div>`;
  const G2=(a,b)=>`<div class="grid-2">${a}${b}</div>`;
  const userName=S.session?.name||'';

  if(type==='obs'){
    const preT=data.tid||'';
    return M('📋 New Observation',
      FS('obs-tid','Teacher',[{v:'',l:'— Whole School / Dept —'},...scopedTeachers().map(t=>({v:t.id,l:t.name+' ('+t.dept+')'}))],preT)+
      G2(FI('obs-date','Date',new Date().toISOString().split('T')[0],'date'),FI('obs-obs','Observed by',userName))+
      FS('obs-tech','Biol-Og Technique',['',{v:'',l:'— None —'},...TECHS],'')+
      '<div id="obs-domains">' +
      getDomains().map(d=>`<div class="form-group"><label class="form-label">${d.n}</label>
        <div class="flex gap-2 flex-wrap">${d.criteria.map((c,i)=>`
          <div style="background:var(--light);border-radius:6px;padding:6px 8px;flex:1;min-width:140px">
            <div class="text-xs text-muted mb-1">${c}</div>
            <div class="flex gap-1">${[1,2,3,4,5].map(n=>`<button type="button" data-score="${d.id}-${i}-${n}" style="width:26px;height:26px;border-radius:4px;border:1px solid var(--border);background:var(--white);font-size:11px;font-weight:600;cursor:pointer">${n}</button>`).join('')}</div>
          </div>`).join('')}
        </div></div>`).join('') +
      '</div>'+
      G2(FI('obs-conf','Confidence (1-5)','','number'),FS('obs-scope','Scope',['teacher','dept','boys','girls','school'],'teacher'))+
      G2(FTA('obs-www','Key Strengths (WWW)'),FTA('obs-ebi','Areas for Development (EBI)'))+
      FTA('obs-action','Action Step'),
      '<button class="btn btn-ghost" data-close-modal>Cancel</button><button class="btn btn-success" data-save-obs>Save Observation</button>'
    );
  }

  if(type==='lw'){
    const isEdit=!!(data.id);
    return M((isEdit?'✏ Edit':'🚶 New')+' Learning Walk',
      G2(FI('lw-date','Date',data.date||new Date().toISOString().split('T')[0],'date'),FI('lw-obs','Observer',data.observer||userName))+
      G2(FS('lw-sect','Section',['','Boys','Girls'],data.section||''),FS('lw-dept','Department',['', ...DEPTS],data.dept||''))+
      FS('lw-tech','Technique Focus',['',{v:'',l:'— None —'},...TECHS],data.bio||'')+
      FI('lw-focus','Focus Area / Question',data.focusArea||'','text','What are we looking for?')+
      G2(FTA('lw-str','Strengths',data.strengths||''),FTA('lw-afd','Areas for Development',data.afd||'')),
      `<button class="btn btn-ghost" data-close-modal>Cancel</button><button class="btn btn-success" data-save-lw>${isEdit?'Update Walk':'Save Walk'}</button>`
    );
  }

  if(type==='cpd'){
    const isCpdEdit=!!(data.id);
    return M((isCpdEdit?'✏ Edit':'📚 New')+' CPD Session',
      FI('cpd-title','Session Title',data.title||'','text','e.g. AFL Workshop — Biology Dept')+
      G2(FI('cpd-date','Date',data.date||new Date().toISOString().split('T')[0],'date'),FI('cpd-fac','Facilitator',data.facilitator||userName))+
      G2(FS('cpd-aud','Audience',['Whole School','Boys Section','Girls Section',...DEPTS.map(d=>d+' — Girls'),...DEPTS.map(d=>d+' — Boys')],data.audience||'Whole School'),
         FS('cpd-month','Month',MONTHS,data.month||MONTHS[new Date().getMonth()]||MONTHS[0]))+
      G2(FS('cpd-type','Type',['Internal','External','Cambridge','COBIS','WLC','Other'],data.type||'Internal'),
         FS('cpd-del','Delivery',['Workshop','WLC','Course','Online','Face to Face','In School','Other'],data.delivery||'Workshop'))+
      FS('cpd-tech','Technique Focus',['',{v:'',l:'— None —'},...TECHS],data.bio||'')+
      G2(FTA('cpd-bef','Before — Planned outcomes',data.before||''),FTA('cpd-dur','During — Activities',data.during||''))+
      FTA('cpd-aft','After — Implementation & monitoring',data.after||''),
      `<button class="btn btn-ghost" data-close-modal>Cancel</button><button class="btn btn-success" data-save-cpd>${isCpdEdit?'Update Session':'Save Session'}</button>`
    );
  }

  if(type==='trip'){
    const isTripEdit=!!(data.id);
    return M((isTripEdit?'✏ Edit':'🎯 New')+' Coaching Triplet',
      G2(FI('tr-name','Session Name','','text','e.g. Term 1 Cycle 1'),
         FS('tr-gid','TLC Group',[{v:'',l:'— Select Group —'},...S.groups.map(g=>({v:g.id,l:g.name}))],''))+
      G2(FS('tr-cycle','Cycle',[{v:1,l:'Cycle 1'},{v:2,l:'Cycle 2'},{v:3,l:'Cycle 3'}],data.cycle||1),
         FS('tr-status','Status',['planned','active','complete'],data.status||'planned'))+
      G2(FS('tr-oid','Observer (Teacher being observed)',[{v:'',l:'— Select —'},...scopedTeachers().map(t=>({v:t.id,l:t.name}))],data.oid||''),
         FS('tr-cid','Coach',[{v:'',l:'— Select —'},...scopedTeachers().map(t=>({v:t.id,l:t.name}))],data.cid||''))+
      FS('tr-fid','Facilitator',[{v:'',l:'— Select —'},...scopedTeachers().map(t=>({v:t.id,l:t.name}))],data.fid||'')+
      FS('tr-tech','Technique Focus',['',{v:'',l:'— None —'},...TECHS],data.bio||'')+
      G2(FI('tr-od','Observe Date',data.od||'','date'),FI('tr-dd','CARE Debrief Date',data.dd||'','date'))+
      G2(FTA('tr-www','What Went Well (WWW)',data.wwwNotes||''),FTA('tr-ebi','Even Better If (EBI)',data.ebiNotes||''))+
      FTA('tr-action','Steplab Action Step',data.action||''),
      `<button class="btn btn-ghost" data-close-modal>Cancel</button><button class="btn btn-success" data-save-trip>${isTripEdit?'Update Triplet':'Save Triplet'}</button>`
    );
  }

  if(type==='sched'){
    return M('🗓 Add Schedule Entry',
      FS('sch-cat','Category',SCHED_CATS,SCHED_CATS[0])+
      FI('sch-prog','Programme Name','','text','e.g. Cambridge PDQ Teaching & Learning')+
      G2(FI('sch-fac','Facilitator',''),FI('sch-target','Target Audience',''))+
      G2(FS('sch-type','Type',['Cambridge','Internal','External','COBIS','WLC','Other'],'Internal'),
         FS('sch-del','Delivery',['Course','Workshop','WLC','Online','Face to Face','In School','Other'],'Workshop'))+
      G2(FI('sch-dur','Duration','','text','e.g. 60 min'),FS('sch-month','Month',MONTHS,MONTHS[0]))+
      G2(FI('sch-start','Start Date','','date'),FI('sch-end','End Date','','date')),
      '<button class="btn btn-ghost" data-close-modal>Cancel</button><button class="btn btn-success" data-save-sched>Save</button>'
    );
  }

  if(type==='teacher'){
    return M('👩‍🏫 Add Teacher',
      FI('tch-name','Full Name (Arabic/English)','','text','Teacher name')+
      G2(FS('tch-dept','Department',DEPTS,DEPTS[0]),FS('tch-sect','Section',SECTIONS,SECTIONS[0]))+
      G2(FS('tch-stage','Stage',STAGES,STAGES[0]),
         FS('tch-group','TLC Group',[{v:'',l:'— Select Group —'},...S.groups.map(g=>({v:g.id,l:g.name}))])),
      '<button class="btn btn-ghost" data-close-modal>Cancel</button><button class="btn btn-success" data-save-teacher>Save Teacher</button>'
    );
  }

  if(type==='user'){
    return M('👤 Add User',
      G2(FI('u-name','Full Name',''),FI('u-user','Username',''))+
      G2(FI('u-pass','Password','','password'),
         FS('u-role','Role',[...Object.entries(S.roleCfg).map(([k,r])=>({v:k,l:r.label||k}))],'viewer'))+
      FS('u-depts','Departments (for scoped roles)',['',{v:'',l:'— All departments —'},...DEPTS.map(d=>({v:d,l:d}))],''),
      '<button class="btn btn-ghost" data-close-modal>Cancel</button><button class="btn btn-success" data-save-user>Save User</button>'
    );
  }

  if(type==='impact'){
    const typeOpts={1:['confidence','knowledge-check','I-will-try-card','voice-survey','other'],2:['obs-domain-score','triplet-evidence','action-plan-rate','learning-walk','other'],3:['student-engagement','formative-assessment','questioning-depth','collaboration','student-ownership','other']};
    const lvl=data.level||'1';
    return M('📈 Add Impact Entry',
      FS('imp-level','Level',[{v:'1',l:'L1: Teacher Knowledge'},{v:'2',l:'L2: Classroom Practice'},{v:'3',l:'L3: Student Outcomes'}],lvl)+
      FS('imp-type','Type',(typeOpts[lvl]||typeOpts[1]),'')+
      G2(FS('imp-tid','Teacher (optional)',[{v:'',l:'All Staff'},...scopedTeachers().map(t=>({v:t.id,l:t.name}))]),
         FI('imp-val','Value / Score','','text','e.g. 3.8/5'))+
      G2(FI('imp-date','Date',new Date().toISOString().split('T')[0],'date'),FI('imp-term','Term','','text','e.g. Term 1'))+
      FTA('imp-evidence','Evidence'),
      '<button class="btn btn-ghost" data-close-modal>Cancel</button><button class="btn btn-success" data-save-impact>Save Entry</button>'
    );
  }

  if(type==='prog'){
    const mode=S.progMode||'internal';
    const cols=mode==='external'?['Mock 1','Mock 2','Official']:mode==='portfolio'?['Subject activation','Quality activation']:['Baseline','Mid-Term 1','End of Term 1','Mid-Term 2','End of Term 2'];
    return M('📊 Add Student Progress',
      G2(FI('pr-subj','Subject / Class Group','','text'),FS('pr-dept','Department',DEPTS,DEPTS[0]))+
      G2(FS('pr-grade','Grade',GRADES,GRADES[3]),FS('pr-sect','Section',SECTIONS,SECTIONS[0]))+
      cols.map(c=>FI('pr-sc-'+c.replace(/ /g,'_'),'Score: '+c,'','number')).join('')+
      (mode==='portfolio'?FI('pr-link','Portfolio Folder Link (URL)','','url'):''),
      '<button class="btn btn-ghost" data-close-modal>Cancel</button><button class="btn btn-success" data-save-prog>Save Progress</button>'
    );
  }

  if(type==='group'){
    const isGrpEdit=!!(data.id);
    return M((isGrpEdit?'✏ Edit':'👥 Add')+' TLC Group',
      FI('grp-name','Group Name',data.name||'','text','e.g. Math & Science TLC'),
      `<button class="btn btn-ghost" data-close-modal>Cancel</button><button class="btn btn-success" data-save-group>${isGrpEdit?'Update Group':'Save Group'}</button>`
    );
  }

  if(type==='resource'){
    return M('📂 Add Resource',
      FI('res-title','Title','')+FI('res-url','URL','','url')+FTA('res-desc','Description'),
      '<button class="btn btn-ghost" data-close-modal>Cancel</button><button class="btn btn-success" data-save-res>Save Resource</button>'
    );
  }

  if(type==='role'){
    const editKey=data.editKey||'';
    const existing=editKey?S.roleCfg[editKey]:null;
    const title=editKey?'✏️ Edit Role: '+(existing?.label||editKey):'🔑 Create Custom Role';
    const viewChecks=ALL_VIEWS.map(v=>{
      const checked=existing?(existing.views||[]).includes(v):true;
      return `<label style="display:flex;align-items:center;gap:6px;font-size:12px;padding:3px 0;cursor:pointer">
        <input type="checkbox" class="role-view-cb" value="${v}" ${checked?'checked':''}> ${VIEW_META[v].icon} ${VIEW_META[v].label}
      </label>`;
    }).join('');
    const isBuiltIn=['admin','obsLead','coachLead','cpdLead','deptHead','viewer'].includes(editKey);
    return M(title,
      (editKey&&isBuiltIn?`<div class="alert alert-warn mb-3">⚠ Built-in role — key is fixed. You can edit views and permissions.</div>`:'')+ 
      FI('role-key','Role key (no spaces)',editKey&&!isBuiltIn?editKey:editKey,'text',editKey?'':'e.g. hod_math')+
      FI('role-label','Display label',existing?.label||'','text','e.g. Head of Mathematics')+
      `<div class="form-group"><label class="form-label">Accessible Views</label>
       <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;background:var(--light);padding:10px;border-radius:6px">${viewChecks}</div></div>`+
      `<div class="flex gap-4 mt-2">
        <label style="display:flex;align-items:center;gap:6px;font-size:12px;cursor:pointer"><input type="checkbox" id="role-canedit" ${existing?.canEdit!==false?'checked':''}> Can edit data</label>
        <label style="display:flex;align-items:center;gap:6px;font-size:12px;cursor:pointer"><input type="checkbox" id="role-scoped" ${existing?.scoped?'checked':''}> Department scoped</label>
      </div>`+
      (editKey?`<input type="hidden" id="role-editkey" value="${editKey}">`:''),
      `<button class="btn btn-ghost" data-close-modal>Cancel</button><button class="btn btn-success" data-save-role>${editKey?'Update Role':'Save Role'}</button>`
    );
  }
  if(type==='care'){
    const tabs=['overview','templates','examples','reflection','criteria','resources'];
    const tLabels={overview:'Overview',templates:'Templates',examples:'Examples',reflection:'Reflection Qs',criteria:'Success Criteria',resources:'Resources'};
    const CARE_CONTENT={
      overview:`CARE Coaching Protocol — Waad Academy

1. CLARIFY — Coach asks clarifying questions. No judgement yet. (5 min)
2. ASK & LISTEN — 'What went well?' Teacher reflects first. (8 min)
3. REINFORCE — Specific evidence-based positive feedback. (4 min)
4. ESTABLISH — Co-construct 1 action step. Follow-up date agreed. (3 min)

Total: 20 minutes. One criterion only. One action step.`,
      templates:`OBSERVATION SCRIPT:
□ Date / Teacher / Domain / Biol-Og technique
□ Verbatim student quotes (3+)
□ Teacher moves (questioning, wait time, CFU)
□ Evidence of technique

DEBRIEF TEMPLATE:
□ WWW: 2 specific observable strengths
□ EBI: 1 precise actionable next step
□ Action: [teacher] will [technique] in [lesson] by [date]
□ Steplab micro-prompt: set before leaving room`,
      examples:`EXAMPLE — Think, Pair, Share:
WWW: 'All 27 students generated written responses during Think — 100% engagement'
EBI: 'During Pair, students needed sentence starters'
Action: Add sentence starter card for next TPS lesson by 15 Oct`,
      reflection:`1. What did students know at the end that they couldn't at the start?
2. Where was pupil thought ratio highest?
3. What would you change if you taught this again?
4. How did the Biol-Og technique change engagement?
5. What evidence do you have that learning happened?`,
      criteria:`✓ Observer scripts evidence for 25+ min
✓ Debrief follows CARE — teacher speaks first
✓ Exactly 1 specific observable action step
✓ Action step in Steplab before leaving room
✓ Follow-up date in calendar before leaving room
✓ Roles rotate every cycle`,
      resources:`• Biol-Og CPD Booklets: https://biol-og.com/cpd-booklets/
• Darling-Hammond (2017): learningpolicyinstitute.org
• EEF (2021) 14 Mechanisms: educationendowmentfoundation.org.uk
• Steplab: https://steplab.co
• NEASC ACE: neasc.org`
    };
    const curTab=S.careTab||'overview';
    const body=`<div class="tabs mb-3">${tabs.map(t=>`<button class="tab ${curTab===t?'active':''}" data-care-tab="${t}">${tLabels[t]}</button>`).join('')}</div>
      <div style="background:var(--light);border-radius:8px;padding:14px 16px;font-size:13px;color:#444;line-height:1.8;white-space:pre-wrap;max-height:380px;overflow-y:auto">${CARE_CONTENT[curTab]||''}</div>`;
    return M('📖 Coaching Triplet Protocol — CARE Framework',body,'<button class="btn btn-primary" data-close-modal>Close</button>');
  }

  return M('Modal','<p>Coming soon</p>','<button class="btn btn-ghost" data-close-modal>Close</button>');
}

// ═══ EVENT BINDING ════════════════════════════════════════════════════════════
const g=(id)=>document.getElementById(id);
const gv=(id)=>(g(id)||{}).value||'';

function bindEvents(){
  // Navigation
  document.querySelectorAll('[data-nav]').forEach(el=>{
    el.onclick=()=>{S.view=el.dataset.nav;render()};
  });
  // Logout
  const lb=g('logout-btn');
  if(lb)lb.onclick=()=>{S.session=null;sset('session',null);render()};
  // Login
  const loginBtn=g('l-btn');
  if(loginBtn){
    const doLogin=()=>{
      const u=(gv('l-user')||'').trim();
      const p=(gv('l-pass')||'').trim();
      const err=g('l-err');
      if(u==='admin'&&p==='waad2026'){
        const sess={name:'Admin',role:'admin',depts:[]};
        S.session=sess; sset('session',sess); render(); return;
      }
      const cu=S.users.find(x=>x.username&&x.username.trim()===u&&x.password&&x.password.trim()===p);
      if(cu){
        const sess={name:cu.name,role:cu.role||'viewer',depts:cu.depts||[]};
        S.session=sess; sset('session',sess); render(); return;
      }
      if(err){err.style.display='block';err.textContent='Invalid credentials. '+(S.users.length>0?S.users.length+' users registered.':'');}
    };
    loginBtn.onclick=doLogin;
    [g('l-user'),g('l-pass')].forEach(el=>{if(el)el.onkeydown=e=>{if(e.key==='Enter')doLogin();}});
  }
  // Modal triggers
  document.querySelectorAll('[data-modal]').forEach(el=>{
    el.onclick=()=>openModal(el.dataset.modal);
  });
  document.querySelectorAll('[data-new-obs]').forEach(el=>{
    el.onclick=()=>openModal('obs',{tid:el.dataset.newObs});
  });
  // Close modal
  document.querySelectorAll('[data-close-modal]').forEach(el=>{
    el.onclick=()=>{S.modal=null;render()};
  });
  const ov=g('modal-overlay');
  if(ov)ov.onclick=e=>{if(e.target===ov){S.modal=null;render()}};

  // Care protocol tabs
  document.querySelectorAll('[data-care-tab]').forEach(el=>{
    el.onclick=()=>{S.careTab=el.dataset.careTab;S.modal=renderModal('care');render()};
  });
  // Tabs
  document.querySelectorAll('[data-fw-tab]').forEach(el=>{
    el.onclick=()=>{S.fwTab=el.dataset.fwTab;render()};
  });
  document.querySelectorAll('[data-imp-tab]').forEach(el=>{
    el.onclick=()=>{S.impTab=el.dataset.impTab;render()};
  });
  document.querySelectorAll('[data-prog-mode]').forEach(el=>{
    el.onclick=()=>{S.progMode=el.dataset.progMode;render()};
  });

  // Process audit
  document.querySelectorAll('[data-rate]').forEach(el=>{
    el.onclick=()=>{
      const[id,n]=el.dataset.rate.split('-');
      if(!S.currentRatings)S.currentRatings={};
      S.currentRatings[id]=parseInt(n);
      render();
    };
  });
  const procDept=document.querySelector('[data-proc-dept]');
  if(procDept)procDept.onchange=e=>{S.procDept=e.target.value;render()};

  const submitSnap=document.querySelector('[data-submit-snap]');
  if(submitSnap)submitSnap.onclick=()=>{
    const deptSnaps=S.snapshots.filter(s=>(s.dept||'Whole School')===(S.procDept||'Whole School'));
    if(deptSnaps.length>=3){showToast('Max 3 snapshots for "'+(S.procDept||'Whole School')+'". Delete one first.','error');return;}
    const snap={id:uid(),ratings:{...S.currentRatings||{}},obsCount:scopedObs().length,tripCount:S.triplets.length,lwCount:S.lwalks.length,dept:S.procDept||'Whole School',date:new Date().toISOString()};
    S.snapshots=[...S.snapshots,snap];
    save('snapshots',S.snapshots);
    S.currentRatings={};
    showToast('Snapshot saved ✓');
  };
  document.querySelectorAll('[data-del-snap]').forEach(el=>{
    el.onclick=()=>{
      S.snapshots.splice(parseInt(el.dataset.delSnap),1);
      save('snapshots',S.snapshots);
      showToast('Snapshot deleted');
      render();
    };
  });

  // Mechanism toggles
  document.querySelectorAll('[data-toggle-mech]').forEach(el=>{
    el.onclick=()=>{
      const id=parseInt(el.dataset.toggleMech);
      S.mechM[id]=!mechActive(id);
      save('mechM',S.mechM);
      render();
    };
  });
  document.querySelectorAll('[data-toggle-dh]').forEach(el=>{
    el.onclick=()=>{
      const id=parseInt(el.dataset.toggleDh);
      S.dhM[id]=S.dhM[id]===undefined?false:!S.dhM[id];
      save('dhM',S.dhM);
      render();
    };
  });

  // Schedule status inline
  document.querySelectorAll('[data-status-sched]').forEach(el=>{
    el.onchange=()=>{
      const id=el.dataset.statusSched;
      const row=S.schedule.find(r=>r.id===id);
      if(row){row.status=el.value;save('sched',S.schedule);showToast('Status updated ✓');}
    };
  });

  // Score buttons in obs modal
  const scoreState={};
  document.querySelectorAll('[data-score]').forEach(el=>{
    el.onclick=()=>{
      const[domId,criIdx,val]=el.dataset.score.split('-');
      if(!scoreState[domId])scoreState[domId]=[];
      scoreState[domId][parseInt(criIdx)]=parseInt(val);
      // Update button styling
      document.querySelectorAll('[data-score]').forEach(btn=>{
        const[d,c,v]=btn.dataset.score.split('-');
        if(d===domId&&c===criIdx){
          const active=parseInt(v)===parseInt(val);
          btn.style.background=active?'var(--navy)':'var(--white)';
          btn.style.color=active?'#fff':'inherit';
          btn.style.borderColor=active?'var(--navy)':'var(--border)';
        }
      });
      el._scoreState=scoreState;
    };
  });

  // SAVES
  const saveObs=document.querySelector('[data-save-obs]');
  if(saveObs)saveObs.onclick=()=>{
    const tid=gv('obs-tid');
    const bio=gv('obs-tech');
    const scoreState={};
    document.querySelectorAll('[data-score]').forEach(btn=>{
      const[d,c]=btn.dataset.score.split('-');
      if(btn.style.background==='var(--navy)'||btn.style.background==='rgb(31, 78, 121)'){
        if(!scoreState[d])scoreState[d]=[];
        scoreState[d][parseInt(c)]=parseInt(btn.dataset.score.split('-')[2]);
      }
    });
    const scores={};
    getDomains().forEach(d=>{
      scores[d.id]=Array.from({length:d.criteria.length},(_,i)=>scoreState[d.id]?scoreState[d.id][i]||0:0);
    });
    const editId=S.editingId?.type==='obs'?S.editingId.id:null;
    const existing=editId?S.observations.find(o=>o.id===editId):{};
    const obs={
      ...(existing||{}),
      id:editId||uid(),tid:tid||null,date:gv('obs-date'),observer:gv('obs-obs'),
      scope:gv('obs-scope'),bio:bio==='— None —'?'':bio,
      scores,conf:parseInt(gv('obs-conf'))||0,
      www:gv('obs-www'),ebi:gv('obs-ebi'),action:gv('obs-action'),
      autoLPs:TECH_LP[bio]||[],neasc:[],slLinked:existing?.slLinked||false
    };
    S.observations=editId?S.observations.map(o=>o.id===editId?obs:o):[...S.observations,obs];
    save('obs',S.observations);
    S.modal=null;S.editingId=null;
    showToast(editId?'Observation updated ✓':'Observation saved ✓');
  };

  const saveLW=document.querySelector('[data-save-lw]');
  if(saveLW)saveLW.onclick=()=>{
    const editId=S.editingId?.type==='lw'?S.editingId.id:null;
    const lw={...(editId?S.lwalks.find(l=>l.id===editId):{}),id:editId||uid(),date:gv('lw-date'),observer:gv('lw-obs'),section:gv('lw-sect'),dept:gv('lw-dept'),bio:gv('lw-tech'),strengths:gv('lw-str'),afd:gv('lw-afd'),focusArea:gv('lw-focus')};
    S.lwalks=editId?S.lwalks.map(l=>l.id===editId?lw:l):[...S.lwalks,lw];
    save('lwalks',S.lwalks);
    S.modal=null;S.editingId=null;
    showToast(editId?'Learning walk updated ✓':'Learning walk saved ✓');
  };

  const saveCPD=document.querySelector('[data-save-cpd]');
  if(saveCPD)saveCPD.onclick=()=>{
    const title=gv('cpd-title');
    if(!title.trim()){showToast('Please enter a session title','error');return;}
    const month=gv('cpd-month');
    const aud=gv('cpd-aud');
    const editId=S.editingId?.type==='cpd'?S.editingId.id:null;
    if(!editId&&aud&&aud!=='Whole School'){
      const conflict=S.cpd.find(c=>c.month===month&&c.audience==='Whole School');
      if(conflict&&!confirm('⚠ Conflict: "'+conflict.title+'" (Whole School) is also in '+month+'. Save anyway?'))return;
    }
    const existing=editId?S.cpd.find(c=>c.id===editId):{};
    const cpd={...(existing||{}),id:editId||uid(),title,date:gv('cpd-date'),facilitator:gv('cpd-fac'),audience:aud,
      type:gv('cpd-type'),delivery:gv('cpd-del'),month,bio:gv('cpd-tech'),
      before:gv('cpd-bef'),during:gv('cpd-dur'),after:gv('cpd-aft'),status:'active'};
    S.cpd=editId?S.cpd.map(c=>c.id===editId?cpd:c):[...S.cpd,cpd];
    save('cpd',S.cpd);
    if(!editId){
      const newRow={id:uid(),category:'Internal - SDP-Based Training',program:title,facilitator:cpd.facilitator,delivery:cpd.delivery,type:cpd.type,month,venue:'TBC',target:aud,status:'active',cpdId:cpd.id,startDate:cpd.date||'',endDate:''};
      S.schedule=[...S.schedule,newRow];save('sched',S.schedule);
    }
    S.modal=null;S.editingId=null;
    showToast(editId?'CPD session updated ✓':'CPD session saved & linked to schedule ✓');
  };

  const saveTrip=document.querySelector('[data-save-trip]');
  if(saveTrip)saveTrip.onclick=()=>{
    const editId=S.editingId?.type==='trip'?S.editingId.id:null;
    const gid=gv('tr-gid');
    const cycle=parseInt(gv('tr-cycle'))||1;
    if(!editId&&S.triplets.filter(t=>t.gid===gid&&t.cycle===cycle).length>0){
      showToast('Cycle '+cycle+' already exists for this group','error');return;
    }
    const existing=editId?S.triplets.find(t=>t.id===editId):{};
    const trip={...(existing||{}),id:editId||uid(),gid,name:gv('tr-name'),cycle,status:gv('tr-status'),
      oid:gv('tr-oid'),cid:gv('tr-cid'),fid:gv('tr-fid'),
      bio:gv('tr-tech'),od:gv('tr-od'),dd:gv('tr-dd'),
      wwwNotes:gv('tr-www'),ebiNotes:gv('tr-ebi'),action:gv('tr-action'),
      slLinked:existing?.slLinked||false};
    S.triplets=editId?S.triplets.map(t=>t.id===editId?trip:t):[...S.triplets,trip];
    save('trips',S.triplets);
    S.modal=null;S.editingId=null;
    showToast(editId?'Coaching triplet updated ✓':'Coaching triplet saved ✓');
  };

  const saveSched=document.querySelector('[data-save-sched]');
  if(saveSched)saveSched.onclick=()=>{
    const prog=gv('sch-prog');
    if(!prog.trim()){showToast('Please enter a programme name','error');return;}
    const row={id:uid(),category:gv('sch-cat'),program:prog,facilitator:gv('sch-fac'),
      delivery:gv('sch-del'),type:gv('sch-type'),duration:gv('sch-dur'),
      month:gv('sch-month'),startDate:gv('sch-start'),endDate:gv('sch-end'),
      venue:'TBC',target:gv('sch-target'),status:'planned',cpdId:null};
    S.schedule=[...S.schedule,row];
    save('sched',S.schedule);
    S.modal=null;
    showToast('Schedule entry saved ✓');
  };

  const saveTch=document.querySelector('[data-save-teacher]');
  if(saveTch)saveTch.onclick=()=>{
    const name=gv('tch-name');
    if(!name.trim()){showToast('Please enter a name','error');return;}
    const t={id:uid(),name,dept:gv('tch-dept'),section:gv('tch-sect'),stage:gv('tch-stage'),grades:[],groupId:gv('tch-group')||S.groups[0]?.id};
    S.teachers=[...S.teachers,t];
    save('teachers',S.teachers);
    S.modal=null;
    showToast('Teacher added ✓');
  };

  const saveUser=document.querySelector('[data-save-user]');
  if(saveUser)saveUser.onclick=()=>{
    const name=gv('u-name'),uname=gv('u-user'),pass=gv('u-pass'),role=gv('u-role');
    if(!name||!uname||!pass){showToast('Name, username and password are required','error');return;}
    if(S.users.find(u=>u.username===uname)){showToast('Username already exists','error');return;}
    const dept=gv('u-depts');
    const u={id:uid(),name,username:uname,password:pass,role,depts:dept?[dept]:[]};
    S.users=[...S.users,u];
    save('users',S.users);
    S.modal=null;
    showToast('User created ✓');
  };

  const saveGrp=document.querySelector('[data-save-group]');
  if(saveGrp)saveGrp.onclick=()=>{
    const editId=S.editingId?.type==='group'?S.editingId.id:null;
    const name=gv('grp-name');
    if(!name.trim()){showToast('Enter a group name','error');return;}
    if(editId){
      S.groups=S.groups.map(g=>g.id===editId?{...g,name}:g);
      save('groups',S.groups);S.modal=null;S.editingId=null;showToast('Group updated ✓');
    }else{
      const COLORS=['#1F4E79','#0F6E56','#3C3489','#7B4F0C','#993C1D'];
      const g={id:uid(),name,color:COLORS[S.groups.length%COLORS.length]};
      S.groups=[...S.groups,g];save('groups',S.groups);S.modal=null;showToast('Group added ✓');
    }
  };

  const saveImpact=document.querySelector('[data-save-impact]');
  if(saveImpact)saveImpact.onclick=()=>{
    const editId=S.editingId?.type==='impact'?S.editingId.id:null;
    const lvl=gv('imp-level');
    const entry={...(editId?S.impacts.find(i=>i.id===editId):{}),id:editId||uid(),level:lvl,type:gv('imp-type'),tid:gv('imp-tid')||null,value:gv('imp-val'),evidence:gv('imp-evidence'),date:gv('imp-date'),term:gv('imp-term')};
    S.impacts=editId?S.impacts.map(i=>i.id===editId?entry:i):[...S.impacts,entry];
    save('impacts',S.impacts);
    S.modal=null;S.editingId=null;
    showToast(editId?'Entry updated ✓':'Impact entry saved ✓');
  };

  const saveProg=document.querySelector('[data-save-prog]');
  if(saveProg)saveProg.onclick=()=>{
    const editId=S.editingId?.type==='prog'?S.editingId.id:null;
    const mode=S.progMode||'internal';
    const cols=mode==='external'?['Mock 1','Mock 2','Official']:mode==='portfolio'?['Subject activation','Quality activation']:['Baseline','Mid-Term 1','End of Term 1','Mid-Term 2','End of Term 2'];
    const scores={};
    cols.forEach(c=>{const v=parseFloat(gv('pr-sc-'+c.replace(/ /g,'_')));if(v)scores[c]=v;});
    const entry={...(editId?S.progress.find(p=>p.id===editId):{}),id:editId||uid(),mode,subject:gv('pr-subj'),dept:gv('pr-dept'),grade:gv('pr-grade'),section:gv('pr-sect'),scores,folderLink:gv('pr-link')||''};
    S.progress=editId?S.progress.map(p=>p.id===editId?entry:p):[...S.progress,entry];
    save('progress',S.progress);
    S.modal=null;S.editingId=null;
    showToast(editId?'Progress updated ✓':'Progress entry saved ✓');
  };

  const saveRes=document.querySelector('[data-save-res]');
  if(saveRes)saveRes.onclick=()=>{
    const title=gv('res-title');
    if(!title){showToast('Enter a title','error');return;}
    const r={id:uid(),title,url:gv('res-url'),desc:gv('res-desc')};
    S.resources=[...S.resources,r];
    save('resources',S.resources);
    S.modal=null;
    showToast('Resource added ✓');
  };

  const saveRole=document.querySelector('[data-save-role]');
  if(saveRole)saveRole.onclick=()=>{
    const editKey=(document.getElementById('role-editkey')?.value||'').trim();
    const rawKey=(document.getElementById('role-key')?.value||'').trim().replace(/\s+/g,'_');
    const key=editKey||rawKey;
    const label=(document.getElementById('role-label')?.value||'').trim();
    if(!key||!label){showToast('Key and label required','error');return;}
    if(!editKey&&S.roleCfg[key]){showToast('Role key already exists','error');return;}
    const views=[...document.querySelectorAll('.role-view-cb:checked')].map(cb=>cb.value);
    const canEditR=document.getElementById('role-canedit')?.checked||false;
    const scoped=document.getElementById('role-scoped')?.checked||false;
    const isNew=!editKey;
    S.roleCfg[key]={...S.roleCfg[key],label,views,canEdit:canEditR,scoped};
    save('roleCfg',S.roleCfg);
    S.modal=null;
    showToast('Role "'+label+'" '+(isNew?'created':'updated')+' ✓');
  };
  // Edit role button
  document.querySelectorAll('[data-edit-role]').forEach(el=>{
    el.onclick=()=>{S.modal=renderModal('role',{editKey:el.dataset.editRole});render();};
  });
  // Delete role
  document.querySelectorAll('[data-del-role]').forEach(el=>{
    el.onclick=()=>{
      const key=el.dataset.delRole;
      if(key==='admin'){showToast('Cannot delete admin role','error');return;}
      if(!confirm('Delete role "'+key+'"? Users with this role will default to viewer.'))return;
      delete S.roleCfg[key];
      save('roleCfg',S.roleCfg);
      showToast('Role deleted');
      render();
    };
  });
  // Senior dashboard export
  const expBtn=document.getElementById('export-senior-btn');
  if(expBtn)expBtn.onclick=()=>{
    const dObs=scopedObs();
    const dAvg=(arr)=>{const v=arr.filter(x=>x>0);return v.length?(v.reduce((a,b)=>a+b,0)/v.length):0};
    exportCSV('senior-dashboard-'+new Date().toISOString().split('T')[0]+'.csv',[
      {indicator:'Avg obs score',value:dAvg(dObs.map(o=>domAvg(o.scores)).filter(v=>v>0)).toFixed(2)},
      {indicator:'EEF mechanisms',value:totalMechs()+'/14'},
      {indicator:'Observations',value:dObs.length},
      {indicator:'Coaching triplets',value:S.triplets.length},
      {indicator:'Confidence avg',value:dAvg(dObs.filter(o=>o.conf>0).map(o=>o.conf)).toFixed(2)},
    ]);
  };
  // Schedule CSV export
  document.querySelectorAll('[data-export-sched]').forEach(el=>{
    el.onclick=()=>exportCSV('annual-schedule.csv',S.schedule.map(r=>({category:r.category,program:r.program,facilitator:r.facilitator,type:r.type,month:r.month,startDate:r.startDate,endDate:r.endDate,status:r.status})));
  });
  const saveBrand=document.querySelector('[data-save-brand]');
  if(saveBrand)saveBrand.onclick=()=>{
    S.branding.name=gv('brand-name')||'Waad Academy';
    S.branding.logo=gv('brand-logo')||'';
    S.branding.partners=[0,1,2,3,4,5].map(i=>gv('brand-partner-'+i)||'');
    save('branding',S.branding);
    showToast('Branding saved ✓');
    render();
  };

  // ── Domain rubric editor ────────────────────────────────────────────────
  // Save domains
  const saveDoms=document.querySelector('[data-save-domains]');
  if(saveDoms)saveDoms.onclick=()=>{
    const base=getDomains();
    const updated=base.map((d,di)=>{
      const nameEl=document.querySelector('.domain-name-input[data-di="'+di+'"]');
      const name=nameEl?nameEl.value.trim():d.n;
      const critEls=[...document.querySelectorAll('.crit-input[data-di="'+di+'"]')];
      const criteria=critEls.map(el=>el.value.trim()).filter(Boolean);
      return{id:d.id,n:name,criteria:criteria.length?criteria:d.criteria};
    });
    S.customDomains=updated;
    save('customDomains',S.customDomains);
    showToast('Observation rubric saved ✓');
    render();
  };
  // Reset domains
  const resetDoms=document.querySelector('[data-reset-domains]');
  if(resetDoms)resetDoms.onclick=()=>{
    if(!confirm('Reset to default criteria? Your custom criteria will be lost.'))return;
    S.customDomains=null;
    save('customDomains',null);
    showToast('Rubric reset to defaults ✓');
    render();
  };
  // Add criterion
  document.querySelectorAll('[data-add-crit]').forEach(el=>{
    el.onclick=()=>{
      const di=parseInt(el.dataset.addCrit);
      const base=getDomains();
      const updated=base.map((d,i)=>i===di?{...d,criteria:[...d.criteria,'New criterion']}:d);
      S.customDomains=updated;
      save('customDomains',S.customDomains);
      render();
    };
  });
  // Delete criterion
  document.querySelectorAll('[data-del-crit]').forEach(el=>{
    el.onclick=()=>{
      const[di,ci]= el.dataset.delCrit.split('-').map(Number);
      const base=getDomains();
      if(base[di].criteria.length<=1){showToast('Domain must have at least 1 criterion','error');return;}
      const updated=base.map((d,i)=>i===di?{...d,criteria:d.criteria.filter((_,j)=>j!==ci)}:d);
      S.customDomains=updated;
      save('customDomains',S.customDomains);
      render();
    };
  });

  // Deletes
  // ── Edit obs ────────────────────────────────────────────────────────────
  document.querySelectorAll('[data-edit-obs]').forEach(el=>{
    el.onclick=()=>{
      const o=S.observations.find(o=>o.id===el.dataset.editObs);
      if(o){S.editingId={type:'obs',id:o.id};S.modal=renderModal('obs',{...o,isEdit:true});render();}
    };
  });
  // ── Edit LW ─────────────────────────────────────────────────────────────
  document.querySelectorAll('[data-edit-lw]').forEach(el=>{
    el.onclick=()=>{
      const lw=S.lwalks.find(l=>l.id===el.dataset.editLw);
      if(lw){S.editingId={type:'lw',id:lw.id};S.modal=renderModal('lw',lw);render();}
    };
  });
  // ── Edit CPD ─────────────────────────────────────────────────────────────
  document.querySelectorAll('[data-edit-cpd]').forEach(el=>{
    el.onclick=()=>{
      const c=S.cpd.find(c=>c.id===el.dataset.editCpd);
      if(c){S.editingId={type:'cpd',id:c.id};S.modal=renderModal('cpd',c);render();}
    };
  });
  // ── Edit Trip ────────────────────────────────────────────────────────────
  document.querySelectorAll('[data-edit-trip]').forEach(el=>{
    el.onclick=()=>{
      const t=S.triplets.find(t=>t.id===el.dataset.editTrip);
      if(t){S.editingId={type:'trip',id:t.id};S.modal=renderModal('trip',t);render();}
    };
  });
  // ── Edit impact ──────────────────────────────────────────────────────────
  document.querySelectorAll('[data-edit-impact]').forEach(el=>{
    el.onclick=()=>{
      const i=S.impacts.find(i=>i.id===el.dataset.editImpact);
      if(i){S.editingId={type:'impact',id:i.id};S.modal=renderModal('impact',i);render();}
    };
  });
  // ── Edit progress ────────────────────────────────────────────────────────
  document.querySelectorAll('[data-edit-prog]').forEach(el=>{
    el.onclick=()=>{
      const p=S.progress.find(p=>p.id===el.dataset.editProg);
      if(p){S.editingId={type:'prog',id:p.id};S.progMode=p.mode;S.modal=renderModal('prog',p);render();}
    };
  });
  // ── Edit/Delete group ────────────────────────────────────────────────────
  document.querySelectorAll('[data-edit-group]').forEach(el=>{
    el.onclick=()=>{
      const g=S.groups.find(g=>g.id===el.dataset.editGroup);
      if(g){S.editingId={type:'group',id:g.id};S.modal=renderModal('group',g);render();}
    };
  });
  document.querySelectorAll('[data-del-group]').forEach(el=>{
    el.onclick=()=>{
      const g=S.groups.find(g=>g.id===el.dataset.delGroup);
      if(!g)return;
      const hasTeachers=S.teachers.filter(t=>t.groupId===g.id).length;
      if(hasTeachers&&!confirm(hasTeachers+' teachers in this group will be unassigned. Delete anyway?'))return;
      S.groups=S.groups.filter(gr=>gr.id!==g.id);
      S.teachers=S.teachers.map(t=>t.groupId===g.id?{...t,groupId:''}:t);
      save('groups',S.groups);save('teachers',S.teachers);
      showToast('Group deleted');render();
    };
  });
  // ── Steplab toggles ──────────────────────────────────────────────────────
  document.querySelectorAll('[data-sl-obs]').forEach(el=>{
    el.onchange=()=>{
      S.observations=S.observations.map(o=>o.id===el.dataset.slObs?{...o,slLinked:el.checked}:o);
      save('obs',S.observations);
      showToast(el.checked?'Linked to Steplab ✓':'Unlinked from Steplab');
      render();
    };
  });
  document.querySelectorAll('[data-sl-trip]').forEach(el=>{
    el.onchange=()=>{
      S.triplets=S.triplets.map(t=>t.id===el.dataset.slTrip?{...t,slLinked:el.checked}:t);
      save('trips',S.triplets);
      showToast(el.checked?'Linked to Steplab ✓':'Unlinked from Steplab');
      render();
    };
  });
  // ── Deletes ──────────────────────────────────────────────────────────────
  document.querySelectorAll('[data-del-obs]').forEach(el=>{
    el.onclick=()=>{if(!confirm('Delete this observation?'))return;S.observations=S.observations.filter(o=>o.id!==el.dataset.delObs);save('obs',S.observations);showToast('Deleted');render();};
  });
  document.querySelectorAll('[data-del-lw]').forEach(el=>{
    el.onclick=()=>{S.lwalks=S.lwalks.filter(o=>o.id!==el.dataset.delLw);save('lwalks',S.lwalks);showToast('Deleted');render();};
  });
  document.querySelectorAll('[data-del-cpd]').forEach(el=>{
    el.onclick=()=>{S.cpd=S.cpd.filter(o=>o.id!==el.dataset.delCpd);save('cpd',S.cpd);showToast('Deleted');render();};
  });
  document.querySelectorAll('[data-del-trip]').forEach(el=>{
    el.onclick=()=>{S.triplets=S.triplets.filter(o=>o.id!==el.dataset.delTrip);save('trips',S.triplets);showToast('Deleted');render();};
  });
  document.querySelectorAll('[data-del-sched]').forEach(el=>{
    el.onclick=()=>{S.schedule=S.schedule.filter(o=>o.id!==el.dataset.delSched);save('sched',S.schedule);showToast('Deleted');render();};
  });
  document.querySelectorAll('[data-del-teacher]').forEach(el=>{
    el.onclick=()=>{S.teachers=S.teachers.filter(o=>o.id!==el.dataset.delTeacher);save('teachers',S.teachers);showToast('Deleted');render();};
  });
  document.querySelectorAll('[data-del-user]').forEach(el=>{
    el.onclick=()=>{S.users=S.users.filter(o=>o.id!==el.dataset.delUser);save('users',S.users);showToast('Deleted');render();};
  });
  document.querySelectorAll('[data-del-impact]').forEach(el=>{
    el.onclick=()=>{S.impacts=S.impacts.filter(o=>o.id!==el.dataset.delImpact);save('impacts',S.impacts);showToast('Deleted');render();};
  });
  document.querySelectorAll('[data-del-prog]').forEach(el=>{
    el.onclick=()=>{S.progress=S.progress.filter(o=>o.id!==el.dataset.delProg);save('progress',S.progress);showToast('Deleted');render();};
  });
  document.querySelectorAll('[data-del-res]').forEach(el=>{
    el.onclick=()=>{S.resources=S.resources.filter(o=>o.id!==el.dataset.delRes);save('resources',S.resources);showToast('Deleted');render();};
  });
}

// ═══ CSV EXPORT ══════════════════════════════════════════════════════════════
function exportCSV(filename, rows){
  if(!rows||!rows.length)return;
  const keys=Object.keys(rows[0]);
  const csv=[keys.join(','),...rows.map(r=>keys.map(k=>{const v=String(r[k]||'').replace(/"/g,'""');return '"'+v+'"';}).join(','))].join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download=filename;
  a.click();
}

// ═══ BOOT ═════════════════════════════════════════════════════════════════════
loadAll();
render();
</script>
