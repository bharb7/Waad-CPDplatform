<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Waad Academy — School Improvement Platform v12</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --navy:#1a2744;--navy2:#243057;--teal:#0d9488;--teal2:#0f766e;
  --gold:#d97706;--red:#dc2626;--green:#16a34a;--blue:#2563eb;
  --purple:#7c3aed;--bg:#f1f5f9;--white:#fff;--border:#e2e8f0;
  --text:#1e293b;--muted:#64748b;--light:#f8fafc;
  --sidebar:220px;
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:14px;}
/* ---- LAYOUT ---- */
#app{display:flex;min-height:100vh;}
#sidebar{width:var(--sidebar);background:var(--navy);color:#fff;display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;overflow-y:auto;}
#main{margin-left:var(--sidebar);flex:1;display:flex;flex-direction:column;min-height:100vh;}
#topbar{background:var(--navy2);color:#fff;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #2d3f6b;position:sticky;top:0;z-index:50;}
#content{padding:24px;flex:1;}
/* ---- SIDEBAR ---- */
.sb-logo{padding:20px 16px 12px;border-bottom:1px solid #2d3f6b;}
.sb-logo .school-name{font-size:13px;font-weight:700;color:#fff;line-height:1.3;}
.sb-logo .platform-name{font-size:11px;color:#94a3b8;margin-top:2px;}
.sb-user{padding:10px 16px;border-bottom:1px solid #2d3f6b;font-size:11px;color:#94a3b8;}
.sb-user strong{display:block;color:#e2e8f0;font-size:12px;}
nav a{display:flex;align-items:center;gap:8px;padding:9px 16px;color:#cbd5e1;text-decoration:none;font-size:13px;transition:background .15s;}
nav a:hover,nav a.active{background:#2d3f6b;color:#fff;}
nav a .icon{width:18px;text-align:center;font-size:14px;}
.sb-footer{margin-top:auto;padding:12px 16px;border-top:1px solid #2d3f6b;}
.sb-footer .live-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:#86efac;}
.sb-footer .live-dot{width:6px;height:6px;background:#4ade80;border-radius:50%;}
/* ---- TOPBAR ---- */
.topbar-title{font-size:15px;font-weight:600;}
.topbar-right{display:flex;align-items:center;gap:12px;font-size:12px;color:#94a3b8;}
/* ---- CARDS & UI ---- */
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:8px;}
.page-title{font-size:20px;font-weight:700;color:var(--navy);}
.page-sub{font-size:12px;color:var(--muted);margin-top:2px;}
.card{background:var(--white);border-radius:10px;border:1px solid var(--border);padding:20px;margin-bottom:16px;}
.card-title{font-size:14px;font-weight:600;margin-bottom:12px;color:var(--navy);}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:16px;}
.stat-card{background:var(--white);border:1px solid var(--border);border-radius:8px;padding:14px;text-align:center;}
.stat-val{font-size:28px;font-weight:700;color:var(--navy);}
.stat-val.teal{color:var(--teal);}
.stat-val.gold{color:var(--gold);}
.stat-val.green{color:var(--green);}
.stat-val.blue{color:var(--blue);}
.stat-label{font-size:11px;color:var(--muted);margin-top:4px;}
.stat-sub{font-size:10px;color:var(--muted);}
/* ---- BUTTONS ---- */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:6px;border:none;cursor:pointer;font-size:13px;font-weight:500;transition:all .15s;}
.btn-primary{background:var(--navy);color:#fff;}
.btn-primary:hover{background:var(--navy2);}
.btn-teal{background:var(--teal);color:#fff;}
.btn-teal:hover{background:var(--teal2);}
.btn-green{background:var(--green);color:#fff;}
.btn-gold{background:var(--gold);color:#fff;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text);}
.btn-outline:hover{background:var(--bg);}
.btn-sm{padding:4px 10px;font-size:12px;}
.btn-danger{background:var(--red);color:#fff;}
.btn-danger:hover{filter:brightness(.9);}
/* ---- FORMS ---- */
.form-group{margin-bottom:14px;}
label.form-label{display:block;font-size:12px;font-weight:600;color:var(--text);margin-bottom:4px;}
input[type=text],input[type=password],input[type=date],input[type=number],textarea,select{
  width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px;
  background:var(--white);color:var(--text);outline:none;
}
input:focus,textarea:focus,select:focus{border-color:var(--teal);}
textarea{resize:vertical;min-height:60px;}
/* ---- TABLES ---- */
table{width:100%;border-collapse:collapse;}
th,td{padding:9px 12px;text-align:left;border-bottom:1px solid var(--border);font-size:13px;}
th{background:var(--light);font-weight:600;color:var(--navy);font-size:12px;}
tr:hover td{background:#f8fafc;}
/* ---- BADGES ---- */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;}
.badge-navy{background:#dbeafe;color:var(--navy);}
.badge-teal{background:#ccfbf1;color:var(--teal2);}
.badge-gold{background:#fef3c7;color:#92400e;}
.badge-green{background:#dcfce7;color:#166534;}
.badge-red{background:#fee2e2;color:var(--red);}
.badge-purple{background:#ede9fe;color:var(--purple);}
.badge-gray{background:#f1f5f9;color:var(--muted);}
/* ---- MODALS ---- */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;}
.modal{background:var(--white);border-radius:12px;width:100%;max-width:680px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3);}
.modal-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--white);z-index:1;}
.modal-title{font-size:16px;font-weight:700;color:var(--navy);}
.modal-body{padding:20px;}
.modal-footer{padding:12px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;background:var(--white);position:sticky;bottom:0;}
.close-btn{background:none;border:none;font-size:18px;cursor:pointer;color:var(--muted);padding:4px;}
/* ---- TABS ---- */
.tabs{display:flex;gap:4px;border-bottom:2px solid var(--border);margin-bottom:16px;flex-wrap:wrap;}
.tab-btn{padding:8px 14px;border:none;background:none;cursor:pointer;font-size:13px;font-weight:500;color:var(--muted);border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .15s;}
.tab-btn.active{color:var(--navy);border-bottom-color:var(--navy);}
/* ---- LOGIN ---- */
#login-screen{position:fixed;inset:0;background:var(--navy);display:flex;align-items:center;justify-content:center;z-index:9999;}
.login-box{background:#fff;border-radius:14px;padding:36px;width:380px;box-shadow:0 20px 60px rgba(0,0,0,.4);}
.login-logo{text-align:center;margin-bottom:24px;}
.login-logo .school{font-size:18px;font-weight:700;color:var(--navy);}
.login-logo .sub{font-size:12px;color:var(--muted);}
.login-error{background:#fee2e2;color:var(--red);padding:8px 12px;border-radius:6px;font-size:12px;margin-bottom:12px;display:none;}
/* ---- TEACHER GROUPS ---- */
.tlc-group{background:var(--white);border:1px solid var(--border);border-radius:10px;margin-bottom:16px;overflow:hidden;}
.tlc-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--light);border-bottom:1px solid var(--border);}
.tlc-name{font-weight:600;font-size:14px;color:var(--navy);}
.tlc-body{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;padding:14px;}
.teacher-card{border:1px solid var(--border);border-radius:8px;padding:12px;}
.teacher-name{font-weight:600;font-size:13px;}
.teacher-meta{font-size:11px;color:var(--muted);margin:2px 0 6px;}
.teacher-actions{display:flex;gap:6px;margin-top:8px;align-items:center;}
/* ---- OBSERVATION LIST ---- */
.obs-card{background:var(--white);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:10px;}
.obs-header{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;}
.obs-teacher{font-weight:600;font-size:14px;}
.obs-meta{font-size:11px;color:var(--muted);}
.obs-score{font-size:18px;font-weight:700;color:var(--teal);white-space:nowrap;}
.obs-domains{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0;font-size:11px;color:var(--muted);}
.obs-feedback{font-size:12px;margin:4px 0;}
.obs-feedback span{font-weight:600;}
.obs-actions{display:flex;gap:8px;align-items:center;margin-top:8px;}
/* ---- DOMAIN TABS IN OBS FORM ---- */
.domain-tabs{display:flex;gap:2px;margin-bottom:14px;flex-wrap:wrap;}
.domain-tab{padding:6px 12px;border:1px solid var(--border);border-radius:6px;cursor:pointer;font-size:12px;background:var(--white);color:var(--muted);}
.domain-tab.active{background:var(--navy);color:#fff;border-color:var(--navy);}
.criteria-grid{display:grid;gap:10px;}
.criteria-item label{font-size:13px;font-weight:500;display:block;margin-bottom:4px;}
.score-row{display:flex;gap:6px;}
.score-btn{width:36px;height:36px;border-radius:6px;border:1px solid var(--border);background:var(--white);cursor:pointer;font-size:13px;font-weight:600;color:var(--muted);transition:all .15s;}
.score-btn.selected{background:var(--navy);color:#fff;border-color:var(--navy);}
/* ---- IMPACT ---- */
.impact-tabs{display:flex;gap:4px;margin-bottom:16px;flex-wrap:wrap;}
.impact-tab{padding:8px 14px;border-radius:6px;border:1px solid var(--border);cursor:pointer;font-size:13px;font-weight:500;color:var(--muted);background:var(--white);}
.impact-tab.active{background:var(--navy);color:#fff;border-color:var(--navy);}
.level-card{border:2px solid;border-radius:10px;padding:16px;margin-bottom:12px;}
.level-card.l1{border-color:#2563eb;background:#eff6ff;}
.level-card.l2{border-color:#d97706;background:#fffbeb;}
.level-card.l3{border-color:#16a34a;background:#f0fdf4;}
.level-title{font-size:14px;font-weight:700;margin-bottom:12px;}
.level-title.l1{color:#1d4ed8;}
.level-title.l2{color:#b45309;}
.level-title.l3{color:#15803d;}
.indicator-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;}
.indicator-card{background:var(--white);border:1px solid var(--border);border-radius:8px;padding:12px;}
.indicator-name{font-size:12px;font-weight:600;color:var(--navy);margin-bottom:4px;}
.indicator-score{font-size:22px;font-weight:700;color:var(--teal);}
.indicator-badges{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;}
.indicator-bar{height:4px;background:var(--border);border-radius:2px;margin-top:8px;}
.indicator-bar-fill{height:100%;background:var(--teal);border-radius:2px;}
/* ---- CHECKLIST ---- */
.check-grid{display:grid;gap:8px;}
.check-item{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:6px;border:1px solid var(--border);background:var(--white);}
.check-item input[type=checkbox]{width:16px;height:16px;cursor:pointer;}
/* ---- PROCESS AUDIT ---- */
.audit-domain{margin-bottom:20px;}
.audit-domain-title{font-size:13px;font-weight:700;color:var(--navy);margin-bottom:8px;padding-bottom:4px;border-bottom:2px solid var(--border);}
.audit-criterion{display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--border);}
.audit-criterion-label{flex:1;font-size:13px;}
.audit-score-row{display:flex;gap:4px;}
.audit-score-btn{width:28px;height:28px;border-radius:4px;border:1px solid var(--border);background:var(--white);cursor:pointer;font-size:12px;font-weight:600;color:var(--muted);}
.audit-score-btn.sel{background:var(--teal);color:#fff;border-color:var(--teal);}
/* ---- SCHEDULE ---- */
.schedule-month{margin-bottom:20px;}
.schedule-month-title{font-size:15px;font-weight:700;color:var(--navy);margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.event-row{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:6px;background:var(--white);border:1px solid var(--border);margin-bottom:6px;}
.event-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.event-dot.whole-school{background:var(--navy);}
.event-dot.dept{background:var(--teal);}
.event-dot.obs{background:var(--gold);}
.event-dot.coaching{background:var(--purple);}
.event-info{flex:1;}
.event-title{font-size:13px;font-weight:600;}
.event-meta{font-size:11px;color:var(--muted);}
/* ---- EEF CARDS ---- */
.eef-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;}
.eef-card{border:1px solid var(--border);border-radius:8px;padding:14px;background:var(--white);}
.eef-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:4px;}
.eef-mechanism{font-size:13px;font-weight:600;margin-bottom:6px;}
.eef-status{font-size:12px;}
.eef-status.full{color:var(--green);}
.eef-status.partial{color:var(--gold);}
.eef-status.absent{color:var(--red);}
/* ---- RESOURCES ---- */
.resource-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;}
.resource-card{border:1px solid var(--border);border-radius:8px;padding:14px;background:var(--white);}
.resource-title{font-size:13px;font-weight:600;margin-bottom:4px;}
.resource-desc{font-size:12px;color:var(--muted);margin-bottom:8px;}
/* ---- STEPLAB ---- */
.steplab-card{border:1px solid var(--border);border-radius:8px;padding:14px;background:var(--white);margin-bottom:10px;}
/* ---- COACHING ---- */
.coaching-card{border:1px solid var(--border);border-radius:8px;padding:14px;background:var(--white);margin-bottom:10px;}
/* ---- NOTIFICATIONS ---- */
#toast{position:fixed;bottom:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px;}
.toast-item{padding:10px 16px;border-radius:8px;color:#fff;font-size:13px;box-shadow:0 4px 12px rgba(0,0,0,.2);animation:slideIn .2s ease;}
.toast-success{background:var(--green);}
.toast-error{background:var(--red);}
.toast-info{background:var(--blue);}
@keyframes slideIn{from{transform:translateX(100%);opacity:0;}to{transform:translateX(0);opacity:1;}}
/* ---- FILTER BAR ---- */
.filter-bar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.filter-bar label{font-size:12px;font-weight:600;color:var(--muted);}
.filter-bar select{width:auto;min-width:140px;}
/* ---- PROGRESS BAR ---- */
.progress-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden;}
.progress-fill{height:100%;border-radius:3px;transition:width .3s;}
/* ---- HEAT MAP ---- */
.heat-table{border-collapse:collapse;width:100%;}
.heat-table th,.heat-table td{padding:6px 10px;border:1px solid var(--border);font-size:12px;}
.heat-table th{background:var(--light);text-align:center;}
.heat-0{background:#fee2e2;}
.heat-1{background:#fef3c7;}
.heat-2{background:#d1fae5;}
.heat-3{background:#a7f3d0;}
/* ---- ROLE MATRIX ---- */
.role-matrix th{font-size:11px;padding:4px;}
.role-matrix td{font-size:12px;text-align:center;}
.role-check{color:var(--green);}
/* ---- SUBJECT PILLS ---- */
.subject-pills{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;}
.subject-pill{padding:4px 10px;border-radius:20px;font-size:12px;border:1px solid var(--border);cursor:pointer;user-select:none;background:var(--white);}
.subject-pill.selected{background:var(--navy);color:#fff;border-color:var(--navy);}
/* ---- RESPONSIVE ---- */
@media(max-width:768px){
  #sidebar{width:100%;position:relative;height:auto;}
  #main{margin-left:0;}
  .stat-grid{grid-template-columns:repeat(2,1fr);}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <div style="font-size:32px;margin-bottom:8px;">🏫</div>
      <div class="school">Waad Academy</div>
      <div class="sub">School Improvement Platform v12</div>
    </div>
    <div class="login-error" id="login-error">Invalid username or password.</div>
    <div class="form-group">
      <label class="form-label">Username</label>
      <input type="text" id="login-user" placeholder="Enter username" autocomplete="username"/>
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" id="login-pass" placeholder="Enter password" autocomplete="current-password"/>
    </div>
    <button class="btn btn-primary" style="width:100%;justify-content:center;" onclick="doLogin()">Sign In</button>
    <p style="text-align:center;font-size:11px;color:#94a3b8;margin-top:12px;">Default admin: admin / waad2026</p>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none;">
  <!-- SIDEBAR -->
  <div id="sidebar">
    <div class="sb-logo">
      <div class="school-name" id="sb-school-name">🏫 Waad Academy</div>
      <div class="platform-name">School Improvement Platform</div>
    </div>
    <div class="sb-user">
      <strong id="sb-user-name">Admin</strong>
      <span id="sb-user-role">Administrator</span>
    </div>
    <nav id="sidebar-nav"></nav>
    <div class="sb-footer">
      <div class="live-badge"><span class="live-dot"></span> Live</div>
      <div style="font-size:11px;color:#64748b;margin-top:4px;" id="sb-obs-count">0 obs recorded</div>
    </div>
  </div>

  <!-- MAIN -->
  <div id="main">
    <div id="topbar">
      <div class="topbar-title" id="topbar-title">Dashboard</div>
      <div class="topbar-right">
        <span id="topbar-user"></span>
        <button class="btn btn-sm btn-outline" style="color:#fff;border-color:#4a5568;" onclick="doLogout()">Sign Out</button>
      </div>
    </div>
    <div id="content"></div>
  </div>
</div>

<!-- MODAL CONTAINER -->
<div id="modal-container"></div>
<!-- TOAST -->
<div id="toast"></div>

<script>
// ============================================================
// CONSTANTS
// ============================================================

const BIOL_OG_TECHNIQUES = [

  'Simultaneous response','Metacognition: Obvious organisers','Metacognition: Think alouds',
  'Retrieval practice','Spaced practice','Interleaving','Elaborative interrogation'
];
const NEASC_LPS = ['LP1','LP2','LP3','LP4','LP5','LP6','LP7','LP8','LP9','LP10'];
const EEF_MECHANISMS = [
  {id:'M1',label:'Build knowledge of content and techniques',status:'partial'},
  {id:'M2',label:'Build knowledge of self and identity',status:'partial'},
  {id:'M3',label:'Motivate staff to engage',status:'partial'},

function uid(){return Math.random().toString(36).substr(2,9);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function avg(arr){if(!arr.length)return 0;return arr.reduce((a,b)=>a+b,0)/arr.length;}
function toast(msg,type='success'){
  const t=document.getElementById('toast');
  const d=document.createElement('div');
  d.className=`toast-item toast-${type}`;
  d.textContent=msg;
  t.appendChild(d);
  setTimeout(()=>d.remove(),3000);
}

// Get filtered observations by dept/subject
function getFilteredObs(deptFilter){
  if(!deptFilter||deptFilter==='Whole School'||deptFilter==='all') return DB.observations;
  return DB.observations.filter(o=>o.dept===deptFilter||o.subject===deptFilter);
}

const BUILT_IN_ADMIN = {id:'admin',name:'Admin',username:'admin',password:'waad2026',role:'admin',depts:[],fullName:'Administrator'};

function doLogin(){
  const u=document.getElementById('login-user').value.trim();
  const p=document.getElementById('login-pass').value;
  // Check built-in
  let found=null;
  if(u===BUILT_IN_ADMIN.username&&p===BUILT_IN_ADMIN.password){found=BUILT_IN_ADMIN;}
  else{found=DB.users.find(x=>x.username===u&&x.password===p);}
  if(!found){
    document.getElementById('login-error').style.display='block';
    return;
  }
  currentUser=found;
  localStorage.setItem('waad_v12_session',JSON.stringify({id:found.id,username:found.username}));
  startApp();
}

function restoreSession(){
  const s=localStorage.getItem('waad_v12_session');
  if(!s)return false;
  try{
    const sess=JSON.parse(s);
    if(sess.username===BUILT_IN_ADMIN.username){currentUser=BUILT_IN_ADMIN;return true;}
    const u=DB.users.find(x=>x.username===sess.username);
    if(u){currentUser=u;return true;}
  }catch(e){}
  return false;
}

function doLogout(){
  currentUser=null;
  localStorage.removeItem('waad_v12_session');
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('app').style.display='none';
}

// ============================================================
// APP START
// ============================================================
function startApp(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='flex';
  buildSidebar();
  navigateTo('dashboard');
}

function getUserRole(){
  if(!currentUser)return null;
  const roleKey=currentUser.role;
  return DB.roles.find(r=>r.key===roleKey)||BUILT_IN_ROLES.find(r=>r.key===roleKey)||null;
}

function canAccess(page){
  const role=getUserRole();
  if(!role)return false;
  return role.access.includes(page);
}

function isAdmin(){return currentUser&&currentUser.role==='admin';}

function buildSidebar(){
  document.getElementById('sb-school-name').textContent='🏫 '+(DB.settings.schoolName||'Waad Academy');
  document.getElementById('sb-user-name').textContent=currentUser.fullName||currentUser.name||currentUser.username;
  const roleObj=getUserRole();
  document.getElementById('sb-user-role').textContent=roleObj?roleObj.label:'';
  document.getElementById('topbar-user').textContent=(currentUser.fullName||currentUser.username)+' · '+(roleObj?roleObj.label:'');
  const nav=document.getElementById('sidebar-nav');
  nav.innerHTML='';
  PAGES.forEach(p=>{
    if(!canAccess(p))return;
    const a=document.createElement('a');
    a.href='#';
    a.dataset.page=p;
    a.innerHTML=PAGE_LABELS[p];
    a.onclick=(e)=>{e.preventDefault();navigateTo(p);};
    nav.appendChild(a);
  });
  updateObCount();
}

function updateObCount(){
  const el=document.getElementById('sb-obs-count');
  if(el) el.textContent=DB.observations.length+' obs recorded';
}

function navigateTo(page){
  if(!canAccess(page)){toast('Access denied','error');return;}
  currentPage=page;
  document.getElementById('topbar-title').textContent=PAGE_LABELS[page].replace(/^\S+\s/,'');
  document.querySelectorAll('nav a').forEach(a=>a.classList.toggle('active',a.dataset.page===page));
  const content=document.getElementById('content');
  content.innerHTML='';
  const pages={
    dashboard:renderDashboard,schedule:renderSchedule,teachers:renderTeachers,
    cpds:renderCPDs,coaching:renderCoaching,effectivecpd:renderEffectiveCPD,
    impact:renderImpact,audit:renderAudit,resources:renderResources,
    steplab:renderSteplab,settings:renderSettings
  };
  if(pages[page]) pages[page](content);
}

function renderTeachersList(){
  const el=document.getElementById('teachers-list');
  if(!el)return;
  if(!DB.groups.length&&!DB.teachers.length){
    el.innerHTML='<div class="card" style="text-align:center;color:var(--muted);padding:40px;">No teachers or groups yet. Add teachers and create TLC groups.</div>';
    return;
  }
  // Ungrouped teachers
  const groupedIds=DB.groups.flatMap(g=>g.teacherIds||[]);
  const ungrouped=DB.teachers.filter(t=>!groupedIds.includes(t.id));
  
  let html='';
  DB.groups.forEach(g=>{
    const members=DB.teachers.filter(t=>(g.teacherIds||[]).includes(t.id));
    html+=`<div class="tlc-group">
      <div class="tlc-header">
        <div style="display:flex;align-items:center;gap:8px;">
          <span class="event-dot ${g.color||'whole-school'}"></span>
          <span class="tlc-name">${esc(g.name)}</span>

        </div>
        ${isAdmin()?`<div style="display:flex;gap:6px;"><button class="btn btn-sm btn-outline" onclick="openEditGroup('${g.id}')">✏️ Edit</button>
        <button class="btn btn-sm btn-danger" onclick="deleteGroup('${g.id}')">× Delete</button></div>`:''}
      </div>
      <div class="tlc-body">
        ${members.map(t=>{
          const tObs=DB.observations.filter(o=>o.teacherId===t.id);
          const tAvg=tObs.length?avg(tObs.map(o=>o.totalScore||0)).toFixed(1):0;
          return `<div class="teacher-card">
            <div class="teacher-name">${esc(t.name)}</div>
            <div class="teacher-meta">${esc(t.subject||'')} · ${esc(t.section||'')} · ${esc(t.phase||'')}</div>
            <div style="display:flex;gap:6px;margin-top:4px;flex-wrap:wrap;">
              ${tObs.length?`<span class="badge badge-teal">${tObs.length} obs</span>`:'<span style="font-size:11px;color:var(--muted)">0 obs</span>'}
              ${tAvg>0?`<span class="badge badge-navy">${tAvg}/5</span>`:''}
            </div>
            <div class="teacher-actions">
              <button class="btn btn-sm btn-teal" onclick="openAddObsForTeacher('${t.id}')">+ Obs</button>
              <button class="btn btn-sm btn-outline" title="Edit teacher" onclick="openEditTeacher('${t.id}')">✏️</button>
              ${isAdmin()?`<button class="btn btn-sm btn-danger" onclick="deleteTeacher('${t.id}')">×</button>`:''}
            </div>
          </div>`;
        }).join('')}
        ${!members.length?'<div style="color:var(--muted);font-size:13px;padding:8px;">No teachers in this group</div>':''}
      </div>
    </div>`;
  });
  if(ungrouped.length){
    html+=`<div class="tlc-group">
      <div class="tlc-header"><span class="tlc-name" style="color:var(--muted)">Ungrouped Teachers</span></div>
      <div class="tlc-body">${ungrouped.map(t=>`<div class="teacher-card">
        <div class="teacher-name">${esc(t.name)}</div>
        <div class="teacher-meta">${esc(t.subject||'')} · ${esc(t.section||'')}</div>
        <div class="teacher-actions">
          <button class="btn btn-sm btn-teal" onclick="openAddObsForTeacher('${t.id}')">+ Obs</button>
          <button class="btn btn-sm btn-outline" onclick="openEditTeacher('${t.id}')">✏️</button>
        </div>
      </div>`).join('')}</div>
    </div>`;
  }
  el.innerHTML=html||'<div class="card" style="text-align:center;color:var(--muted);">No teachers yet.</div>';
}

function obsSelectTeacher(id){
  const t=DB.teachers.find(x=>x.id===id);
  if(t){
    obsFormData.teacherId=id;obsFormData.teacher=t.name;
    obsFormData.subject=t.subject;obsFormData.dept=t.dept;obsFormData.section=t.section;
    const si=document.getElementById('obs-subject');
    if(si)si.value=t.subject;
  }
}

function obsToggleTechnique(t){
  const arr=obsFormData.techniques=obsFormData.techniques||[];
  const i=arr.indexOf(t);
  if(i>=0)arr.splice(i,1);else arr.push(t);
  document.querySelectorAll('#obs-techniques .subject-pill').forEach(el=>{
    el.classList.toggle('selected',arr.includes(el.textContent));
  });
  updateDomainTabs();
}

function obsToggleLP(l){
  const arr=obsFormData.lps=obsFormData.lps||[];
  const i=arr.indexOf(l);
  if(i>=0)arr.splice(i,1);else arr.push(l);
  document.querySelectorAll('#obs-lps .subject-pill').forEach(el=>{
    el.classList.toggle('selected',arr.includes(el.textContent));
  });
}

function switchObsDomain(key){
  obsActiveDomain=key;
  document.querySelectorAll('.domain-tab').forEach((el,i)=>{
    el.classList.toggle('active',DOMAINS[i].key===key);
  });
  renderDomainCriteriaPanel();
}

function renderDomainCriteriaPanel(){
  const panel=document.getElementById('domain-criteria-panel');
  if(!panel)return;
  const domain=DOMAINS.find(d=>d.key===obsActiveDomain);
  if(!domain)return;
  const scores=obsFormData.scores||{};
  panel.innerHTML=`<div class="criteria-grid">
    ${domain.criteria.map((c,i)=>{
      const scoreKey=`${domain.key}_${i}`;
      const val=scores[scoreKey]||0;
      return `<div class="criteria-item">
        <label>${c}</label>
        <div class="score-row">
          ${[1,2,3,4,5].map(n=>`<button class="score-btn${val===n?' selected':''}" onclick="setScore('${scoreKey}',${n})">${n}</button>`).join('')}
        </div>
      </div>`;
    }).join('')}
  </div>`;
}

function setScore(key,val){
  if(!obsFormData.scores)obsFormData.scores={};
  obsFormData.scores[key]=val;
  // Recalculate domain average
  DOMAINS.forEach(d=>{
    const domainScores=d.criteria.map((_,i)=>obsFormData.scores[`${d.key}_${i}`]||0).filter(s=>s>0);
    obsFormData[d.key]=domainScores.length?avg(domainScores):0;
  });
  renderDomainCriteriaPanel();
  updateDomainTabs();
}

function updateDomainTabs(){
  document.querySelectorAll('.domain-tab').forEach((el,i)=>{
    const d=DOMAINS[i];
    el.textContent=`${d.label} (${(obsFormData[d.key]||0).toFixed(1)})`;
    el.classList.toggle('active',obsActiveDomain===d.key);
  });
}

function saveObs(){
  obsFormData.observer=document.getElementById('obs-observer').value.trim();
  obsFormData.date=document.getElementById('obs-date').value;
  obsFormData.subject=document.getElementById('obs-subject').value.trim();
  obsFormData.www=document.getElementById('obs-www').value.trim();
  obsFormData.ebi=document.getElementById('obs-ebi').value.trim();
  obsFormData.action=document.getElementById('obs-action').value.trim();
  obsFormData.steplab=document.getElementById('obs-steplab').checked;
  // teacher from select if not yet set
  const sel=document.getElementById('obs-teacher-sel');
  if(sel&&sel.value&&!obsFormData.teacherId) obsSelectTeacher(sel.value);
  if(!obsFormData.teacher){toast('Select a teacher','error');return;}
  const allScores=[obsFormData.d1,obsFormData.d2,obsFormData.d3,obsFormData.d4,obsFormData.d5].filter(s=>s>0);
  obsFormData.totalScore=allScores.length?avg(allScores):0;
  obsFormData.dept=obsFormData.dept||obsFormData.subject;
  if(obsEditId){
    const idx=DB.observations.findIndex(x=>x.id===obsEditId);
    if(idx>=0) DB.observations[idx]={...DB.observations[idx],...obsFormData,id:obsEditId};
    toast('Observation updated');
  } else {
    DB.observations.push({id:uid(),...obsFormData});
    toast('Observation saved');
  }
  saveDB();updateObCount();closeModal();renderCPDTabContent();
}

function getMonthFromDate(dateStr){
  if(!dateStr)return MONTHS_2526[0];

  return month;
}

// ── STUDENT PROGRESS ── exact v7: card with mode toggle top-right, filter row, subject averages panel, full table
function renderStudentProgressTab(el){
  let sp=DB.studentProgress;
  if(impactDeptFilter&&impactDeptFilter!=='Whole School'){
    sp=sp.filter(x=>x.subject===impactDeptFilter||x.dept===impactDeptFilter);
  }
  // Apply SP-level filters
  if(spGradeFilter&&spGradeFilter!=='All Grades') sp=sp.filter(x=>x.grade===spGradeFilter);
  if(spSectionFilter&&spSectionFilter!=='All Sections') sp=sp.filter(x=>x.section===spSectionFilter);
  if(spSubjectSearch) sp=sp.filter(x=>(x.subject||'').toLowerCase().includes(spSubjectSearch.toLowerCase()));

  const stages=['Baseline','Mid-Term 1','End of Term 1','Mid-Term 2','End of Term 2'];
  const spInternal=sp.filter(x=>x.mode==='internal'||!x.mode);
  const spExternal=sp.filter(x=>x.mode==='external');
  const spPortfolio=sp.filter(x=>x.mode==='portfolio');

  // Build subject averages from all internal regardless of row-level filters
  let allSP=DB.studentProgress.filter(x=>x.mode==='internal'||!x.mode);
  if(impactDeptFilter&&impactDeptFilter!=='Whole School') allSP=allSP.filter(x=>x.subject===impactDeptFilter||x.dept===impactDeptFilter);
  const bySubjAvg={};
  allSP.forEach(r=>{
    if(!bySubjAvg[r.subject])bySubjAvg[r.subject]={};
    stages.forEach(s=>{ if(r[s]>0){ if(!bySubjAvg[r.subject][s])bySubjAvg[r.subject][s]=[]; bySubjAvg[r.subject][s].push(r[s]); }});
  });

function exportSPCSV(){
  const stages=['Baseline','Mid-Term 1','End of Term 1','Mid-Term 2','End of Term 2'];
  const rows=DB.studentProgress.filter(x=>x.mode==='internal'||!x.mode);
  const headers=['Subject','Dept','Grade','Section','Class',...stages,'Entered by','Date'];
  const csv=[headers.join(','),...rows.map(r=>[r.subject,r.dept,r.grade,r.section,r.class,...stages.map(s=>r[s]||''),r.enteredBy,r.date].map(v=>`"${v||''}"`).join(','))].join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download='student_progress.csv';a.click();
  toast('CSV downloaded');
}

const AUDIT_DOMAINS=[

  {label:'Implementation (IM)',items:['Protected time allocated for CPD','Line manager CPD conversations happening','Steplab/action steps tracked and followed up','Impact data collected at L1, L2, L3','Student outcome data linked to CPD focus']},
  {label:'Leadership & Culture (LC)',items:['Senior leader models growth mindset','CPD embedded in performance management','Staff voice informs programme direction','Subject coordinators lead TLC groups','Board/governance awareness of CPD programme']},
];
function renderAudit(el){
  el.innerHTML=`
  <div class="page-header">
    <div><div class="page-title">Process Quality Audit — Section 9</div><div class="page-sub">Self-assessment against 20 evidence-based criteria</div></div>
    <button class="btn btn-teal" onclick="saveAuditRatings()">✓ Save Ratings</button>
  </div>
  <div id="audit-body">
  ${AUDIT_DOMAINS.map((dom,di)=>`
    <div class="card audit-domain">
      <div class="audit-domain-title">${dom.label}</div>
      ${dom.items.map((item,ii)=>{
        const key=`${di}_${ii}`;
        const cur=DB.auditRatings[key]||0;
        return `<div class="audit-criterion">
          <div class="audit-criterion-label">${item}</div>
          <div class="audit-score-row">
            ${[1,2,3,4,5].map(n=>`<button class="audit-score-btn${cur===n?' sel':''}" onclick="setAuditScore('${key}',${n})">${n}</button>`).join('')}
          </div>
          <span class="badge ${cur>=4?'badge-green':cur>=3?'badge-gold':cur>0?'badge-red':'badge-gray'}">${cur||'—'}/5</span>
        </div>`;
      }).join('')}
    </div>
  `).join('')}
  </div>`;
}
function setAuditScore(key,val){
  DB.auditRatings[key]=val;
  // Re-render audit score buttons without full re-render
  document.querySelectorAll(`[onclick="setAuditScore('${key}',${val})"]`).forEach(btn=>{
    const row=btn.closest('.audit-score-row');
    if(row){
      row.querySelectorAll('.audit-score-btn').forEach((b,i)=>b.classList.toggle('sel',i+1===val));
    }
  });
  const badge=document.querySelector(`[onclick="setAuditScore('${key}',${val})"]`)?.closest('.audit-criterion')?.querySelector('.badge');
  if(badge){badge.textContent=val+'/5';badge.className=`badge ${val>=4?'badge-green':val>=3?'badge-gold':'badge-red'}`;}
}

    <div style="overflow-x:auto;">
    <table class="role-matrix">
      <thead><tr><th>Role</th>${PAGES.map(p=>`<th title="${PAGE_LABELS[p]}">${p.substring(0,4)}</th>`).join('')}<th>Edit</th><th>Scope</th><th></th></tr></thead>
      <tbody>
        ${DB.roles.map(r=>`
          <tr>
            <td><strong>${r.label}</strong><br/><span style="font-size:10px;color:var(--muted)">(${r.key})</span></td>
            ${PAGES.map(p=>`<td>${r.access.includes(p)?'<span class="role-check">✓</span>':'·'}</td>`).join('')}
            <td>${r.canEdit?'✓':'·'}</td>
            <td>${r.scoped?'dept':'all'}</td>
            <td>${r.key!=='admin'?`<button class="btn btn-sm btn-outline" onclick="openEditRole('${r.key}')">✏️</button>
              <button class="btn btn-sm btn-danger" onclick="deleteRole('${r.key}')">×</button>`:'<span style="color:var(--muted);font-size:11px;">built-in</span>'}</td>
          </tr>
        `).join('')}
      </tbody>
    </table>
    </div>
  </div>
  <!-- OBS RUBRIC -->
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;">
      <div class="card-title" style="margin:0;">📋 Observation Rubric — Domains & Criteria</div>
      <button class="btn btn-sm btn-outline" onclick="toast('Rubric reset to defaults','info')">↺ Reset to Defaults</button>
    </div>
    <table style="margin-top:12px;">
      <thead><tr><th>Domain</th><th>Criteria</th></tr></thead>
      <tbody>
        ${DOMAINS.map(d=>`<tr><td><strong>${d.label}</strong></td><td style="font-size:12px;">${d.criteria.join(' · ')}</td></tr>`).join('')}
      </tbody>
    </table>
  </div>`;
}

function getRoleLabel(key){
  const r=DB.roles.find(x=>x.key===key)||BUILT_IN_ROLES.find(x=>x.key===key);
  return r?r.label:key;
}
function saveBranding(){
  DB.settings.schoolName=document.getElementById('set-name').value.trim()||'Waad Academy';
  const logo=document.getElementById('set-logo').value.trim();
  DB.settings.logos=logo?[logo]:[];
  DB.settings.partnerLogos=document.getElementById('set-partner-logos').value.split('\n').map(s=>s.trim()).filter(Boolean);
  saveDB();
  document.getElementById('sb-school-name').textContent='🏫 '+DB.settings.schoolName;
  document.getElementById('topbar-title').textContent='Settings';
  toast('Branding saved');
}

// FIX: Add/Edit user with multi-subject selection
function openAddUser(){
  openModal('Add User',userFormHTML(),()=>{
    const fn=document.getElementById('u-fullname').value.trim();
    const un=document.getElementById('u-username').value.trim();
    const pw=document.getElementById('u-password').value;
    const role=document.getElementById('u-role').value;
    if(!fn||!un||!pw){toast('All fields required','error');return;}
    if(DB.users.find(x=>x.username===un)||un==='admin'){toast('Username already exists','error');return;}
    const depts=[...document.querySelectorAll('#u-dept-pills .subject-pill.selected')].map(p=>p.textContent);
    DB.users.push({id:uid(),fullName:fn,name:fn,username:un,password:pw,role,depts});
    saveDB();closeModal();renderSettings(document.getElementById('content'));toast('User created');
  });
}
function openEditUser(id){
  const u=DB.users.find(x=>x.id===id);if(!u)return;
  openModal('Edit User',userFormHTML(u),()=>{
    u.fullName=document.getElementById('u-fullname').value.trim();
    u.name=u.fullName;
    const newPw=document.getElementById('u-password').value;
    if(newPw)u.password=newPw;
    u.role=document.getElementById('u-role').value;
    u.username=document.getElementById('u-username').value.trim()||u.username;
    u.depts=[...document.querySelectorAll('#u-dept-pills .subject-pill.selected')].map(p=>p.textContent);
    saveDB();closeModal();renderSettings(document.getElementById('content'));toast('User updated');
  });
}
function userFormHTML(u){
  return `
  <div class="form-group"><label class="form-label">Full Name (Arabic/English)</label><input type="text" id="u-fullname" value="${esc(u?u.fullName||u.name||'':'')}"/></div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
    <div class="form-group"><label class="form-label">Username</label><input type="text" id="u-username" value="${esc(u?u.username:'')}"/></div>
    <div class="form-group"><label class="form-label">Password ${u?'(leave blank to keep)':''}</label><input type="password" id="u-password"/></div>
  </div>
  <div class="form-group"><label class="form-label">Role</label>
    <select id="u-role" onchange="showRoleAccess(this.value)">
      ${DB.roles.map(r=>`<option value="${r.key}" ${u&&u.role===r.key?'selected':''}>${r.label}</option>`).join('')}
    </select>
    <div id="u-role-access" style="font-size:11px;color:var(--muted);margin-top:4px;"></div>
  </div>
  <div class="form-group">
    <label class="form-label">Responsible for departments/subjects (tick all that apply)</label>
    <div class="subject-pills" id="u-dept-pills">
      ${SUBJECTS.map(s=>`<div class="subject-pill${u&&(u.depts||[]).includes(s)?' selected':''}" onclick="this.classList.toggle('selected')">${esc(s)}</div>`).join('')}
    </div>
  </div>`;
}
function showRoleAccess(roleKey){
  const r=DB.roles.find(x=>x.key===roleKey);
  const el=document.getElementById('u-role-access');
  if(el&&r) el.textContent='Access: '+r.access.join(' · ');
}

function deleteUser(id){
  if(!confirm('Delete this user?'))return;
  DB.users=DB.users.filter(x=>x.id!==id);
  saveDB();renderSettings(document.getElementById('content'));toast('User deleted');
}

function openAddRole(){
  openModal('Add Custom Role',`
    <div class="form-group"><label class="form-label">Role Key (no spaces)</label><input type="text" id="role-key" placeholder="e.g. sciLead"/></div>
    <div class="form-group"><label class="form-label">Label</label><input type="text" id="role-label" placeholder="e.g. Science Lead"/></div>
    <div class="form-group"><label class="form-label">Access (select pages)</label>
      <div class="subject-pills">${PAGES.map(p=>`<div class="subject-pill" onclick="this.classList.toggle('selected')">${p}</div>`).join('')}</div></div>
    <div class="form-group"><label class="form-label">Can Edit?</label>
      <select id="role-canedit"><option value="1">Yes</option><option value="0">No</option></select></div>
    <div class="form-group"><label class="form-label">Dept-Scoped?</label>
      <select id="role-scoped"><option value="0">No (see all)</option><option value="1">Yes (own depts only)</option></select></div>
  `,()=>{
    const key=document.getElementById('role-key').value.trim().replace(/\s+/g,'');
    const label=document.getElementById('role-label').value.trim();
    if(!key||!label){toast('Key and label required','error');return;}
    if(DB.roles.find(r=>r.key===key)){toast('Role key exists','error');return;}
    const access=[...document.querySelectorAll('#modal-container .subject-pill.selected')].map(p=>p.textContent);
    DB.roles.push({key,label,access,canEdit:document.getElementById('role-canedit').value==='1',scoped:document.getElementById('role-scoped').value==='1'});
    saveDB();closeModal();renderSettings(document.getElementById('content'));toast('Role created');
  });
}
function openEditRole(key){
  const r=DB.roles.find(x=>x.key===key);if(!r)return;
  openModal('Edit Role: '+r.label,`
    <div class="form-group"><label class="form-label">Label</label><input type="text" id="role-label" value="${esc(r.label)}"/></div>
    <div class="form-group"><label class="form-label">Access</label>
      <div class="subject-pills">${PAGES.map(p=>`<div class="subject-pill${r.access.includes(p)?' selected':''}" onclick="this.classList.toggle('selected')">${p}</div>`).join('')}</div></div>
    <div class="form-group"><label class="form-label">Can Edit?</label>
      <select id="role-canedit"><option value="1"${r.canEdit?' selected':''}>Yes</option><option value="0"${!r.canEdit?' selected':''}>No</option></select></div>
  `,()=>{
    r.label=document.getElementById('role-label').value.trim();
    r.access=[...document.querySelectorAll('#modal-container .subject-pill.selected')].map(p=>p.textContent);
    r.canEdit=document.getElementById('role-canedit').value==='1';
    saveDB();closeModal();renderSettings(document.getElementById('content'));toast('Role updated');
  });
}
function deleteRole(key){
  if(!confirm('Delete this role?'))return;
  DB.roles=DB.roles.filter(r=>r.key!==key);
  saveDB();renderSettings(document.getElementById('content'));toast('Role deleted');
}

// ============================================================
// MODAL ENGINE
// ============================================================
function openModal(title,body,onSave,saveLabel='Save'){
  const mc=document.getElementById('modal-container');
  mc.innerHTML=`
  <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">${esc(title)}</div>
        <button class="close-btn" onclick="closeModal()">×</button>
      </div>
      <div class="modal-body">${body}</div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="__modalSave()">${saveLabel} ✓</button>
      </div>
    </div>
  </div>`;
  window.__modalSave=onSave;
}
function closeModal(){
  document.getElementById('modal-container').innerHTML='';
}

// ============================================================
// LOGIN KEY HANDLER
// ============================================================
document.addEventListener('keydown',e=>{
  if(e.key==='Enter'){
    if(document.getElementById('login-screen').style.display!=='none'){doLogin();}
  }
});

// ============================================================
// BOOT
// ============================================================
initDB();
if(restoreSession()){
  startApp();
} else {
  document.getElementById('login-screen').style.display='flex';
}

// Auto-save every 30s
setInterval(()=>{saveDB();},30000);
</script>
