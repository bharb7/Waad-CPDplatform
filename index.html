.nav-item:hover{background:rgba(255,255,255,.08);color:#fff}
.nav-item.active{background:rgba(255,255,255,.15);color:#fff;font-weight:600}
.main{flex:1;overflow:auto}
.topbar{background:#fff;border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;justify-content:space-between}
.topbar h2{font-size:16px;font-weight:700;color:var(--text)}
.content{padding:20px;max-width:1200px}
.card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:14px}
.card-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:10px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}

.kpi-val{font-size:28px;font-weight:800;color:var(--navy)}

.btn{padding:6px 13px;border-radius:6px;border:none;font-weight:600;font-size:12px;cursor:pointer}

function avg(arr){const v=arr.filter(x=>x>0);return v.length?v.reduce((a,b)=>a+b,0)/v.length:0}
function domAvg(scores){const all=Object.values(scores||{}).flat();return avg(all)}
function scScore(scores){return avg([...(scores?.d3||[]),...(scores?.d4||[])])}
function tStats(t){
  const obs=S.observations.filter(o=>o.tid===t.id);
  const last=obs[obs.length-1];const prev=obs[obs.length-2];
  const la=last?domAvg(last.scores):0;const pa=prev?domAvg(prev.scores):0;
  return{obs,last,la,pa,trend:la&&pa?la-pa:0,sc:last?scScore(last.scores):0,conf:last?.conf||0,count:obs.length,trips:S.triplets.filter(tr=>tr.oid===t.id||tr.cid===t.id||tr.fid===t.id).length};
}
function mechActive(id){
  if(S.mechM[id]!==undefined)return S.mechM[id];
  const obs=scopedObs(),trips=S.triplets;
  if(id===1)return obs.some(o=>o.bio||o.customTech);
  if(id===2)return S.cpd.some(c=>c.during);
  if(id===3)return obs.some(o=>o.bio||o.customTech);
  if(id===5)return S.cpd.some(c=>c.before);
  if(id===8)return obs.some(o=>o.bio||o.customTech);
  if(id===9)return obs.some(o=>(o.scores?.d4||[]).some(v=>v>=3));
  if(id===10)return obs.some(o=>o.ebi)||trips.some(t=>t.ebiNotes);
  if(id===11)return obs.some(o=>o.slLinked)||trips.some(t=>t.slLinked);
  if(id===12)return trips.some(t=>t.action);
  if(id===13)return trips.some(t=>t.action&&t.dd);
  if(id===14)return trips.filter(t=>t.status==='complete').length>=2;
  return false;
}

function totalDH(){return DH_PILLARS.filter(p=>S.dhM[p.id]!==undefined?S.dhM[p.id]:mechActive(p.id*2-1)||mechActive(p.id*2)).length}

function isScoped(){return !isAdmin()&&!!myRole()?.scoped&&(S.session?.depts||[]).length>0}
function myDepts(){return S.session?.depts||[]}
function scopedObs(){
  if(!isScoped())return S.observations;
  return S.observations.filter(o=>{
    if(!o.tid)return false;
    const t=S.teachers.find(t=>t.id===o.tid);
    return t&&myDepts().includes(t.dept);
  });
}
function scopedTeachers(){
  if(!isScoped())return S.teachers;
  return S.teachers.filter(t=>myDepts().includes(t.dept));
}

function renderImpact(){
  const tab=S.impTab||'L1';
  const dept=S.impactDept||'';
  let obs=scopedObs(),lws=S.lwalks,trips=S.triplets;
  if(dept){
    obs=obs.filter(o=>{if(!o.tid)return false;const t=S.teachers.find(t=>t.id===o.tid);return t&&t.dept===dept;});
    lws=lws.filter(lw=>lw.dept===dept);
    trips=trips.filter(tr=>{const ot=S.teachers.find(t=>t.id===tr.oid);return ot&&ot.dept===dept;});
  }
  const impacts=S.impacts.filter(i=>{
    if(tab==='progress')return false;
    if(i.level!==tab.replace('L',''))return false;
    if(dept&&i.tid){const t=S.teachers.find(t=>t.id===i.tid);return t&&t.dept===dept;}
    return true;
  });
  const progress=dept?S.progress.filter(p=>p.dept===dept):S.progress;
  // L1 — FIXED: only count if actual data exists, no default 3.5
  const confObs=obs.filter(o=>o.conf>0);
  const avgConf=confObs.length>0?avg(confObs.map(o=>o.conf)):0;
  const autoL1=[
    ...confObs.map(o=>{const t=S.teachers.find(t=>t.id===o.tid);return{type:'confidence',source:'Observation',teacher:t?.name,value:o.conf+'/5',date:o.date,evidence:'Technique: '+esc(techDisplay(o)||'none')}}),
    ...trips.filter(t=>t.action).map(t=>{const tc=S.teachers.find(tc=>tc.id===t.oid);return{type:'action-step',source:'Coaching',teacher:tc?.name,value:'Action set',date:t.od,evidence:'Steplab action: '+esc(t.action)}}),
  ];
  const autoL2=[
    ...obs.filter(o=>domAvg(o.scores)>0).map(o=>{const t=S.teachers.find(t=>t.id===o.tid);const da=domAvg(o.scores);return{type:'obs-domain-score',source:'Observation',teacher:t?.name,value:da.toFixed(1)+'/5',date:o.date,evidence:'5-domain avg · SC: '+(scScore(o.scores).toFixed(1)||'—')+'/5'}}),
    ...lws.filter(lw=>lw.afd).map(lw=>({type:'learning-walk',source:'Learning Walk',teacher:null,value:esc(lw.dept||'All'),date:lw.date,evidence:'AFD: '+esc(lw.afd)})),
  ];

  const lowD=getDomains().map(d=>({d,a:avg(obs.flatMap(o=>o.scores?.[d.id]||[]).filter(x=>x>0))})).filter(x=>x.a>0&&x.a<3);
  return `
${lowD.length?`<div class="alert alert-warn mb-3"><strong>💡 Smart Suggestions:</strong> ${lowD.map(x=>'<span class="badge badge-amber ml-1">'+x.d.n+' ('+x.a.toFixed(1)+'/5)</span>').join('')}</div>`:''}
${canEdit()?'<div class="mb-3"><button class="btn btn-primary" data-modal="resource">+ Add Resource</button></div>':''}
<div class="grid-2">${S.resources.map(r=>`<div class="card" style="border-left:3px solid var(--navy)">
  <div class="flex justify-between items-start mb-1">
    <a href="${r.url||'#'}" target="_blank" style="font-weight:600;font-size:13px;color:var(--navy);text-decoration:none">${esc(r.title)} ↗</a>
    ${canEdit()?`<button class="btn btn-sm btn-danger" data-del-res="${r.id}">✕</button>`:''}
  </div>
  <div class="text-xs text-muted">${esc(r.desc||'')}</div>
</div>`).join('')}</div>`}

function renderSteplab(){
  const obs=scopedObs();
  const linked=obs.filter(o=>o.slLinked).length;
  const trips=S.triplets.filter(t=>t.slLinked).length;
  return `
<div class="alert alert-info mb-3">
  <strong>Steplab Integration:</strong> Track which observations and coaching sessions have been logged in Steplab.
  <a href="https://steplab.co" target="_blank" class="btn btn-sm btn-ghost ml-2">Open Steplab ↗</a>
</div>
<div class="grid-3 mb-3">
  <div class="kpi"><div class="kpi-val">${linked}</div><div class="kpi-label">Observations linked</div></div>
  <div class="kpi"><div class="kpi-val">${trips}</div><div class="kpi-label">Triplets linked</div></div>
  <div class="kpi"><div class="kpi-val">${linked+trips>0&&(obs.length+S.triplets.length)>0?Math.round((linked+trips)/(obs.length+S.triplets.length)*100)+'%':'—'}</div><div class="kpi-label">Sync rate</div></div>
</div>
${obs.filter(o=>o.slLinked).map(o=>{
  const t=S.teachers.find(t=>t.id===o.tid);
  return `<div class="card" style="border-left:3px solid var(--teal)">
    <div class="flex justify-between items-center">
      <div><span style="font-weight:600;direction:auto">${esc(t?.name||'Whole School')}</span> <span class="text-xs text-muted">${o.date||''}</span></div>
      <span class="badge badge-green">✓ Steplab</span>
    </div>
    ${o.action?'<div class="text-xs mt-1">Action: '+esc(o.action)+'</div>':''}
  </div>`;
}).join('')}`}

function exportUsersForGitHub(){
  const allUsers=getAllUsers();
  const lines=allUsers.map(u=>`  {id:'${u.id}',name:'${(u.name||'').replace(/'/g,"\\'")}',fullName:'${(u.fullName||u.name||'').replace(/'/g,"\\'")}',username:'${u.username}',password:'${u.password}',role:'${u.role}',depts:${JSON.stringify(u.depts||[])}}`).join(',\n');
  window.__exportCode=`const SEED_USERS = [\n${lines}\n];`;
  S.modal=`<div class="modal-overlay" id="modal-overlay"><div class="modal">
    <div class="modal-header"><h3>⬇ Export Users for GitHub</h3><button class="btn btn-ghost btn-sm" data-close-modal>✕</button></div>
    <div class="modal-body">
      <div style="background:#f8fafc;border:1px solid var(--border);border-radius:6px;padding:12px;font-family:monospace;font-size:11px;white-space:pre-wrap;word-break:break-all;max-height:260px;overflow-y:auto">${esc(window.__exportCode)}</div>
      <div style="margin-top:12px;font-size:12px;color:var(--muted)">
        <strong>Steps:</strong><br>1. Tap Copy below<br>2. Go to GitHub → index.html → pencil icon<br>3. Find <code>const SEED_USERS = [</code> and replace that whole block<br>4. Commit → Vercel deploys in ~2 min → all devices have all accounts
      </div>
      <button class="btn btn-success" style="margin-top:10px;width:100%" id="copy-export-btn">📋 Copy to Clipboard</button>
    </div>
    <div class="modal-footer"><button class="btn btn-primary" data-close-modal>Close</button></div>
  </div></div>`;
  render();
}
function openModal(type,data={}){S.modal=renderModal(type,data);render()}

function techSelector(selId,customId,val,customVal){
  val=val||'';customVal=customVal||'';
  const isOther=(val==='Other');
  return `<div class="form-group"><label class="form-label">Biol-Og / Technique Focus</label>
    <select class="form-control" id="${selId}" onchange="handleTechChange('${selId}','${customId}')">
      <option value="">— None —</option>
      ${TECHS.map(t=>`<option ${val===t?'selected':''}>${t}</option>`).join('')}
    </select>
    <div id="${customId}-wrap" style="margin-top:6px;${isOther?'':'display:none'}">
      <input class="form-control" id="${customId}" placeholder="Type custom technique name..." value="${esc(customVal)}">
      <div style="font-size:10px;color:var(--teal);margin-top:3px">✓ Auto-links to NEASC LPs if technique name matches</div>
    </div>
  </div>`;
}
function handleTechChange(selId,customId){
  const sel=document.getElementById(selId);
  const wrap=document.getElementById(customId+'-wrap');
  if(sel&&wrap)wrap.style.display=sel.value==='Other'?'block':'none';
}
function getTechFromForm(selId,customId){
  const sel=(document.getElementById(selId)||{}).value||'';
  if(sel==='Other'){const cv=(document.getElementById(customId)||{}).value||'';return{bio:'Other',customTech:cv};}
  return{bio:sel==='— None —'||sel===''?'':sel,customTech:''};
}

function renderModal(type,data={}){
  const M=(title,body,footer)=>`<div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal-header"><h3>${title}</h3><button class="btn btn-ghost btn-sm" data-close-modal>✕</button></div>
      <div class="modal-body">${body}</div>
      <div class="modal-footer">${footer}</div>
    </div>
  </div>`;
  const FI=(id,lbl,val='',tp='text',ph='')=>`<div class="form-group"><label class="form-label">${lbl}</label><input class="form-control rtl" id="${id}" type="${tp}" value="${esc(val||'')}" placeholder="${esc(ph)}"></div>`;
  const FS=(id,lbl,opts,val='')=>`<div class="form-group"><label class="form-label">${lbl}</label><select class="form-control" id="${id}">${opts.map(o=>typeof o==='string'?'<option '+(val===o?'selected':'')+'>'+esc(o)+'</option>':'<option value="'+esc(o.v)+'" '+(val===o.v?'selected':'')+'>'+esc(o.l)+'</option>').join('')}</select></div>`;
  const FTA=(id,lbl,val='',rows=3)=>`<div class="form-group"><label class="form-label">${lbl}</label><textarea class="form-control rtl" id="${id}" rows="${rows}">${esc(val||'')}</textarea></div>`;
  const G2=(a,b)=>`<div class="grid-2">${a}${b}</div>`;
  const un=S.session?.name||'';

  if(type==='obs'){
    const isEdit=!!(data.id);
    const techVal=data.customTech?'Other':(data.bio||'');
    return M(`📋 ${isEdit?'Edit':'New'} Observation`,
      FS('obs-tid','Teacher',[{v:'',l:'— Whole School / Dept —'},...scopedTeachers().map(t=>({v:t.id,l:t.name+' ('+t.dept+')'}))],data.tid||'')+
      G2(FI('obs-date','Date',data.date||new Date().toISOString().split('T')[0],'date'),FI('obs-obs','Observed by',data.observer||un))+
      techSelector('obs-tech','obs-custom-tech',techVal,data.customTech||'')+
      '<div id="obs-domains">'+getDomains().map(d=>`<div class="form-group"><label class="form-label">${d.n}</label>
        <div class="flex gap-2 flex-wrap">${d.criteria.map((c,i)=>`
          <div style="background:var(--light);border-radius:6px;padding:6px 8px;flex:1;min-width:140px">
            <div class="text-xs text-muted mb-1">${c}</div>
            <div class="flex gap-1">${[1,2,3,4,5].map(n=>`<button type="button" data-score="${d.id}-${i}-${n}" style="width:26px;height:26px;border-radius:4px;border:1px solid var(--border);background:${(data.scores?.[d.id]?.[i]||0)===n?'var(--navy)':'var(--white)'};color:${(data.scores?.[d.id]?.[i]||0)===n?'#fff':'inherit'};font-size:11px;font-weight:600;cursor:pointer">${n}</button>`).join('')}</div>
          </div>`).join('')}</div></div>`).join('')+'</div>'+
      G2(FI('obs-conf','Confidence (1-5)',data.conf||'','number'),FS('obs-scope','Scope',['teacher','dept','boys','girls','school'],data.scope||'teacher'))+
      G2(FTA('obs-www','Key Strengths (WWW)',data.www||''),FTA('obs-ebi','Areas for Development (EBI)',data.ebi||''))+
      FTA('obs-action','Action Step (→ Steplab)',data.action||''),
      `<button class="btn btn-ghost" data-close-modal>Cancel</button><button class="btn btn-success" data-save-obs>${isEdit?'Update':'Save'} Observation</button>`
    );
  }

  if(type==='lw'){
    const isEdit=!!(data.id);
    const techVal=data.customTech?'Other':(data.bio||'');
    return M(`${isEdit?'✏ Edit':'🚶 New'} Learning Walk`,
      G2(FI('lw-date','Date',data.date||new Date().toISOString().split('T')[0],'date'),FI('lw-obs','Observer',data.observer||un))+
      G2(FS('lw-sect','Section',['','Boys','Girls'],data.section||''),FS('lw-dept','Department',['',...DEPTS],data.dept||''))+
      techSelector('lw-tech','lw-custom-tech',techVal,data.customTech||'')+
      FI('lw-focus','Focus Area / Question',data.focusArea||'','text','What are we looking for?')+
      G2(FTA('lw-str','Strengths',data.strengths||''),FTA('lw-afd','Areas for Development',data.afd||'')),
      `<button class="btn btn-ghost" data-close-modal>Cancel</button><button class="btn btn-success" data-save-lw>${isEdit?'Update Walk':'Save Walk'}</button>`
    );
  }

  if(type==='cpd'){
    const isEdit=!!(data.id);
    const techVal=data.customTech?'Other':(data.bio||'');
    return M(`${isEdit?'✏ Edit':'📚 New'} CPD Session`,
      FI('cpd-title','Session Title',data.title||'','text','e.g. AFL Workshop — Biology Dept')+
      G2(FI('cpd-date','Date',data.date||new Date().toISOString().split('T')[0],'date'),FI('cpd-fac','Facilitator',data.facilitator||un))+
      G2(FS('cpd-aud','Audience',['Whole School','Boys Section','Girls Section',...DEPTS.map(d=>d+' — Girls'),...DEPTS.map(d=>d+' — Boys')],data.audience||'Whole School'),
         FS('cpd-month','Month',MONTHS,data.month||MONTHS[0]))+
      G2(FS('cpd-type','Type',['Internal','External','Cambridge','COBIS','WLC','Other'],data.type||'Internal'),
         FS('cpd-del','Delivery',['Workshop','WLC','Course','Online','Face to Face','In School','Other'],data.delivery||'Workshop'))+
      techSelector('cpd-tech','cpd-custom-tech',techVal,data.customTech||'')+
      G2(FTA('cpd-bef','Before — Planned outcomes',data.before||''),FTA('cpd-dur','During — Activities',data.during||''))+
      FTA('cpd-aft','After — Implementation & monitoring',data.after||''),
      `<button class="btn btn-ghost" data-close-modal>Cancel</button><button class="btn btn-success" data-save-cpd>${isEdit?'Update Session':'Save Session'}</button>`
    );
  }

  if(type==='trip'){
    const isEdit=!!(data.id);
    const techVal=data.customTech?'Other':(data.bio||'');
    return M(`${isEdit?'✏ Edit':'🎯 New'} Coaching Triplet`,
      G2(FI('tr-name','Session Name',data.name||'','text','e.g. Term 1 Cycle 1'),
         FS('tr-gid','TLC Group',[{v:'',l:'— Select Group —'},...S.groups.map(g=>({v:g.id,l:g.name}))],data.gid||''))+
      G2(FS('tr-cycle','Cycle',[{v:1,l:'Cycle 1'},{v:2,l:'Cycle 2'},{v:3,l:'Cycle 3'}],data.cycle||1),
         FS('tr-status','Status',['planned','active','complete'],data.status||'planned'))+
      G2(FS('tr-oid','Observer (Teacher observed)',[{v:'',l:'— Select —'},...scopedTeachers().map(t=>({v:t.id,l:t.name}))],data.oid||''),
         FS('tr-cid','Coach',[{v:'',l:'— Select —'},...scopedTeachers().map(t=>({v:t.id,l:t.name}))],data.cid||''))+
      FS('tr-fid','Facilitator',[{v:'',l:'— Select —'},...scopedTeachers().map(t=>({v:t.id,l:t.name}))],data.fid||'')+
      techSelector('tr-tech','tr-custom-tech',techVal,data.customTech||'')+
      G2(FI('tr-od','Observe Date',data.od||'','date'),FI('tr-dd','CARE Debrief Date',data.dd||'','date'))+
      G2(FTA('tr-www','What Went Well (WWW)',data.wwwNotes||''),FTA('tr-ebi','Even Better If (EBI)',data.ebiNotes||''))+
      FTA('tr-action','Action Step → log in Steplab',data.action||'')+
      '<div class="alert alert-info mt-2" style="font-size:11px">After saving, log this action step in <a href="https://steplab.co" target="_blank" style="color:var(--navy);font-weight:600">Steplab ↗</a></div>',
      `<button class="btn btn-ghost" data-close-modal>Cancel</button><button class="btn btn-success" data-save-trip>${isEdit?'Update Triplet':'Save Triplet'}</button>`
    );
  }

  if(type==='sched'){
    return M('🗓 Add Schedule Entry',
      FS('sch-cat','Category',SCHED_CATS,SCHED_CATS[0])+
      FI('sch-prog','Programme Name','','text','e.g. Cambridge PDQ Teaching & Learning')+
      G2(FI('sch-fac','Facilitator',''),FI('sch-target','Target Audience',''))+
      G2(FS('sch-type','Type',['Cambridge','Internal','External','COBIS','WLC','Other'],'Internal'),
         FS('sch-del','Delivery',['Course','Workshop','WLC','Online','Face to Face','In School','Other'],'Workshop'))+
      G2(FI('sch-dur','Duration','','text','e.g. 60 min'),FS('sch-month','Month',MONTHS,MONTHS[0]))+
      G2(FI('sch-start','Start Date','','date'),FI('sch-end','End Date','','date')),
      '<button class="btn btn-ghost" data-close-modal>Cancel</button><button class="btn btn-success" data-save-sched>Save</button>'
    );
  }

  if(type==='teacher'){
    return M('👩‍🏫 Add Teacher',
      FI('tch-name','Full Name (Arabic/English)','','text','Teacher name')+
      G2(FS('tch-dept','Department',DEPTS,DEPTS[0]),FS('tch-sect','Section',SECTIONS,SECTIONS[0]))+
      G2(FS('tch-stage','Stage',STAGES,STAGES[0]),
         FS('tch-group','TLC Group',[{v:'',l:'— Select Group —'},...S.groups.map(g=>({v:g.id,l:g.name}))])),
      '<button class="btn btn-ghost" data-close-modal>Cancel</button><button class="btn btn-success" data-save-teacher>Save Teacher</button>'
    );
  }

  if(type==='user'){
    return M('👤 Add User',
      G2(FI('u-name','Full Name',''),FI('u-user','Username',''))+
      G2(FI('u-pass','Password','','password'),
         FS('u-role','Role',[...Object.entries(S.roleCfg).map(([k,r])=>({v:k,l:r.label||k}))],'viewer'))+
      `<div class="form-group"><label class="form-label">Departments (hold Ctrl/⌘ for multi-select)</label>
       <select class="form-control" id="u-depts" multiple size="5">${DEPTS.map(d=>'<option>'+d+'</option>').join('')}</select></div>`,
      '<button class="btn btn-ghost" data-close-modal>Cancel</button><button class="btn btn-success" data-save-user>Save User</button>'
    );
  }

  if(type==='impact'){
    const typeOpts={1:['confidence','knowledge-check','I-will-try-card','voice-survey','other'],2:['obs-domain-score','triplet-evidence','action-plan-rate','learning-walk','other'],3:['student-engagement','formative-assessment','questioning-depth','collaboration','student-ownership','other']};
    const lvl=data.level||'1';
    return M('📈 Add Impact Entry',

    };

      `<div class="tabs mb-3">${tabs.map(t=>`<button class="tab ${curTab===t?'active':''}" data-care-tab="${t}">${tLabels[t]}</button>`).join('')}</div>

      '<button class="btn btn-primary" data-close-modal>Close</button>'
    );
  }

  return M('Modal','<p>Coming soon</p>','<button class="btn btn-ghost" data-close-modal>Close</button>');

    const entry={...(editId?S.impacts.find(i=>i.id===editId):{}),id:editId||uid(),level:gv('imp-level'),type:gv('imp-type'),tid:gv('imp-tid')||null,value:gv('imp-val'),evidence:gv('imp-evidence'),date:gv('imp-date'),term:gv('imp-term')};
    S.impacts=editId?S.impacts.map(i=>i.id===editId?entry:i):[...S.impacts,entry];
    save('impacts',S.impacts);S.modal=null;S.editingId=null;showToast(editId?'Entry updated ✓':'Impact entry saved ✓');
  };

  // SAVE PROGRESS
  const saveProg=document.querySelector('[data-save-prog]');
  if(saveProg)saveProg.onclick=()=>{
    const editId=S.editingId?.type==='prog'?S.editingId.id:null;
    const mode=S.progMode||'internal';
    const cols=mode==='external'?['Mock 1','Mock 2','Official']:mode==='portfolio'?['Subject activation','Quality activation']:['Baseline','Mid-Term 1','End of Term 1','Mid-Term 2','End of Term 2'];
    const scores={};cols.forEach(c=>{const v=parseFloat(gv('pr-sc-'+c.replace(/ /g,'_')));if(v)scores[c]=v;});
    const entry={...(editId?S.progress.find(p=>p.id===editId):{}),id:editId||uid(),mode,subject:gv('pr-subj'),dept:gv('pr-dept'),grade:gv('pr-grade'),section:gv('pr-sect'),scores,folderLink:gv('pr-link')||''};
    S.progress=editId?S.progress.map(p=>p.id===editId?entry:p):[...S.progress,entry];
    save('progress',S.progress);S.modal=null;S.editingId=null;showToast(editId?'Progress updated ✓':'Progress saved ✓');
  };

  // IMPORT PROGRESS
  const doImport=g('do-import-prog');
  if(doImport)doImport.onclick=()=>{
    const url=gv('pi-url'),csv=gv('pi-csv');
    if(url){S.progress=[...S.progress,{id:uid(),mode:S.progMode||'internal',subject:'Imported',dept:'All',grade:'All',section:'All',scores:{},folderLink:url}];save('progress',S.progress);S.modal=null;showToast('Folder link saved ✓');return;}
    if(csv){
      const cols=['Baseline','Mid-Term 1','End of Term 1','Mid-Term 2','End of Term 2'];
      let count=0;
      csv.trim().split('\n').slice(1).forEach(line=>{
        const p=line.split(',').map(s=>s.trim().replace(/^"|"$/g,''));
        if(p.length>=4){const scores={};cols.forEach((c,i)=>{const v=parseFloat(p[4+i]);if(v)scores[c]=v;});S.progress.push({id:uid(),mode:S.progMode||'internal',subject:p[0]||'',dept:p[1]||'',grade:p[2]||'',section:p[3]||'',scores,folderLink:''});count++;}
      });
      save('progress',S.progress);S.modal=null;showToast(count+' rows imported ✓');return;
    }
    showToast('Enter a URL or paste CSV','error');
  };

  // SAVE RESOURCE
  const saveRes=document.querySelector('[data-save-res]');
  if(saveRes)saveRes.onclick=()=>{const title=gv('res-title');if(!title){showToast('Enter a title','error');return;}S.resources=[...S.resources,{id:uid(),title,url:gv('res-url'),desc:gv('res-desc')}];save('resources',S.resources);S.modal=null;showToast('Resource added ✓');};

  // SAVE ROLE
  const saveRole=document.querySelector('[data-save-role]');
  if(saveRole)saveRole.onclick=()=>{
    const editKey=(g('role-editkey')?.value||'').trim();
    const rawKey=(g('role-key')?.value||'').trim().replace(/\s+/g,'_');
    const key=editKey||rawKey,label=(g('role-label')?.value||'').trim();
    if(!key||!label){showToast('Key and label required','error');return;}
    if(!editKey&&S.roleCfg[key]){showToast('Role key already exists','error');return;}
    const views=[...document.querySelectorAll('.role-view-cb:checked')].map(cb=>cb.value);
    S.roleCfg[key]={...S.roleCfg[key],label,views,canEdit:g('role-canedit')?.checked||false,scoped:g('role-scoped')?.checked||false};
    save('roleCfg',S.roleCfg);S.modal=null;showToast('Role "'+label+'" '+(editKey?'updated':'created')+' ✓');
  };
  document.querySelectorAll('[data-edit-role]').forEach(el=>{el.onclick=()=>{S.modal=renderModal('role',{editKey:el.dataset.editRole});render();}});
  document.querySelectorAll('[data-del-role]').forEach(el=>{el.onclick=()=>{const key=el.dataset.delRole;if(key==='admin'){showToast('Cannot delete admin role','error');return;}if(!confirm('Delete role "'+key+'"?'))return;delete S.roleCfg[key];save('roleCfg',S.roleCfg);showToast('Role deleted');render();};});

  // BRANDING
  const saveBrand=document.querySelector('[data-save-brand]');
  if(saveBrand)saveBrand.onclick=()=>{S.branding.name=gv('brand-name')||'Waad Academy';S.branding.logo=gv('brand-logo')||'';S.branding.partners=[0,1,2,3,4,5].map(i=>gv('brand-partner-'+i)||'');save('branding',S.branding);showToast('Branding saved ✓');render();};

  // DOMAIN RUBRIC
  const saveDoms=document.querySelector('[data-save-domains]');
  if(saveDoms)saveDoms.onclick=()=>{
    const updated=getDomains().map((d,di)=>{
      const nameEl=document.querySelector('.domain-name-input[data-di="'+di+'"]');
      const name=nameEl?nameEl.value.trim():d.n;
      const criteria=[...document.querySelectorAll('.crit-input[data-di="'+di+'"]')].map(el=>el.value.trim()).filter(Boolean);
      return{id:d.id,n:name,criteria:criteria.length?criteria:d.criteria};
    });
    S.customDomains=updated;save('customDomains',S.customDomains);showToast('Observation rubric saved ✓');render();
  };
  const resetDoms=document.querySelector('[data-reset-domains]');
  if(resetDoms)resetDoms.onclick=()=>{if(!confirm('Reset to default criteria?'))return;S.customDomains=null;save('customDomains',null);showToast('Rubric reset ✓');render();};
  document.querySelectorAll('[data-add-crit]').forEach(el=>{el.onclick=()=>{const di=parseInt(el.dataset.addCrit);const base=getDomains();const updated=base.map((d,i)=>i===di?{...d,criteria:[...d.criteria,'New criterion']}:d);S.customDomains=updated;save('customDomains',S.customDomains);render();};});
  document.querySelectorAll('[data-del-crit]').forEach(el=>{el.onclick=()=>{const[di,ci]=el.dataset.delCrit.split('-').map(Number);const base=getDomains();if(base[di].criteria.length<=1){showToast('Must have at least 1 criterion','error');return;}const updated=base.map((d,i)=>i===di?{...d,criteria:d.criteria.filter((_,j)=>j!==ci)}:d);S.customDomains=updated;save('customDomains',S.customDomains);render();};});

  // EDIT handlers
  document.querySelectorAll('[data-edit-obs]').forEach(el=>{el.onclick=()=>{const o=S.observations.find(o=>o.id===el.dataset.editObs);if(o){S.editingId={type:'obs',id:o.id};S.modal=renderModal('obs',o);render();}}});
  document.querySelectorAll('[data-edit-lw]').forEach(el=>{el.onclick=()=>{const lw=S.lwalks.find(l=>l.id===el.dataset.editLw);if(lw){S.editingId={type:'lw',id:lw.id};S.modal=renderModal('lw',lw);render();}}});
  document.querySelectorAll('[data-edit-cpd]').forEach(el=>{el.onclick=()=>{const c=S.cpd.find(c=>c.id===el.dataset.editCpd);if(c){S.editingId={type:'cpd',id:c.id};S.modal=renderModal('cpd',c);render();}}});
  document.querySelectorAll('[data-edit-trip]').forEach(el=>{el.onclick=()=>{const t=S.triplets.find(t=>t.id===el.dataset.editTrip);if(t){S.editingId={type:'trip',id:t.id};S.modal=renderModal('trip',t);render();}}});
  document.querySelectorAll('[data-edit-impact]').forEach(el=>{el.onclick=()=>{const i=S.impacts.find(i=>i.id===el.dataset.editImpact);if(i){S.editingId={type:'impact',id:i.id};S.modal=renderModal('impact',i);render();}}});
  document.querySelectorAll('[data-edit-prog]').forEach(el=>{el.onclick=()=>{const p=S.progress.find(p=>p.id===el.dataset.editProg);if(p){S.editingId={type:'prog',id:p.id};S.progMode=p.mode;S.modal=renderModal('prog',p);render();}}});
  document.querySelectorAll('[data-edit-group]').forEach(el=>{el.onclick=()=>{const grp=S.groups.find(grp=>grp.id===el.dataset.editGroup);if(grp){S.editingId={type:'group',id:grp.id};S.modal=renderModal('group',grp);render();}}});
  document.querySelectorAll('[data-edit-teacher]').forEach(el=>{
    el.onclick=()=>{
      const t=S.teachers.find(t=>t.id===el.dataset.editTeacher);if(!t)return;
      S.modal=`<div class="modal-overlay" id="modal-overlay"><div class="modal">
        <div class="modal-header"><h3>✏ Edit Teacher</h3><button class="btn btn-ghost btn-sm" data-close-modal>✕</button></div>
        <div class="modal-body">
          <div class="form-group"><label class="form-label">Full Name</label><input class="form-control" id="et-name" value="${esc(t.name)}"></div>
          <div class="grid-2">
            <div class="form-group"><label class="form-label">Dept</label><select class="form-control" id="et-dept">${DEPTS.map(d=>'<option '+(t.dept===d?'selected':'')+'>'+d+'</option>').join('')}</select></div>
            <div class="form-group"><label class="form-label">Section</label><select class="form-control" id="et-sect"><option ${t.section==='Boys'?'selected':''}>Boys</option><option ${t.section==='Girls'?'selected':''}>Girls</option></select></div>
          </div>
          <div class="form-group"><label class="form-label">TLC Group</label><select class="form-control" id="et-group"><option value="">— None —</option>${S.groups.map(grp=>'<option value="'+grp.id+'" '+(t.groupId===grp.id?'selected':'')+'>'+esc(grp.name)+'</option>').join('')}</select></div>
        </div>
        <div class="modal-footer"><button class="btn btn-ghost" data-close-modal>Cancel</button><button class="btn btn-success" id="do-edit-tch">Save</button></div>
      </div></div>`;
      render();
      const btn=g('do-edit-tch');
      if(btn)btn.onclick=()=>{t.name=gv('et-name');t.dept=gv('et-dept');t.section=gv('et-sect');t.groupId=gv('et-group')||null;save('teachers',S.teachers);S.modal=null;showToast('Teacher updated ✓');render();};
    };
  });

  // Steplab toggles
  document.querySelectorAll('[data-sl-obs]').forEach(el=>{el.onchange=()=>{S.observations=S.observations.map(o=>o.id===el.dataset.slObs?{...o,slLinked:el.checked}:o);save('obs',S.observations);showToast(el.checked?'Linked to Steplab ✓':'Unlinked');render();}});
  document.querySelectorAll('[data-sl-trip]').forEach(el=>{el.onchange=()=>{S.triplets=S.triplets.map(t=>t.id===el.dataset.slTrip?{...t,slLinked:el.checked}:t);save('trips',S.triplets);showToast(el.checked?'Linked to Steplab ✓':'Unlinked');render();}});

  // DELETE handlers
  document.querySelectorAll('[data-del-obs]').forEach(el=>{el.onclick=()=>{if(!confirm('Delete this observation?'))return;S.observations=S.observations.filter(o=>o.id!==el.dataset.delObs);save('obs',S.observations);showToast('Deleted');render();}});
  document.querySelectorAll('[data-del-lw]').forEach(el=>{el.onclick=()=>{S.lwalks=S.lwalks.filter(o=>o.id!==el.dataset.delLw);save('lwalks',S.lwalks);showToast('Deleted');render();}});
  document.querySelectorAll('[data-del-cpd]').forEach(el=>{el.onclick=()=>{S.cpd=S.cpd.filter(o=>o.id!==el.dataset.delCpd);save('cpd',S.cpd);showToast('Deleted');render();}});
  document.querySelectorAll('[data-del-trip]').forEach(el=>{el.onclick=()=>{S.triplets=S.triplets.filter(o=>o.id!==el.dataset.delTrip);save('trips',S.triplets);showToast('Deleted');render();}});
  document.querySelectorAll('[data-del-sched]').forEach(el=>{el.onclick=()=>{S.schedule=S.schedule.filter(o=>o.id!==el.dataset.delSched);save('sched',S.schedule);showToast('Deleted');render();}});
  document.querySelectorAll('[data-del-teacher]').forEach(el=>{el.onclick=()=>{S.teachers=S.teachers.filter(o=>o.id!==el.dataset.delTeacher);save('teachers',S.teachers);showToast('Deleted');render();}});
  document.querySelectorAll('[data-del-user]').forEach(el=>{el.onclick=()=>{S.users=S.users.filter(o=>o.id!==el.dataset.delUser);save('users',S.users);showToast('Deleted');render();}});
  document.querySelectorAll('[data-del-impact]').forEach(el=>{el.onclick=()=>{S.impacts=S.impacts.filter(o=>o.id!==el.dataset.delImpact);save('impacts',S.impacts);showToast('Deleted');render();}});
  document.querySelectorAll('[data-del-prog]').forEach(el=>{el.onclick=()=>{S.progress=S.progress.filter(o=>o.id!==el.dataset.delProg);save('progress',S.progress);showToast('Deleted');render();}});
  document.querySelectorAll('[data-del-res]').forEach(el=>{el.onclick=()=>{S.resources=S.resources.filter(o=>o.id!==el.dataset.delRes);save('resources',S.resources);showToast('Deleted');render();}});
  document.querySelectorAll('[data-del-group]').forEach(el=>{el.onclick=()=>{const grp=S.groups.find(g=>g.id===el.dataset.delGroup);if(!grp)return;const has=S.teachers.filter(t=>t.groupId===grp.id).length;if(has&&!confirm(has+' teachers will be unassigned. Delete?'))return;S.groups=S.groups.filter(g=>g.id!==grp.id);S.teachers=S.teachers.map(t=>t.groupId===grp.id?{...t,groupId:''}:t);save('groups',S.groups);save('teachers',S.teachers);showToast('Group deleted');render();}});

  // Export CSV buttons
  const expBtn=g('export-senior-btn');
  if(expBtn)expBtn.onclick=()=>{
    const dObs=scopedObs();const dA=arr=>{const v=arr.filter(x=>x>0);return v.length?v.reduce((a,b)=>a+b,0)/v.length:0};
    exportCSV('senior-dashboard-'+new Date().toISOString().split('T')[0]+'.csv',[
      {indicator:'Avg obs score',value:dA(dObs.map(o=>domAvg(o.scores)).filter(v=>v>0)).toFixed(2)},
      {indicator:'EEF mechanisms',value:totalMechs()+'/14'},{indicator:'Observations',value:dObs.length},
      {indicator:'Coaching triplets',value:S.triplets.length},{indicator:'Confidence avg',value:dA(dObs.filter(o=>o.conf>0).map(o=>o.conf)).toFixed(2)},
    ]);
  };
  document.querySelectorAll('[data-export-sched]').forEach(el=>{el.onclick=()=>exportCSV('annual-schedule.csv',S.schedule.map(r=>({category:r.category,program:r.program,facilitator:r.facilitator,type:r.type,month:r.month,startDate:r.startDate,endDate:r.endDate,status:r.status})));});

  // Export users for GitHub
  const expUsersBtn=g('export-users-btn');if(expUsersBtn)expUsersBtn.onclick=()=>exportUsersForGitHub();
  const copyBtn=g('copy-export-btn');
  if(copyBtn)copyBtn.onclick=()=>{
    if(navigator.clipboard&&window.__exportCode){navigator.clipboard.writeText(window.__exportCode).then(()=>showToast('Copied! Paste into GitHub index.html')).catch(()=>showToast('Select text above and copy manually','error'));}
    else{showToast('Select the code above and copy manually','error');}
  };
}

function exportCSV(filename,rows){
  if(!rows||!rows.length)return;
  const keys=Object.keys(rows[0]);
  const csv=[keys.join(','),...rows.map(r=>keys.map(k=>{const v=String(r[k]||'').replace(/"/g,'""');return'"'+v+'"';}).join(','))].join('\n');
  const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);a.download=filename;a.click();
}

function getLPs(bio,customTech){
  if(customTech)return TECH_LP[customTech]||[];
  return TECH_LP[bio]||[];
}

loadAll();
render();
</script>
</body>
