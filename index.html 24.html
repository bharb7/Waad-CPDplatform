<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Waad Academy — School Improvement Platform</title>
<style>
:root{
  --navy:#1F4E79;--teal:#0F6E56;--amber:#7B4F0C;--red:#993C1D;
  --purple:#3C3489;--forest:#375C15;--bg:#f4f6fb;--white:#fff;
  --border:#e5e7eb;--text:#1a1a2e;--muted:#6b7280;--light:#f9fafb;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);min-height:100vh;font-size:14px}
input,select,textarea,button{font-family:inherit;font-size:13px}
button{cursor:pointer}
.app{display:flex;min-height:100vh}
.sidebar{width:200px;background:var(--navy);min-height:100vh;flex-shrink:0;display:flex;flex-direction:column}
.sidebar-logo{padding:16px 14px 12px;border-bottom:1px solid rgba(255,255,255,.1)}
.sidebar-logo h1{color:#fff;font-size:15px;font-weight:700}
.sidebar-logo p{color:rgba(255,255,255,.5);font-size:10px;margin-top:2px}
.nav-item{display:flex;align-items:center;gap:8px;padding:9px 14px;color:rgba(255,255,255,.7);text-decoration:none;cursor:pointer;border:none;background:none;width:100%;text-align:left;font-size:12.5px;transition:background .15s}
.nav-item:hover{background:rgba(255,255,255,.08);color:#fff}
.nav-item.active{background:rgba(255,255,255,.15);color:#fff;font-weight:600}
.main{flex:1;overflow:auto}
.topbar{background:#fff;border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;justify-content:space-between}
.topbar h2{font-size:16px;font-weight:700;color:var(--text)}
.content{padding:20px;max-width:1200px}
.card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:14px}
.card-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:10px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.kpi{background:#fff;border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center}
.kpi-val{font-size:28px;font-weight:800;color:var(--navy)}
.kpi-label{font-size:11px;color:var(--muted);margin-top:3px}
.btn{padding:6px 13px;border-radius:6px;border:none;font-weight:600;font-size:12px;cursor:pointer}
.btn-primary{background:var(--navy);color:#fff}
.btn-success{background:var(--teal);color:#fff}
.btn-danger{background:#fee2e2;color:var(--red);border:1px solid #fecaca}
.btn-ghost{background:var(--light);color:var(--text);border:1px solid var(--border)}
.btn-sm{padding:3px 8px;font-size:11px;border-radius:4px}
.form-group{margin-bottom:10px}
.form-label{font-size:11px;color:var(--muted);font-weight:600;display:block;margin-bottom:3px}
.form-control{width:100%;padding:7px 9px;border:1px solid var(--border);border-radius:6px;font-size:13px;background:#fafafa}
.form-control:focus{outline:2px solid var(--navy);border-color:var(--navy);background:#fff}
textarea.form-control{resize:vertical;min-height:60px}
table{width:100%;border-collapse:collapse;font-size:12.5px}
th{padding:7px 10px;text-align:left;font-size:11px;font-weight:600;color:var(--muted);background:var(--light);border-bottom:2px solid var(--border)}
td{padding:7px 10px;border-bottom:1px solid #f3f4f6}
tr:hover td{background:#fafafa}
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600}
.badge-green{background:#d1fae5;color:#065f46}
.badge-amber{background:#fef3c7;color:#92400e}
.badge-red{background:#fee2e2;color:#991b1b}
.badge-blue{background:#dbeafe;color:#1e40af}
.badge-gray{background:#f3f4f6;color:#374151}
.badge-purple{background:#ede9fe;color:#5b21b6}
.pbar{height:6px;background:#e5e7eb;border-radius:3px;overflow:hidden;margin-top:4px}
.pbar-fill{height:100%;border-radius:3px;transition:width .4s}
.pbar-navy{background:var(--navy)}.pbar-teal{background:var(--teal)}.pbar-amber{background:var(--amber)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:#fff;border-radius:12px;width:100%;max-width:600px;max-height:92vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:1}
.modal-header h3{font-size:14px;font-weight:700}
.modal-body{padding:16px}
.modal-footer{padding:12px 16px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;position:sticky;bottom:0;background:#fff}
.login-wrap{min-height:100vh;background:var(--navy);display:flex;align-items:center;justify-content:center}
.login-box{background:#fff;border-radius:14px;padding:32px;width:340px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.login-logo{text-align:center;margin-bottom:20px}
.login-logo h1{font-size:20px;font-weight:800;color:var(--navy)}
.login-logo p{font-size:12px;color:var(--muted);margin-top:2px}
.mech-pill{display:inline-block;padding:2px 7px;border-radius:3px;font-size:10px;margin:2px;cursor:pointer}
.mech-on{background:var(--teal);color:#fff;font-weight:600}
.mech-off{background:#f3f4f6;color:#9ca3af}
.score-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin:0 1px}
.tabs{display:flex;gap:4px;margin-bottom:14px;flex-wrap:wrap}
.tab{padding:6px 14px;border-radius:6px;border:none;font-size:12px;font-weight:500;background:var(--light);color:var(--muted);cursor:pointer}
.tab.active{background:var(--navy);color:#fff;font-weight:600}
.alert{padding:10px 14px;border-radius:8px;margin-bottom:12px;font-size:13px}
.alert-info{background:#dbeafe;color:#1e40af;border:1px solid #bfdbfe}
.alert-warn{background:#fef3c7;color:#92400e;border:1px solid #fde68a}
.alert-success{background:#d1fae5;color:#065f46;border:1px solid #a7f3d0}
.flex{display:flex}.items-center{align-items:center}.justify-between{justify-content:space-between}
.gap-2{gap:8px}.gap-3{gap:12px}.mb-2{margin-bottom:8px}.mb-3{margin-bottom:12px}
.text-sm{font-size:12px}.text-xs{font-size:11px}.text-muted{color:var(--muted)}
.font-bold{font-weight:700}.font-semibold{font-weight:600}
.w-full{width:100%}.mt-1{margin-top:4px}.mt-2{margin-top:8px}.ml-2{margin-left:8px}
.rtl{direction:auto}
.filter-bar{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--light);border-radius:8px;margin-bottom:14px;flex-wrap:wrap}
.filter-bar label{font-size:11px;font-weight:600;color:var(--muted)}
.pill-select{display:flex;flex-wrap:wrap;gap:4px;max-width:100%}
.pill-opt{padding:3px 10px;border-radius:20px;border:1px solid var(--border);font-size:11px;cursor:pointer;background:#fff;color:var(--muted)}
.pill-opt.sel{background:var(--navy);color:#fff;border-color:var(--navy)}
@media print{.sidebar,.topbar,.btn,.tabs,.filter-bar,.modal-overlay{display:none!important}.content{padding:0}}
@media(max-width:768px){.sidebar{width:56px}.sidebar-logo p,.nav-label{display:none}.grid-2,.grid-3,.grid-4{grid-template-columns:1fr}}
</style>
</head>

  html+='.pill{display:inline-block;padding:1px 8px;border-radius:10px;font-size:10px;font-weight:600}';
  html+='@media print{button{display:none!important}}</style></head><body>';
  html+='<div style="display:flex;justify-content:space-between;align-items:start">';

  html+='<div class="meta"><span>'+(mf?'Month: <strong>'+safe(mf)+'</strong> &nbsp;·&nbsp; ':'All Months &nbsp;·&nbsp; ')+'<strong>'+rows.length+'</strong> programmes listed</span><span>Printed: '+new Date().toLocaleDateString()+'</span></div></div>';
  html+='<button onclick="window.print()" style="padding:5px 12px;background:#1F4E79;color:#fff;border:none;border-radius:6px;font-size:11px;cursor:pointer;margin-top:4px;flex-shrink:0">🖨 Print / Save PDF</button></div>';

    html+='<div class="cat-head">'+safe(cat)+' ('+catRows.length+')</div>';
    html+='<table><thead><tr><th>Programme</th><th>Facilitator</th><th>Type</th><th>Duration</th><th>Dates</th><th>Month</th><th>Venue</th><th>Target</th><th>Status</th></tr></thead><tbody>';

function exportScheduleExcel(){
  // Build a CSV-based Excel-compatible download with full formatting context
  // Since we're in a vanilla JS app, we use SheetJS-style CSV that Excel opens natively
  const mf=S.schedMonthFilter||'';
  const rows=mf?S.schedule.filter(r=>r.month===mf):S.schedule;
  const header=['Category','Programme','Facilitator','Type','Delivery','Duration','Start Date','End Date','Month','Venue','Target Audience','Status'];
  const data=rows.map(r=>[r.category||'',r.program||'',r.facilitator||'',r.type||'',r.delivery||'',r.duration||'',r.startDate||'',r.endDate||'',r.month||'',r.venue||'',r.target||'',r.status||'']);
  // Add summary rows at top
  const summaryRows=[
    ['Waad Academy — Annual CPD & Training Schedule','','','','','','','','','','',''],
    [mf?'Month: '+mf:'All Months','','Total Programmes: '+rows.length,'','','','','','','','',''],
    ['Printed: '+new Date().toLocaleDateString(),'','','','','','','','','','',''],
    ['','','','','','','','','','','',''],
    header
  ];
  const allRows=[...summaryRows,...data];
  const csv=allRows.map(r=>r.map(v=>{const s=String(v||'').replace(/"/g,'""');return '"'+s+'"';}).join(',')).join('\r\n');
  // Use BOM for Excel UTF-8 detection
  const bom='\uFEFF';
  const blob=new Blob([bom+csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download='Waad-Academy-Annual-Schedule'+(mf?'-'+mf:'')+'-'+new Date().toISOString().split('T')[0]+'.csv';
  a.click();
  URL.revokeObjectURL(url);
  showToast('Excel-compatible file downloaded ✓');
}

function printSnapshot(snap){
  const colorFor=n=>n>=4?'#0F6E56':n>=3?'#7B4F0C':n>0?'#993C1D':'#9ca3af';

    {title:'Design Quality',color:'#1F4E79',items:[

      {id:'dq3',lbl:'All 6 D-H pillars active'},
      {id:'dq4',lbl:'Prior knowledge activated every session'},
      {id:'dq5',lbl:'In-session rehearsal (15 min) included'},
      {id:'dq6',lbl:'Groups right-sized (≤8, subject + grade)'},

      {id:'ts2',lbl:'CPD not end-of-week or end-of-day'},
      {id:'ts3',lbl:'Meetings replaced with collaboration time'},
      {id:'ts4',lbl:'Booklet distributed 1 week before'},
    ]},
    {title:'Impact & Accountability',color:'#993C1D',items:[
      {id:'ia1',lbl:'CPD linked to 360° feedback data'},
      {id:'ia2',lbl:'Biol-Og techniques visible in learning walks'},
      {id:'ia3',lbl:'Student outcomes reviewed against CPD'},
      {id:'ia4',lbl:'NEASC LP progress formally tracked'},
      {id:'ia5',lbl:'Process audit snapshots reviewed'},
    ]},
  ];
  const rated=Object.values(snap.ratings||{}).filter(v=>v>0);
  const overallAvg=rated.length?(rated.reduce((a,b)=>a+b,0)/rated.length):0;
  let html='<!DOCTYPE html><html><head><title>Process Audit — '+new Date(snap.date||Date.now()).toLocaleDateString()+'</title>';
  html+='<style>body{font-family:Segoe UI,sans-serif;padding:24px;font-size:12px;color:#1a1a2e;max-width:820px;margin:0 auto}';
  html+='h1{color:#1F4E79;font-size:18px;margin:0}';
  html+='.meta{color:#6b7280;font-size:11px;margin-bottom:18px;padding-bottom:10px;border-bottom:2px solid #1F4E79;display:flex;justify-content:space-between;align-items:center}';
  html+='.sec{margin-bottom:16px;border:1px solid #e5e7eb;border-radius:8px;overflow:hidden}';
  html+='.sec-head{padding:7px 12px;font-weight:700;font-size:12px;color:#fff}';
  html+='.row{display:grid;grid-template-columns:1fr 60px 120px;gap:8px;padding:6px 12px;border-top:1px solid #f5f5f5;align-items:center}';
  html+='.row:nth-child(even){background:#fafafa}';
  html+='.score-badge{display:inline-block;padding:2px 10px;border-radius:12px;font-size:11px;font-weight:700;text-align:center}';
  html+='.summary{background:#f0f4ff;border-radius:8px;padding:12px 16px;margin-bottom:16px;display:flex;gap:24px;flex-wrap:wrap}';
  html+='.sum-item{text-align:center}.sum-val{font-size:28px;font-weight:800;color:#1F4E79}.sum-label{font-size:10px;color:#6b7280}';
  html+='@media print{button{display:none!important}}</style></head><body>';
  html+='<div style="display:flex;justify-content:space-between;align-items:start"><div>';
  html+='<h1>🏫 Waad Academy — Process Audit Snapshot</h1>';
  html+='<div class="meta"><span>Department: <strong>'+(snap.dept||'Whole School')+'</strong> &nbsp;·&nbsp; Date: <strong>'+new Date(snap.date||Date.now()).toLocaleDateString()+'</strong></span>';
  html+='<span>Observations: <strong>'+snap.obsCount+'</strong> &nbsp;·&nbsp; Triplets: <strong>'+snap.tripCount+'</strong> &nbsp;·&nbsp; Learning Walks: <strong>'+snap.lwCount+'</strong></span></div>';
  html+='</div><button onclick="window.print()" style="padding:6px 14px;background:#1F4E79;color:#fff;border:none;border-radius:6px;font-size:12px;cursor:pointer;margin-top:4px;flex-shrink:0">🖨 Print / Save PDF</button></div>';
  html+='<div class="summary">';

  html+='<div class="sum-item"><div class="sum-val" style="color:#0F6E56">'+Object.values(snap.ratings||{}).filter(v=>v>=4).length+'</div><div class="sum-label">Strong/Highly Effective</div></div>';
  html+='<div class="sum-item"><div class="sum-val" style="color:#993C1D">'+Object.values(snap.ratings||{}).filter(v=>v>0&&v<=2).length+'</div><div class="sum-label">Weak/Emerging</div></div>';
  html+='</div>';
  SECS.forEach(sec=>{

    sec.items.forEach(item=>{
      const n=snap.ratings?.[item.id]||0;
      const c=colorFor(n);
      const l=labelFor(n);
      html+='<div class="row"><span>'+item.lbl+'</span>';
      html+='<span style="text-align:center"><span class="score-badge" style="background:'+c+'22;color:'+c+';border:1px solid '+c+'44">'+(n||'—')+'</span></span>';
      html+='<span style="font-size:11px;font-weight:600;color:'+c+'">'+l+'</span></div>';
    });
    html+='</div>';
  });
  html+='<div style="margin-top:16px;padding-top:10px;border-top:1px solid #e5e7eb;font-size:10px;color:#9ca3af;text-align:center">';
  html+='Waad Academy School Improvement Platform · Process Audit · Printed '+new Date().toLocaleDateString()+' · Snapshot ID: '+snap.id+'</div>';
  html+='</body></html>';
  const w=window.open('','_blank','width=880,height=1100');
  w.document.write(html);
  w.document.close();
  setTimeout(()=>w.print(),400);
}

function printObs(id){
  const o=S.observations.find(x=>x.id===id);if(!o)return;
  const t=o.tid?S.teachers.find(t=>t.id===o.tid):null;
  const doms=getDomains();
  const safe=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/\n/g,'<br>');
  let domTable='';
  doms.forEach(d=>{
    const scores=o.scores?.[d.id]||[];
    domTable+='<div style="margin-bottom:16px;border:1px solid #e5e7eb;border-radius:8px;overflow:hidden">';
    domTable+='<div style="background:#1F4E79;color:#fff;padding:6px 12px;font-weight:700;font-size:13px">'+safe(d.n)+'</div>';
    domTable+='<table style="width:100%;border-collapse:collapse">';
    domTable+='<tr style="background:#f9fafb"><th style="padding:6px 10px;text-align:left;font-size:11px;color:#6b7280">Criterion</th><th style="padding:6px 10px;text-align:center;width:120px;font-size:11px;color:#6b7280">Score (1\u20135)</th></tr>';
    d.criteria.forEach((c,i)=>{
      const sc=scores[i]||0;
      const bc=sc>=4?'#065f46':sc>=3?'#92400e':sc>0?'#991b1b':'#374151';
      domTable+='<tr style="border-top:1px solid #f3f4f6"><td style="padding:7px 10px;font-size:12px">'+safe(c)+'</td><td style="padding:7px 10px;text-align:center">';
      for(let n=1;n<=5;n++){domTable+='<span style="display:inline-block;width:22px;height:22px;border-radius:50%;border:2px solid '+(sc>=n?bc:'#e5e7eb')+';background:'+(n===sc?bc:'transparent')+';color:'+(n===sc?'#fff':'#6b7280')+';font-size:10px;font-weight:700;line-height:20px;text-align:center;margin:1px">'+n+'</span>';}
      domTable+='</td></tr>';
    });
    domTable+='</table></div>';
  });
  const tName=t?safe(t.name):'Whole School/Dept';
  const tMeta=t?' \u00b7 '+safe(t.dept)+' \u00b7 '+safe(t.section)+' \u00b7 '+safe(t.stage):'';
  const periodLine=(o.period||o.gradeClass)?'<div style="margin-bottom:12px;font-size:12px;color:#6b7280">'+(o.period?'\ud83d\udd50 Period: <strong>'+safe(o.period)+'</strong>&nbsp;':'')+(o.gradeClass?'\ud83c\udfeb Class: <strong>'+safe(o.gradeClass)+'</strong>':'')+'</div>':'';
  const techLine=(o.bio||o.customTech)?'<div style="margin-bottom:12px"><span class="pill purple">Technique: '+safe(o.customTech||o.bio)+'</span></div>':'';
  const wwwLine=o.www?'<div class="section"><div class="section-title">\u2705 Key Strengths (WWW)</div><div class="section-content">'+safe(o.www)+'</div></div>':'';
  const ebiLine=o.ebi?'<div class="section"><div class="section-title">\ud83c\udfaf Areas for Development (EBI)</div><div class="section-content">'+safe(o.ebi)+'</div></div>':'';
  const actLine=o.action?'<div class="section"><div class="section-title">\ud83d\udcce Action Step \u2192 Steplab</div><div class="section-content">'+safe(o.action)+'</div></div>':'';

  +'</div>'
  +periodLine+techLine

function renderImpact(){
  const tab=S.impTab||'L1';
  // Multi-filter state
  const iDepts=S.impDepts||[];
  const iSects=S.impSects||[];
  const iStages=S.impStages||[];

  // Filter helper
  const filterT=(t)=>{
    if(!t)return true;
    if(iDepts.length&&!iDepts.includes(t.dept))return false;
    if(iSects.length&&!iSects.includes(t.section))return false;
    if(iStages.length&&!iStages.includes(t.stage))return false;
    return true;
  };
  // Filtered data
  const obs=scopedObs().filter(o=>{
    const t=o.tid?S.teachers.find(t=>t.id===o.tid):null;
    if(!filterT(t))return false;
    if(S.impDateFrom&&(o.date||'')<S.impDateFrom)return false;
    if(S.impDateTo&&(o.date||'')>S.impDateTo)return false;
    return true;
  });
  const trips=S.triplets.filter(t=>{
    const tc=S.teachers.find(tc=>tc.id===t.oid);
    if(!filterT(tc))return false;
    if(S.impDateFrom&&(t.od||'')<S.impDateFrom)return false;
    if(S.impDateTo&&(t.od||'')>S.impDateTo)return false;
    return true;
  });
  const lws=S.lwalks.filter(lw=>{
    if(iDepts.length&&lw.dept&&!iDepts.includes(lw.dept))return false;
    if(iSects.length&&lw.section&&!iSects.includes(lw.section))return false;
    if(S.impDateFrom&&(lw.date||'')<S.impDateFrom)return false;
    if(S.impDateTo&&(lw.date||'')>S.impDateTo)return false;
    return true;
  });
  const impacts=S.impacts.filter(i=>{
    if(i.level!==tab.replace('L',''))return false;
    if(i.tid){const t=S.teachers.find(t=>t.id===i.tid);if(!filterT(t))return false;}
    return true;
  });
  const progress=S.progress.filter(p=>{
    if(iDepts.length&&p.dept&&!iDepts.includes(p.dept))return false;
    if(iSects.length&&p.section&&!iSects.includes(p.section))return false;
    return true;
  });

  // Build filter UI
  let html='';
  html+=`<div class="card mb-3" style="padding:10px 14px">
  <div class="flex items-center gap-2 mb-2" style="flex-wrap:wrap">
    <span style="font-size:11px;font-weight:700;color:var(--muted);min-width:80px">Department:</span>
    <div class="pill-opt ${iDepts.length===0?'sel':''}" data-imp-dept="">All</div>
    ${DEPTS.map(d=>`<div class="pill-opt ${iDepts.includes(d)?'sel':''}" data-imp-dept="${d}">${d}</div>`).join('')}
  </div>
  <div class="flex items-center gap-2 mb-2" style="flex-wrap:wrap">
    <span style="font-size:11px;font-weight:700;color:var(--muted);min-width:80px">Section:</span>
    <div class="pill-opt ${iSects.length===0?'sel':''}" data-imp-sect="">All</div>
    ${SECTIONS.map(s=>`<div class="pill-opt ${iSects.includes(s)?'sel':''}" data-imp-sect="${s}">${s}</div>`).join('')}
  </div>
  <div class="flex items-center gap-2 mb-2" style="flex-wrap:wrap">
    <span style="font-size:11px;font-weight:700;color:var(--muted);min-width:80px">Stage:</span>
    <div class="pill-opt ${iStages.length===0?'sel':''}" data-imp-stage="">All Stages</div>
    ${STAGES.map(s=>`<div class="pill-opt ${iStages.includes(s)?'sel':''}" data-imp-stage="${s}">${s}</div>`).join('')}
  </div>
  <div class="flex items-center gap-2" style="flex-wrap:wrap">
    <span style="font-size:11px;font-weight:700;color:var(--muted);min-width:80px">Period:</span>
    <label style="font-size:11px;color:var(--muted)">From</label>
    <input type="date" class="form-control" style="width:140px;padding:3px 6px;font-size:11px" value="${S.impDateFrom||''}" onchange="S.impDateFrom=this.value;render()">
    <label style="font-size:11px;color:var(--muted)">To</label>
    <input type="date" class="form-control" style="width:140px;padding:3px 6px;font-size:11px" value="${S.impDateTo||''}" onchange="S.impDateTo=this.value;render()">
    ${(S.impDateFrom||S.impDateTo)?'<button class="btn btn-ghost btn-sm" onclick="clearImpDates()">✕ Clear</button>':''}
  </div>
</div>`;

  // Tabs
  html+=`<div class="tabs">
  ${['L1','L2','L3','progress'].map(t=>`<button class="tab ${tab===t?'active':''}" data-imp-tab="${t}">${t==='progress'?'Student Progress':t+': '+{L1:'Teacher Knowledge',L2:'Classroom Practice',L3:'Impact on Students'}[t]}</button>`).join('')}
</div>`;

  // ── L1: Teacher Knowledge & Confidence ─────────────────────────────────────
  if(tab==='L1'){
    const confObs=obs.filter(o=>o.conf>0);
    const avgConf=confObs.length?avg(confObs.map(o=>o.conf)):0;
    html+=`<div class="card mb-3" style="border-left:4px solid #1e40af">
  <div class="card-title" style="color:#1e40af">Level 1 — Teacher Knowledge &amp; Confidence${iDepts.length?' · '+iDepts.join(', '):''}${iSects.length?' · '+iSects.join('/'):''}${iStages.length?' · '+iStages.join('/'):''}  <span class="text-xs text-muted">(auto-read from observations + coaching)</span></div>
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px">
    <div class="kpi" style="border-top:3px solid #1e40af"><div class="kpi-val" style="color:#1e40af">${avgConf>0?avgConf.toFixed(1):0}</div><div class="kpi-label">Avg confidence /5</div><div class="text-xs text-muted mt-1">${confObs.length} entries</div></div>
    <div class="kpi" style="border-top:3px solid var(--teal)"><div class="kpi-val" style="color:var(--teal)">${obs.filter(o=>o.bio||o.customTech).length}</div><div class="kpi-label">Obs with technique</div><div class="text-xs text-muted mt-1">from observations</div></div>
    <div class="kpi" style="border-top:3px solid var(--amber)"><div class="kpi-val" style="color:var(--amber)">${trips.filter(t=>t.action).length+obs.filter(o=>o.action).length}</div><div class="kpi-label">Action steps set</div><div class="text-xs text-muted mt-1">obs + coaching</div></div>
    <div class="kpi" style="border-top:3px solid var(--purple)"><div class="kpi-val" style="color:var(--purple)">${obs.filter(o=>o.slLinked).length+trips.filter(t=>t.slLinked).length}</div><div class="kpi-label">Steplab-linked</div><div class="text-xs text-muted mt-1">obs + triplets</div></div>
  </div>`;
    // Auto-read entries from observations
    if(confObs.length){
      html+=`<div class="alert alert-info mb-3" style="font-size:12px">📊 ${confObs.length} confidence entries auto-read from observations · ${trips.filter(t=>t.action).length} action steps from coaching sessions</div>`;
      html+=confObs.slice().reverse().slice(0,8).map(o=>{
        const t=S.teachers.find(t=>t.id===o.tid);
        const bc=o.conf>=4?'var(--teal)':o.conf>=3?'var(--amber)':'var(--red)';
        return `<div class="flex justify-between items-center mb-2 p-2" style="background:var(--light);border-radius:6px"><div><span class="badge badge-green">confidence</span><span class="badge badge-gray ml-1">Observation</span>${t?'<span class="text-xs text-muted ml-1">'+esc(t.name)+' ('+esc(t.dept)+')</span>':''}</div><div class="text-right"><div style="font-weight:700;font-size:13px;color:${bc}">${'★'.repeat(o.conf)+'☆'.repeat(5-o.conf)} (${o.conf}/5)</div><div class="text-xs text-muted">${o.date||''}</div></div></div>`;
      }).join('');
    } else {
      html+=`<div class="text-xs text-muted mb-3" style="font-style:italic">No confidence ratings yet. Add confidence scores when logging observations.</div>`;
    }
    // Coaching triplet action steps
    if(trips.filter(t=>t.action).length){
      html+=`<div class="card-title" style="margin-top:12px;margin-bottom:8px;font-size:12px;color:var(--teal)">📎 Action Steps from Coaching Triplets</div>`;
      html+=trips.filter(t=>t.action).slice().reverse().slice(0,5).map(t=>{
        const tc=S.teachers.find(tc=>tc.id===t.oid);
        return `<div class="flex justify-between items-center mb-2 p-2" style="background:#f0fdf4;border-radius:6px"><div><span class="badge badge-green">action-step</span><span class="badge badge-gray ml-1">Coaching</span>${tc?'<span class="text-xs text-muted ml-1">'+esc(tc.name)+'</span>':''}</div><div class="text-xs" style="max-width:60%;text-align:right">${esc(t.action)}</div></div>`;
      }).join('');
    }
    // Manual entries
    if(impacts.length){
      html+=`<div class="card-title" style="margin-top:12px;margin-bottom:8px;font-size:12px">📝 Manual L1 Entries</div>`;
      html+=impacts.slice().reverse().map(i=>{
        const t=S.teachers.find(t=>t.id===i.tid);
        return `<div class="card" style="border-left:3px solid var(--purple);margin-bottom:8px"><div class="flex justify-between items-center"><div><span class="badge badge-purple">${esc(i.type)}</span>${t?'<span class="text-xs text-muted ml-2">'+esc(t.name)+'</span>':''}<span class="text-xs text-muted ml-2">${i.date||''}</span></div><div class="flex gap-1">${canEdit()?`<button class="btn btn-sm btn-ghost" data-edit-impact="${i.id}">✏</button><button class="btn btn-sm btn-danger" data-del-impact="${i.id}">✕</button>`:''}</div></div>${i.value?'<div class="mt-1 font-semibold">'+esc(i.value)+'</div>':''}${i.evidence?'<div class="text-xs text-muted mt-1">'+esc(i.evidence)+'</div>':''}</div>`;
      }).join('');
    }
    if(canEdit())html+=`<button class="btn btn-primary btn-sm mt-3" data-modal="impact">+ Add Manual L1 Entry</button>`;
    html+=`</div>`;
  }

  // ── L2: Classroom Practice Change ──────────────────────────────────────────
  if(tab==='L2'){
    const colors=['#1e40af','#065f46','#92400e','#5b21b6','#991b1b'];
    const domScores=getDomains().map((d,idx)=>{
      const vals=obs.map(o=>avg(o.scores?.[d.id]||[])).filter(x=>x>0);
      return{d,score:vals.length?avg(vals):0,count:vals.length,color:colors[idx]};
    });
    html+=`<div class="card mb-3" style="border-left:4px solid var(--amber)">
  <div class="card-title" style="color:var(--amber)">Level 2 — Classroom Practice${iDepts.length?' · '+iDepts.join(', '):''}  <span class="text-xs text-muted">(auto-read from observations, learning walks, coaching)</span></div>
  <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:14px">
    ${domScores.map(({d,score,count,color})=>`<div class="kpi" style="border-top:3px solid ${color}"><div class="kpi-val" style="color:${color};font-size:24px">${score>0?score.toFixed(1):'—'}</div><div class="kpi-label">${d.n}</div><div class="text-xs text-muted mt-1">${count} obs</div></div>`).join('')}
  </div>`;
    // Evidence summary from obs, lws, trips
    const obsWithScores=obs.filter(o=>domAvg(o.scores)>0);
    const lwsWithAFD=lws.filter(lw=>lw.afd);
    const tripsComplete=trips.filter(t=>t.status==='complete'||t.ebiNotes);
    html+=`<div class="alert alert-info mb-3" style="font-size:12px">📊 ${obsWithScores.length} observations with domain scores · ${lwsWithAFD.length} learning walks with AFD · ${tripsComplete.length} coaching sessions with evidence</div>`;
    if(obsWithScores.length){
      html+=`<div class="card-title" style="font-size:12px;margin-bottom:8px">🔬 From Observations</div>`;
      html+=obsWithScores.slice().reverse().slice(0,8).map(o=>{
        const t=S.teachers.find(t=>t.id===o.tid);const da=domAvg(o.scores);
        const bc=da>=4?'var(--teal)':da>=3?'var(--amber)':'var(--red)';
        return `<div class="flex justify-between items-center mb-2 p-2" style="background:var(--light);border-radius:6px"><div><span class="badge badge-amber">obs-domain-score</span><span class="badge badge-gray ml-1">Observation</span>${t?'<span class="text-xs text-muted ml-1">'+esc(t.name)+'</span>':''}</div><div class="text-right"><div style="font-weight:700;font-size:12px;color:${bc}">${da.toFixed(1)}/5</div><div class="text-xs text-muted">${o.date||''}</div></div></div>`;
      }).join('');
    }
    if(lwsWithAFD.length){
      html+=`<div class="card-title" style="font-size:12px;margin:12px 0 8px;color:var(--teal)">🚶 From Learning Walks</div>`;
      html+=lwsWithAFD.slice().reverse().slice(0,5).map(lw=>`<div class="flex justify-between items-center mb-2 p-2" style="background:#f0fdf4;border-radius:6px"><div><span class="badge badge-green">learning-walk</span><span class="badge badge-gray ml-1">${esc(lw.dept||'All')}</span><span class="text-xs text-muted ml-1">${lw.date||''}</span></div><div class="text-xs" style="max-width:55%;text-align:right;color:var(--muted)">AFD: ${esc(lw.afd)}</div></div>`).join('');
    }
    if(tripsComplete.length){
      html+=`<div class="card-title" style="font-size:12px;margin:12px 0 8px;color:var(--purple)">🎯 From Coaching Triplets</div>`;
      html+=tripsComplete.slice().reverse().slice(0,5).map(t=>{
        const tc=S.teachers.find(tc=>tc.id===t.oid);
        return `<div class="flex justify-between items-center mb-2 p-2" style="background:#faf5ff;border-radius:6px"><div><span class="badge badge-purple">triplet-evidence</span>${tc?'<span class="text-xs text-muted ml-1">'+esc(tc.name)+'</span>':''}</div><div class="text-xs" style="max-width:50%;text-align:right;color:var(--muted)">${t.ebiNotes?esc(t.ebiNotes.slice(0,60)):'Cycle '+t.cycle+' complete'}</div></div>`;
      }).join('');
    }
    if(impacts.length){
      html+=`<div class="card-title" style="margin-top:12px;margin-bottom:8px;font-size:12px">📝 Manual L2 Entries</div>`;
      html+=impacts.slice().reverse().map(i=>{const t=S.teachers.find(t=>t.id===i.tid);return `<div class="card" style="border-left:3px solid var(--purple);margin-bottom:8px"><div class="flex justify-between items-center"><div><span class="badge badge-purple">${esc(i.type)}</span>${t?'<span class="text-xs text-muted ml-2">'+esc(t.name)+'</span>':''}</div><div class="flex gap-1">${canEdit()?`<button class="btn btn-sm btn-ghost" data-edit-impact="${i.id}">✏</button><button class="btn btn-sm btn-danger" data-del-impact="${i.id}">✕</button>`:''}</div></div>${i.value?'<div class="mt-1 font-semibold">'+esc(i.value)+'</div>':''}${i.evidence?'<div class="text-xs text-muted mt-1">'+esc(i.evidence)+'</div>':''}</div>`;}).join('');
    }
    if(canEdit())html+=`<button class="btn btn-primary btn-sm mt-3" data-modal="impact">+ Add Manual L2 Entry</button>`;
    html+=`</div>`;
  }

  // ── L3: Impact on Students ──────────────────────────────────────────────────
  if(tab==='L3'){
    // 7 indicators with auto-computed scores from domain averages
    const manualRatings={};
    S.impacts.filter(i=>i.level==='3').forEach(i=>{if(i.type&&i.value){const v=parseFloat(i.value);if(!isNaN(v))manualRatings[i.type]=v;}});
    const engObs=obs.filter(o=>(o.scores?.d4||[]).some(v=>v>0));
    const fmObs=obs.filter(o=>(o.scores?.d3||[]).some(v=>v>0));
    const qObs=obs.filter(o=>['Cold call','Ratio of pupil thought','Think, Pair, Share','Simultaneous response'].includes(o.bio||o.customTech||''));
    const ctObs=obs.filter(o=>(o.scores?.d4||[]).some(v=>v>=3));
    const colObs=obs.filter(o=>['Think, Pair, Share','Simultaneous response'].includes(o.bio||o.customTech||''));
    const soObs=obs.filter(o=>(o.scores?.d4||[]).some(v=>v>0)||(o.scores?.d5||[]).some(v=>v>0));
    const indObs=obs.filter(o=>(o.scores?.d5||[]).some(v=>v>0));
    const colTrips=trips.filter(t=>t.status==='complete');
    const L3_ROWS=[
      {key:'engagement',name:'Student Engagement',lps:['LP5'],tech:'Think, Pair, Share',score:engObs.length?avg(engObs.map(o=>avg(o.scores.d4||[]))):0,count:engObs.length},

    if(dept&&t.dept!==dept)return false;

  const snaps=dept?S.snapshots.filter(s=>(s.dept||'Whole School')===dept):S.snapshots;

function exportUsersForGitHub(){
  const allUsers=getAllUsers();
  const lines=allUsers.map(u=>`  {id:'${u.id}',name:'${(u.name||'').replace(/'/g,"\'")}',fullName:'${(u.fullName||u.name||'').replace(/'/g,"\'")}',username:'${u.username}',password:'${u.password}',role:'${u.role}',depts:${JSON.stringify(u.depts||[])}}`).join(',\n');
  window.__exportCode=`const SEED_USERS = [\n${lines}\n];`;
  S.modal=`<div class="modal-overlay" id="modal-overlay"><div class="modal"><div class="modal-header"><h3>⬇ Export Users for GitHub</h3><button class="btn btn-ghost btn-sm" data-close-modal>✕</button></div><div class="modal-body"><div style="background:#f8fafc;border:1px solid var(--border);border-radius:6px;padding:12px;font-family:monospace;font-size:11px;white-space:pre-wrap;word-break:break-all;max-height:260px;overflow-y:auto">${esc(window.__exportCode)}</div><div style="margin-top:12px;font-size:12px;color:var(--muted)"><strong>Steps:</strong><br>1. Tap Copy<br>2. GitHub → index.html → pencil<br>3. Find const SEED_USERS = [ and replace<br>4. Commit → Vercel auto-deploys</div><button class="btn btn-success" style="margin-top:10px;width:100%" id="copy-export-btn">📋 Copy to Clipboard</button></div><div class="modal-footer"><button class="btn btn-primary" data-close-modal>Close</button></div></div></div>`;
  render();
}
function openModal(type, data={}){
  S.modal = renderModal(type, data);
  render();
}

function renderModal(type, data={}){
  const M=(title,body,footer)=>`
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h3>${title}</h3>
        <button class="btn btn-ghost btn-sm" data-close-modal>✕</button>
      </div>
      <div class="modal-body">${body}</div>
      <div class="modal-footer">${footer}</div>
    </div>
  </div>`;

  const FI=(id,label,val='',type='text',placeholder='')=>
    `<div class="form-group"><label class="form-label">${label}</label>
    <input class="form-control rtl" id="${id}" type="${type}" value="${val||''}" placeholder="${placeholder}"></div>`;
  const FS=(id,label,opts,val='')=>
    `<div class="form-group"><label class="form-label">${label}</label>
    <select class="form-control" id="${id}">${opts.map(o=>typeof o==='string'?'<option '+(val===o?'selected':'')+'>'+o+'</option>':'<option value="'+o.v+'" '+(val===o.v?'selected':'')+'>'+o.l+'</option>').join('')}</select></div>`;
  const FTA=(id,label,val='',rows=3)=>
    `<div class="form-group"><label class="form-label">${label}</label>
    <textarea class="form-control rtl" id="${id}" rows="${rows}">${val||''}</textarea></div>`;
  const G2=(a,b)=>`<div class="grid-2">${a}${b}</div>`;
  const userName=S.session?.name||'';

  if(type==='obs'){
    const isEdit=!!(data.id);
    const preT=data.tid||'';
    const techVal=data.customTech?'Other':(data.bio||'');
    return M((isEdit?'✏ Edit':'📋 New')+' Observation',
      `<div class="form-group"><label class="form-label">Teacher</label>
       <input class="form-control" id="obs-tid-search" list="obs-tid-list" placeholder="Type to search teacher…" value="${preT?esc((scopedTeachers().find(t=>t.id===preT)||{}).name||''):''}">
       <datalist id="obs-tid-list">
         <option value="">— Whole School / Dept —</option>
         ${scopedTeachers().map(t=>`<option value="${esc(t.name+' ('+t.dept+')')}">${esc(t.name+' ('+t.dept+')')}</option>`).join('')}
       </datalist>
       <input type="hidden" id="obs-tid" value="${esc(preT)}">
       </div>`+
      G2(FI('obs-date','Date',data.date||new Date().toISOString().split('T')[0],'date'),FI('obs-obs','Observed by',data.observer||userName))+
      G2(FI('obs-period','Time / Period',data.period||'','text','e.g. Period 3 · 10:00–10:45'),FS('obs-grade','Grade / Class',['— Select —',...GRADES],data.gradeClass||''))+
      techSelector('obs-tech','obs-custom-tech',techVal,data.customTech||'')+
      '<div id="obs-domains">' +
      getDomains().map(d=>`<div class="form-group"><label class="form-label">${d.n}</label>
        <div class="flex gap-2 flex-wrap">${d.criteria.map((c,i)=>{const existingScore=(data.scores&&data.scores[d.id]&&data.scores[d.id][i])||0;return `
          <div style="background:var(--light);border-radius:6px;padding:6px 8px;flex:1;min-width:140px">
            <div class="text-xs text-muted mb-1">${c}</div>
            <div class="flex gap-1">${[1,2,3,4,5].map(n=>`<button type="button" data-score="${d.id}-${i}-${n}" style="width:26px;height:26px;border-radius:4px;border:1px solid ${n===existingScore?'var(--navy)':'var(--border)'};background:${n===existingScore?'var(--navy)':'var(--white)'};color:${n===existingScore?'#fff':'inherit'};font-size:11px;font-weight:600;cursor:pointer">${n}</button>`).join('')}</div>
          </div>`;}).join('')}
        </div></div>`).join('') +
      '</div>'+
      G2(FI('obs-conf','Confidence (1-5)',data.conf||'','number'),FS('obs-scope','Scope',['teacher','dept','boys','girls','school'],data.scope||'teacher'))+
      G2(FTA('obs-www','Key Strengths (WWW)',data.www||''),FTA('obs-ebi','Areas for Development (EBI)',data.ebi||''))+
      FTA('obs-action','Action Step',data.action||''),
      `<button class="btn btn-ghost" data-close-modal>Cancel</button><button class="btn btn-success" data-save-obs>${isEdit?'Update Observation':'Save Observation'}</button>`
    );
  }

  if(type==='lw'){
    const isEdit=!!(data.id);
    return M((isEdit?'✏ Edit':'🚶 New')+' Learning Walk',
      G2(FI('lw-date','Date',data.date||new Date().toISOString().split('T')[0],'date'),FI('lw-obs','Observer',data.observer||userName))+
      G2(FS('lw-sect','Section',['','Boys','Girls'],data.section||''),FS('lw-dept','Department',['', ...DEPTS],data.dept||''))+
      techSelector('lw-tech','lw-custom-tech',data.customTech?'Other':(data.bio||''),data.customTech||'')+
      FI('lw-focus','Focus Area / Question',data.focusArea||'','text','What are we looking for?')+
      G2(FTA('lw-str','Strengths',data.strengths||''),FTA('lw-afd','Areas for Development',data.afd||'')),
      `<button class="btn btn-ghost" data-close-modal>Cancel</button><button class="btn btn-success" data-save-lw>${isEdit?'Update Walk':'Save Walk'}</button>`
    );
  }

  if(type==='cpd'){
    const isCpdEdit=!!(data.id);
    return M((isCpdEdit?'✏ Edit':'📚 New')+' CPD Session',
      FI('cpd-title','Session Title',data.title||'','text','e.g. AFL Workshop — Biology Dept')+
      G2(FI('cpd-date','Date',data.date||new Date().toISOString().split('T')[0],'date'),FI('cpd-fac','Facilitator',data.facilitator||userName))+
      G2(FS('cpd-aud','Audience',['Whole School','Boys Section','Girls Section',...DEPTS.map(d=>d+' — Girls'),...DEPTS.map(d=>d+' — Boys')],data.audience||'Whole School'),
         FS('cpd-month','Month',MONTHS,data.month||MONTHS[new Date().getMonth()]||MONTHS[0]))+
      G2(FS('cpd-type','Type',['Internal','External','Cambridge','COBIS','WLC','Other'],data.type||'Internal'),
         FS('cpd-del','Delivery',['Workshop','WLC','Course','Online','Face to Face','In School','Other'],data.delivery||'Workshop'))+
      techSelector('cpd-tech','cpd-custom-tech',data.customTech?'Other':(data.bio||''),data.customTech||'')+
      G2(FTA('cpd-bef','Before — Planned outcomes',data.before||''),FTA('cpd-dur','During — Activities',data.during||''))+
      FTA('cpd-aft','After — Implementation & monitoring',data.after||''),
      `<button class="btn btn-ghost" data-close-modal>Cancel</button><button class="btn btn-success" data-save-cpd>${isCpdEdit?'Update Session':'Save Session'}</button>`
    );
  }

  if(type==='trip'){
    const isTripEdit=!!(data.id);
    return M((isTripEdit?'✏ Edit':'🎯 New')+' Coaching Triplet',
      G2(FI('tr-name','Session Name','','text','e.g. Term 1 Cycle 1'),
         FS('tr-gid','TLC Group',[{v:'',l:'— Select Group —'},...S.groups.map(g=>({v:g.id,l:g.name}))],''))+
      G2(FS('tr-cycle','Cycle',[{v:1,l:'Cycle 1'},{v:2,l:'Cycle 2'},{v:3,l:'Cycle 3'}],data.cycle||1),
         FS('tr-status','Status',['planned','active','complete'],data.status||'planned'))+
      G2(FS('tr-oid','Observer (Teacher being observed)',[{v:'',l:'— Select —'},...scopedTeachers().map(t=>({v:t.id,l:t.name}))],data.oid||''),
         FS('tr-cid','Coach',[{v:'',l:'— Select —'},...scopedTeachers().map(t=>({v:t.id,l:t.name}))],data.cid||''))+
      FS('tr-fid','Facilitator',[{v:'',l:'— Select —'},...scopedTeachers().map(t=>({v:t.id,l:t.name}))],data.fid||'')+
      techSelector('tr-tech','tr-custom-tech',data.customTech?'Other':(data.bio||''),data.customTech||'')+
      G2(FI('tr-od','Observe Date',data.od||'','date'),FI('tr-dd','CARE Debrief Date',data.dd||'','date'))+
      G2(FTA('tr-www','What Went Well (WWW)',data.wwwNotes||''),FTA('tr-ebi','Even Better If (EBI)',data.ebiNotes||''))+
      FTA('tr-action','Steplab Action Step',data.action||''),
      `<button class="btn btn-ghost" data-close-modal>Cancel</button><button class="btn btn-success" data-save-trip>${isTripEdit?'Update Triplet':'Save Triplet'}</button>`
    );
  }

  if(type==='sched'){
    const isSchedEdit=!!(data.id);
    return M((isSchedEdit?'✏ Edit':'🗓 Add')+' Schedule Entry',
      FS('sch-cat','Category',SCHED_CATS,data.category||SCHED_CATS[0])+
      FI('sch-prog','Programme Name',data.program||'','text','e.g. Cambridge PDQ Teaching & Learning')+
      G2(FI('sch-fac','Facilitator',data.facilitator||''),FI('sch-target','Target Audience',data.target||''))+
      G2(FS('sch-type','Type',['Cambridge','Internal','External','COBIS','WLC','Other'],data.type||'Internal'),
         FS('sch-del','Delivery',['Course','Workshop','WLC','Online','Face to Face','In School','Other'],data.delivery||'Workshop'))+
      G2(FI('sch-dur','Duration',data.duration||'','text','e.g. 60 min'),FS('sch-month','Month',MONTHS,data.month||MONTHS[0]))+
      G2(FI('sch-start','Start Date',data.startDate||'','date'),FI('sch-end','End Date',data.endDate||'','date'))+
      FI('sch-venue','Venue',data.venue||'','text','e.g. Auditorium, Online, TBC'),
      `<button class="btn btn-ghost" data-close-modal>Cancel</button><button class="btn btn-success" data-save-sched>${isSchedEdit?'Update Entry':'Save Entry'}</button>`
    );
  }

  if(type==='teacher'){
    return M('👩‍🏫 Add Teacher',
      FI('tch-name','Full Name (Arabic/English)','','text','Teacher name')+
      G2(FS('tch-dept','Department',DEPTS,DEPTS[0]),FS('tch-sect','Section',SECTIONS,SECTIONS[0]))+
      G2(FS('tch-stage','Stage',STAGES,STAGES[0]),
         FS('tch-group','TLC Group',[{v:'',l:'— Select Group —'},...S.groups.map(g=>({v:g.id,l:g.name}))])),
      '<button class="btn btn-ghost" data-close-modal>Cancel</button><button class="btn btn-success" data-save-teacher>Save Teacher</button>'
    );
  }

  if(type==='user'){
    return M('👤 Add User',
      G2(FI('u-name','Full Name',''),FI('u-user','Username',''))+
      G2(FI('u-pass','Password','','password'),
         FS('u-role','Role',[...Object.entries(S.roleCfg).map(([k,r])=>({v:k,l:r.label||k}))],'viewer'))+
      FS('u-depts','Departments (for scoped roles)',['',{v:'',l:'— All departments —'},...DEPTS.map(d=>({v:d,l:d}))],''),
      '<button class="btn btn-ghost" data-close-modal>Cancel</button><button class="btn btn-success" data-save-user>Save User</button>'
    );
  }

  if(type==='impact'){
    const typeOpts={1:['confidence','knowledge-check','I-will-try-card','voice-survey','other'],2:['obs-domain-score','triplet-evidence','action-plan-rate','learning-walk','other'],3:['student-engagement','formative-assessment','questioning-depth','collaboration','student-ownership','other']};
    const lvl=data.level||'1';
    return M('📈 Add Impact Entry',
      FS('imp-level','Level',[{v:'1',l:'L1: Teacher Knowledge'},{v:'2',l:'L2: Classroom Practice'},{v:'3',l:'L3: Student Outcomes'}],lvl)+
      FS('imp-type','Type',(typeOpts[lvl]||typeOpts[1]),'')+
      G2(FS('imp-tid','Teacher (optional)',[{v:'',l:'All Staff'},...scopedTeachers().map(t=>({v:t.id,l:t.name}))]),
         FI('imp-val','Value / Score','','text','e.g. 3.8/5'))+
      G2(FI('imp-date','Date',new Date().toISOString().split('T')[0],'date'),FI('imp-term','Term','','text','e.g. Term 1'))+
      FTA('imp-evidence','Evidence'),
      '<button class="btn btn-ghost" data-close-modal>Cancel</button><button class="btn btn-success" data-save-impact>Save Entry</button>'
    );
  }

  if(type==='prog'){
    const mode=S.progMode||'internal';
    const cols=mode==='external'?['Mock 1','Mock 2','Official']:mode==='portfolio'?['Subject activation','Quality activation']:['Baseline','Mid-Term 1','End of Term 1','Mid-Term 2','End of Term 2'];
    return M('📊 Add Student Progress',
      G2(FI('pr-subj','Subject / Class Group','','text'),FS('pr-dept','Department',DEPTS,DEPTS[0]))+
      G2(FS('pr-grade','Grade',GRADES,GRADES[3]),FS('pr-sect','Section',SECTIONS,SECTIONS[0]))+
      cols.map(c=>FI('pr-sc-'+c.replace(/ /g,'_'),'Score: '+c,'','number')).join('')+
      (mode==='portfolio'?FI('pr-link','Portfolio Folder Link (URL)','','url'):''),
      '<button class="btn btn-ghost" data-close-modal>Cancel</button><button class="btn btn-success" data-save-prog>Save Progress</button>'
    );
  }

  if(type==='group'){
    const isGrpEdit=!!(data.id);
    return M((isGrpEdit?'✏ Edit':'👥 Add')+' TLC Group',
      FI('grp-name','Group Name',data.name||'','text','e.g. Math & Science TLC'),
      `<button class="btn btn-ghost" data-close-modal>Cancel</button><button class="btn btn-success" data-save-group>${isGrpEdit?'Update Group':'Save Group'}</button>`
    );
  }

  if(type==='resource'){
    return M('📂 Add Resource',
      FI('res-title','Title','')+FI('res-url','URL','','url')+FTA('res-desc','Description'),
      '<button class="btn btn-ghost" data-close-modal>Cancel</button><button class="btn btn-success" data-save-res>Save Resource</button>'
    );
  }

  if(type==='dlw'){
    const isEdit=!!(data.id);
    const existingDomId=isEdit?domainLWDomain(data):'d1';
    const existingScores=isEdit?domainLWScores(data):{};
    const selDomId=S._dlwDomainSel||existingDomId||'d1';
    const selDom=getDomains().find(d=>d.id===selDomId)||getDomains()[0];
    return M((isEdit?'✏ Edit':'🎯 New')+' Domain-Focused Learning Walk',
      G2(FI('dlw-date','Date',data.date||new Date().toISOString().split('T')[0],'date'),FI('dlw-obs','Observed by',data.observer||userName))+
      G2(FS('dlw-dept','Department',['', ...DEPTS],data.dept||''),FS('dlw-sect','Section',['','Boys','Girls'],data.section||''))+
      FS('dlw-tid','Teacher (optional)',[{v:'',l:'— Department Walk (no specific teacher) —'},...scopedTeachers().map(t=>({v:t.id,l:t.name+' ('+t.dept+')'}))],data.tid||'')+
      `<div class="form-group"><label class="form-label">Observation Domain</label>
        <select class="form-control" id="dlw-domain" onchange="S._dlwDomainSel=this.value;S.modal=renderModal('dlw',${JSON.stringify(data)});render()">
          ${getDomains().map(d=>`<option value="${d.id}" ${d.id===selDomId?'selected':''}>${d.n}</option>`).join('')}
        </select>
      </div>`+
      `<div class="card" style="border-left:4px solid var(--teal);margin-bottom:10px"><div class="card-title" style="color:var(--teal)">${selDom.n} — Score each criterion</div>`+
      selDom.criteria.map((c,i)=>{
        const sc=existingScores[i]||0;
        return `<div style="margin-bottom:8px"><div style="font-size:12px;font-weight:600;margin-bottom:4px">${i+1}. ${c}</div><div class="flex gap-1">${[1,2,3,4,5].map(n=>`<button type="button" data-dlw-score="${i}-${n}" style="width:32px;height:32px;border-radius:6px;border:2px solid ${n===sc?'var(--teal)':'var(--border)'};background:${n===sc?'var(--teal)':'transparent'};color:${n===sc?'#fff':'var(--muted)'};font-size:13px;font-weight:700;cursor:pointer">${n}</button>`).join('')}</div></div>`;
      }).join('')+
      '</div>'+
      G2(FTA('dlw-str','Strengths observed'),FTA('dlw-afd','Areas for development')),
      `<button class="btn btn-ghost" data-close-modal>Cancel</button><button class="btn btn-success" data-save-dlw>${isEdit?'Update Walk':'Save Walk'}</button>`
    );
  }

  if(type==='role'){
    const editKey=data.editKey||'';
    const existing=editKey?S.roleCfg[editKey]:null;
    const title=editKey?'✏️ Edit Role: '+(existing?.label||editKey):'🔑 Create Custom Role';
    const viewChecks=ALL_VIEWS.map(v=>{
      const checked=existing?(existing.views||[]).includes(v):true;
      return `<label style="display:flex;align-items:center;gap:6px;font-size:12px;padding:3px 0;cursor:pointer">
        <input type="checkbox" class="role-view-cb" value="${v}" ${checked?'checked':''}> ${VIEW_META[v].icon} ${VIEW_META[v].label}
      </label>`;
    }).join('');
    const isBuiltIn=['admin','obsLead','coachLead','cpdLead','deptHead','viewer'].includes(editKey);
    return M(title,
      (editKey&&isBuiltIn?`<div class="alert alert-warn mb-3">⚠ Built-in role — key is fixed. You can edit views and permissions.</div>`:'')+ 
      FI('role-key','Role key (no spaces)',editKey&&!isBuiltIn?editKey:editKey,'text',editKey?'':'e.g. hod_math')+
      FI('role-label','Display label',existing?.label||'','text','e.g. Head of Mathematics')+
      `<div class="form-group"><label class="form-label">Accessible Views</label>
       <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;background:var(--light);padding:10px;border-radius:6px">${viewChecks}</div></div>`+
      `<div class="flex gap-4 mt-2">
        <label style="display:flex;align-items:center;gap:6px;font-size:12px;cursor:pointer"><input type="checkbox" id="role-canedit" ${existing?.canEdit!==false?'checked':''}> Can edit data</label>
        <label style="display:flex;align-items:center;gap:6px;font-size:12px;cursor:pointer"><input type="checkbox" id="role-scoped" ${existing?.scoped?'checked':''}> Department scoped</label>
      </div>`+
      (editKey?`<input type="hidden" id="role-editkey" value="${editKey}">`:''),
      `<button class="btn btn-ghost" data-close-modal>Cancel</button><button class="btn btn-success" data-save-role>${editKey?'Update Role':'Save Role'}</button>`
    );
  }
  if(type==='care'){
    const tabs=['overview','templates','examples','reflection','criteria','resources'];
    const tLabels={overview:'Overview',templates:'Templates',examples:'Examples',reflection:'Reflection Qs',criteria:'Success Criteria',resources:'Resources'};
    const CARE_CONTENT={
      overview:`CARE Coaching Protocol — Waad Academy

1. CLARIFY — Coach asks clarifying questions. No judgement yet. (5 min)
2. ASK & LISTEN — 'What went well?' Teacher reflects first. (8 min)
3. REINFORCE — Specific evidence-based positive feedback. (4 min)
4. ESTABLISH — Co-construct 1 action step. Follow-up date agreed. (3 min)

Total: 20 minutes. One criterion only. One action step.`,
      templates:`OBSERVATION SCRIPT:
□ Date / Teacher / Domain / Biol-Og technique
□ Verbatim student quotes (3+)
□ Teacher moves (questioning, wait time, CFU)
□ Evidence of technique

DEBRIEF TEMPLATE:
□ WWW: 2 specific observable strengths
□ EBI: 1 precise actionable next step
□ Action: [teacher] will [technique] in [lesson] by [date]
□ Steplab micro-prompt: set before leaving room`,
      examples:`EXAMPLE — Think, Pair, Share:
WWW: 'All 27 students generated written responses during Think — 100% engagement'
EBI: 'During Pair, students needed sentence starters'
Action: Add sentence starter card for next TPS lesson by 15 Oct`,
      reflection:`1. What did students know at the end that they couldn't at the start?
2. Where was pupil thought ratio highest?
3. What would you change if you taught this again?
4. How did the Biol-Og technique change engagement?
5. What evidence do you have that learning happened?`,
      criteria:`✓ Observer scripts evidence for 25+ min
✓ Debrief follows CARE — teacher speaks first
✓ Exactly 1 specific observable action step
✓ Action step in Steplab before leaving room
✓ Follow-up date in calendar before leaving room
✓ Roles rotate every cycle`,
      resources:`• Biol-Og CPD Booklets: https://biol-og.com/cpd-booklets/
• Darling-Hammond (2017): learningpolicyinstitute.org
• EEF (2021) 14 Mechanisms: educationendowmentfoundation.org.uk
• Steplab: https://steplab.co
• NEASC ACE: neasc.org`
    };
    const curTab=S.careTab||'overview';
    const body=`<div class="tabs mb-3">${tabs.map(t=>`<button class="tab ${curTab===t?'active':''}" data-care-tab="${t}">${tLabels[t]}</button>`).join('')}</div>
      <div style="background:var(--light);border-radius:8px;padding:14px 16px;font-size:13px;color:#444;line-height:1.8;white-space:pre-wrap;max-height:380px;overflow-y:auto">${CARE_CONTENT[curTab]||''}</div>`;
    return M('📖 Coaching Triplet Protocol — CARE Framework',body,'<button class="btn btn-primary" data-close-modal>Close</button>');
  }

  return M('Modal','<p>Coming soon</p>','<button class="btn btn-ghost" data-close-modal>Close</button>');
}

// ═══ EVENT BINDING ════════════════════════════════════════════════════════════
const g=(id)=>document.getElementById(id);
const gv=(id)=>(g(id)||{}).value||'';


function bindEvents(){
  // Navigation
  document.querySelectorAll('[data-nav]').forEach(el=>{
    el.onclick=()=>{S.view=el.dataset.nav;render()};
  });
  // Logout
  const lb=g('logout-btn');
  if(lb)lb.onclick=()=>{S.session=null;sset('session',null);render()};
  // Login
  const loginBtn=g('l-btn');
  if(loginBtn){
    const doLogin=()=>{
      const u=(gv('l-user')||'').trim();
      const p=(gv('l-pass')||'').trim();
      const err=g('l-err');
      const found=getAllUsers().find(x=>x.username.toLowerCase()===u.toLowerCase()&&x.password===p);
      if(found){const sess={name:found.fullName||found.name||found.username,role:found.role||'viewer',depts:found.depts||[]};S.session=sess;sset('session',sess);render();return;}
      if(err){err.style.display='block';err.textContent='Invalid credentials. Please contact your administrator.';}
    };
    loginBtn.onclick=doLogin;
    [g('l-user'),g('l-pass')].forEach(el=>{if(el)el.onkeydown=e=>{if(e.key==='Enter')doLogin();}});
  }
  // Modal triggers
  document.querySelectorAll('[data-modal]').forEach(el=>{
    el.onclick=()=>openModal(el.dataset.modal);
  });
  document.querySelectorAll('[data-new-obs]').forEach(el=>{
    el.onclick=()=>openModal('obs',{tid:el.dataset.newObs});
  });
  // Close modal
  document.querySelectorAll('[data-close-modal]').forEach(el=>{
    el.onclick=()=>{S.modal=null;render()};
  });
  const ov=g('modal-overlay');
  if(ov)ov.onclick=e=>{if(e.target===ov){S.modal=null;render()}};

  // Care protocol tabs
  document.querySelectorAll('[data-care-tab]').forEach(el=>{
    el.onclick=()=>{S.careTab=el.dataset.careTab;S.modal=renderModal('care');render()};
  });
  // Tabs
  document.querySelectorAll('[data-fw-tab]').forEach(el=>{
    el.onclick=()=>{S.fwTab=el.dataset.fwTab;render()};
  });
  document.querySelectorAll('[data-imp-tab]').forEach(el=>{
    el.onclick=()=>{S.impTab=el.dataset.impTab;render()};
  });
  document.querySelectorAll('[data-prog-mode]').forEach(el=>{
    el.onclick=()=>{S.progMode=el.dataset.progMode;render()};
  });

  // ── CPD tab (Coaching Triplets / CPD Sessions) ─────────────────────────
  document.querySelectorAll('[data-cpd-tab]').forEach(el=>{
    el.onclick=()=>{S.cpdTab=el.dataset.cpdTab;render();};
  });

  // ── Dashboard 3-row multi-filter ─────────────────────────────────────
  document.querySelectorAll('[data-dash-dept]').forEach(el=>{
    el.onclick=()=>{const d=el.dataset.dashDept;if(d===''){S.dashDepts=[];}else{if(!S.dashDepts)S.dashDepts=[];const i=S.dashDepts.indexOf(d);if(i>=0)S.dashDepts.splice(i,1);else S.dashDepts.push(d);}render();};
  });
  document.querySelectorAll('[data-dash-sect]').forEach(el=>{
    el.onclick=()=>{const s=el.dataset.dashSect;if(s===''){S.dashSects=[];}else{if(!S.dashSects)S.dashSects=[];const i=S.dashSects.indexOf(s);if(i>=0)S.dashSects.splice(i,1);else S.dashSects.push(s);}render();};
  });
  document.querySelectorAll('[data-dash-stage]').forEach(el=>{
    el.onclick=()=>{const s=el.dataset.dashStage;if(s===''){S.dashStages=[];}else{if(!S.dashStages)S.dashStages=[];const i=S.dashStages.indexOf(s);if(i>=0)S.dashStages.splice(i,1);else S.dashStages.push(s);}render();};
  });

  // ── Impact 3-row multi-filter ─────────────────────────────────────────
  document.querySelectorAll('[data-imp-dept]').forEach(el=>{
    el.onclick=()=>{const d=el.dataset.impDept;if(d===''){S.impDepts=[];}else{if(!S.impDepts)S.impDepts=[];const i=S.impDepts.indexOf(d);if(i>=0)S.impDepts.splice(i,1);else S.impDepts.push(d);}render();};
  });
  document.querySelectorAll('[data-imp-sect]').forEach(el=>{
    el.onclick=()=>{const s=el.dataset.impSect;if(s===''){S.impSects=[];}else{if(!S.impSects)S.impSects=[];const i=S.impSects.indexOf(s);if(i>=0)S.impSects.splice(i,1);else S.impSects.push(s);}render();};
  });
  document.querySelectorAll('[data-imp-stage]').forEach(el=>{
    el.onclick=()=>{const s=el.dataset.impStage;if(s===''){S.impStages=[];}else{if(!S.impStages)S.impStages=[];const i=S.impStages.indexOf(s);if(i>=0)S.impStages.splice(i,1);else S.impStages.push(s);}render();};
  });

  // Process audit
  document.querySelectorAll('[data-rate]').forEach(el=>{
    el.onclick=()=>{
      const[id,n]=el.dataset.rate.split('-');
      if(!S.currentRatings)S.currentRatings={};
      S.currentRatings[id]=parseInt(n);
      render();
    };
  });
  // Process audit filter pills
  document.querySelectorAll('[data-proc-dept-pill]').forEach(el=>{
    el.onclick=()=>{S.procDept=(S.procDept===el.dataset.procDeptPill&&el.dataset.procDeptPill!==''?'':el.dataset.procDeptPill);render();};
  });
  document.querySelectorAll('[data-proc-sect-pill]').forEach(el=>{
    el.onclick=()=>{const s=el.dataset.procSectPill;if(s===''){S.procSects=[];}else{if(!S.procSects)S.procSects=[];const i=S.procSects.indexOf(s);if(i>=0)S.procSects.splice(i,1);else S.procSects.push(s);}render();};
  });
  document.querySelectorAll('[data-proc-stage-pill]').forEach(el=>{
    el.onclick=()=>{const s=el.dataset.procStagePill;if(s===''){S.procStages=[];}else{if(!S.procStages)S.procStages=[];const i=S.procStages.indexOf(s);if(i>=0)S.procStages.splice(i,1);else S.procStages.push(s);}render();};
  });

  const submitSnap=document.querySelector('[data-submit-snap]');
  if(submitSnap)submitSnap.onclick=()=>{
    const deptSnaps=S.snapshots.filter(s=>(s.dept||'Whole School')===(S.procDept||'Whole School'));
    if(deptSnaps.length>=3){showToast('Max 3 snapshots for "'+(S.procDept||'Whole School')+'". Delete one first.','error');return;}
    const snap={id:uid(),ratings:{...S.currentRatings||{}},obsCount:scopedObs().length,tripCount:S.triplets.length,lwCount:S.lwalks.length,dept:S.procDept||'Whole School',date:new Date().toISOString()};
    S.snapshots=[...S.snapshots,snap];
    save('snapshots',S.snapshots);
    S.currentRatings={};
    showToast('Snapshot saved ✓');
  };
  document.querySelectorAll('[data-del-snap]').forEach(el=>{
    el.onclick=()=>{
      const id=el.dataset.delSnap;
      S.snapshots=S.snapshots.filter(s=>s.id!==id);
      save('snapshots',S.snapshots);
      sbRemove('process_snapshots',id);
      showToast('Snapshot deleted');
      render();
    };
  });

  // ── Snapshot edit (load ratings back into currentRatings) ─────────────────
  document.querySelectorAll('[data-edit-snap]').forEach(el=>{
    el.onclick=()=>{
      const snap=S.snapshots.find(s=>s.id===el.dataset.editSnap);
      if(snap){
        S.currentRatings={...snap.ratings};
        S.procDept=snap.dept==='Whole School'?'':snap.dept;
        showToast('Snapshot ratings loaded — edit and re-submit');
        render();
      }
    };
  });

  // ── Snapshot print ────────────────────────────────────────────────────────
  document.querySelectorAll('[data-print-snap]').forEach(el=>{
    el.onclick=()=>{
      const snap=S.snapshots.find(s=>s.id===el.dataset.printSnap);
      if(snap)printSnapshot(snap);
    };
  });

  // Mechanism toggles
  document.querySelectorAll('[data-toggle-mech]').forEach(el=>{
    el.onclick=()=>{
      const id=parseInt(el.dataset.toggleMech);
      S.mechM[id]=!mechActive(id);
      save('mechM',S.mechM);
      render();
    };
  });
  document.querySelectorAll('[data-toggle-dh]').forEach(el=>{
    el.onclick=()=>{
      const id=parseInt(el.dataset.toggleDh);
      S.dhM[id]=S.dhM[id]===undefined?false:!S.dhM[id];
      save('dhM',S.dhM);
      render();
    };
  });

  // Schedule status inline
  document.querySelectorAll('[data-status-sched]').forEach(el=>{
    el.onchange=()=>{
      const id=el.dataset.statusSched;
      const row=S.schedule.find(r=>r.id===id);
      if(row){row.status=el.value;save('sched',S.schedule);showToast('Status updated ✓');}
    };
  });

  // ── Observation (Fieldwork) 3-row dept/section/stage filter ──────────────
  document.querySelectorAll('[data-fw-dept]').forEach(el=>{
    el.onclick=()=>{const d=el.dataset.fwDept;if(d===''){S.fwDepts=[];}else{if(!S.fwDepts)S.fwDepts=[];const i=S.fwDepts.indexOf(d);if(i>=0)S.fwDepts.splice(i,1);else S.fwDepts.push(d);}render();};
  });
  document.querySelectorAll('[data-fw-sect]').forEach(el=>{
    el.onclick=()=>{const s=el.dataset.fwSect;if(s===''){S.fwSects=[];}else{if(!S.fwSects)S.fwSects=[];const i=S.fwSects.indexOf(s);if(i>=0)S.fwSects.splice(i,1);else S.fwSects.push(s);}render();};
  });
  document.querySelectorAll('[data-fw-stage]').forEach(el=>{
    el.onclick=()=>{const s=el.dataset.fwStage;if(s===''){S.fwStages=[];}else{if(!S.fwStages)S.fwStages=[];const i=S.fwStages.indexOf(s);if(i>=0)S.fwStages.splice(i,1);else S.fwStages.push(s);}render();};
  });

  // ── Obs teacher datalist sync ─────────────────────────────────────────────
  const obsTidSearch=document.getElementById('obs-tid-search');
  if(obsTidSearch){
    const syncObsTid=()=>{
      const val=obsTidSearch.value.trim();
      if(!val){document.getElementById('obs-tid').value='';return;}
      const match=scopedTeachers().find(t=>(t.name+' ('+t.dept+')'===val)||t.name===val);
      document.getElementById('obs-tid').value=match?match.id:'';
    };
    obsTidSearch.oninput=syncObsTid;
    obsTidSearch.onchange=syncObsTid;
  }

  // Score buttons in obs modal
  const scoreState={};
  document.querySelectorAll('[data-score]').forEach(el=>{
    el.onclick=()=>{
      const[domId,criIdx,val]=el.dataset.score.split('-');
      if(!scoreState[domId])scoreState[domId]=[];
      scoreState[domId][parseInt(criIdx)]=parseInt(val);
      // Update button styling
      document.querySelectorAll('[data-score]').forEach(btn=>{
        const[d,c,v]=btn.dataset.score.split('-');
        if(d===domId&&c===criIdx){
          const active=parseInt(v)===parseInt(val);
          btn.style.background=active?'var(--navy)':'var(--white)';
          btn.style.color=active?'#fff':'inherit';
          btn.style.borderColor=active?'var(--navy)':'var(--border)';
        }
      });
      el._scoreState=scoreState;
    };
  });

  // SAVES
  const saveObs=document.querySelector('[data-save-obs]');
  if(saveObs)saveObs.onclick=()=>{
    const tid=gv('obs-tid');
    const{bio,customTech}=getTechFromForm('obs-tech','obs-custom-tech');
    const scoreState={};
    document.querySelectorAll('[data-score]').forEach(btn=>{
      const[d,c]=btn.dataset.score.split('-');
      if(btn.style.background==='var(--navy)'||btn.style.background==='rgb(31, 78, 121)'){
        if(!scoreState[d])scoreState[d]=[];
        scoreState[d][parseInt(c)]=parseInt(btn.dataset.score.split('-')[2]);
      }
    });
    const scores={};
    getDomains().forEach(d=>{
      scores[d.id]=Array.from({length:d.criteria.length},(_,i)=>scoreState[d.id]?scoreState[d.id][i]||0:0);
    });
    const editId=S.editingId?.type==='obs'?S.editingId.id:null;
    const existing=editId?S.observations.find(o=>o.id===editId):{};
    const gradeRaw=gv('obs-grade')||'';
    const obs={
      ...(existing||{}),
      id:editId||uid(),tid:tid||null,date:gv('obs-date'),observer:gv('obs-obs'),
      period:gv('obs-period')||'',gradeClass:gradeRaw==='— Select —'?'':gradeRaw,
      scope:gv('obs-scope'),bio:bio==='— None —'||bio===''?'':bio,customTech:customTech||'',
      scores,conf:parseInt(gv('obs-conf'))||0,
      www:gv('obs-www'),ebi:gv('obs-ebi'),action:gv('obs-action'),
      autoLPs:getLPs(bio,customTech),neasc:[],slLinked:existing?.slLinked||false
    };
    S.observations=editId?S.observations.map(o=>o.id===editId?obs:o):[...S.observations,obs];
    save('obs',S.observations);
    S.modal=null;S.editingId=null;
    showToast(editId?'Observation updated ✓':'Observation saved ✓');
  };

  const saveLW=document.querySelector('[data-save-lw]');
  if(saveLW)saveLW.onclick=()=>{
    const editId=S.editingId?.type==='lw'?S.editingId.id:null;
    const{bio:lwBio,customTech:lwCustomTech}=getTechFromForm('lw-tech','lw-custom-tech');
    const lw={...(editId?S.lwalks.find(l=>l.id===editId):{}),id:editId||uid(),date:gv('lw-date'),observer:gv('lw-obs'),section:gv('lw-sect'),dept:gv('lw-dept'),bio:lwBio,customTech:lwCustomTech||'',strengths:gv('lw-str'),afd:gv('lw-afd'),focusArea:gv('lw-focus')};
    S.lwalks=editId?S.lwalks.map(l=>l.id===editId?lw:l):[...S.lwalks,lw];
    save('lwalks',S.lwalks);
    S.modal=null;S.editingId=null;
    showToast(editId?'Learning walk updated ✓':'Learning walk saved ✓');
  };

  const saveCPD=document.querySelector('[data-save-cpd]');
  if(saveCPD)saveCPD.onclick=()=>{
    const title=gv('cpd-title');
    if(!title.trim()){showToast('Please enter a session title','error');return;}
    const month=gv('cpd-month');
    const aud=gv('cpd-aud');
    const editId=S.editingId?.type==='cpd'?S.editingId.id:null;
    if(!editId&&aud&&aud!=='Whole School'){
      const conflict=S.cpd.find(c=>c.month===month&&c.audience==='Whole School');
      if(conflict&&!confirm('⚠ Conflict: "'+conflict.title+'" (Whole School) is also in '+month+'. Save anyway?'))return;
    }
    const existing=editId?S.cpd.find(c=>c.id===editId):{};
    const{bio:cpdBio,customTech:cpdCustomTech}=getTechFromForm('cpd-tech','cpd-custom-tech');
    const cpd={...(existing||{}),id:editId||uid(),title,date:gv('cpd-date'),facilitator:gv('cpd-fac'),audience:aud,
      type:gv('cpd-type'),delivery:gv('cpd-del'),month,bio:cpdBio,customTech:cpdCustomTech||'',
      before:gv('cpd-bef'),during:gv('cpd-dur'),after:gv('cpd-aft'),status:'active'};
    S.cpd=editId?S.cpd.map(c=>c.id===editId?cpd:c):[...S.cpd,cpd];
    save('cpd',S.cpd);
    if(!editId){
      const newRow={id:uid(),category:'Internal - SDP-Based Training',program:title,facilitator:cpd.facilitator,delivery:cpd.delivery,type:cpd.type,month,venue:'TBC',target:aud,status:'active',cpdId:cpd.id,startDate:cpd.date||'',endDate:''};
      S.schedule=[...S.schedule,newRow];save('sched',S.schedule);
    }
    S.modal=null;S.editingId=null;
    showToast(editId?'CPD session updated ✓':'CPD session saved & linked to schedule ✓');
  };

  const saveTrip=document.querySelector('[data-save-trip]');
  if(saveTrip)saveTrip.onclick=()=>{
    const editId=S.editingId?.type==='trip'?S.editingId.id:null;
    const gid=gv('tr-gid');
    const cycle=parseInt(gv('tr-cycle'))||1;
    if(!editId&&S.triplets.filter(t=>t.gid===gid&&t.cycle===cycle).length>0){
      showToast('Cycle '+cycle+' already exists for this group','error');return;
    }
    const existing=editId?S.triplets.find(t=>t.id===editId):{};
    const{bio:trBio,customTech:trCustomTech}=getTechFromForm('tr-tech','tr-custom-tech');
    const trip={...(existing||{}),id:editId||uid(),gid,name:gv('tr-name'),cycle,status:gv('tr-status'),
      oid:gv('tr-oid'),cid:gv('tr-cid'),fid:gv('tr-fid'),
      bio:trBio,customTech:trCustomTech||'',od:gv('tr-od'),dd:gv('tr-dd'),
      wwwNotes:gv('tr-www'),ebiNotes:gv('tr-ebi'),action:gv('tr-action'),
      slLinked:existing?.slLinked||false};
    S.triplets=editId?S.triplets.map(t=>t.id===editId?trip:t):[...S.triplets,trip];
    save('trips',S.triplets);
    S.modal=null;S.editingId=null;
    showToast(editId?'Coaching triplet updated ✓':'Coaching triplet saved ✓');
  };

  const saveSched=document.querySelector('[data-save-sched]');
  if(saveSched)saveSched.onclick=()=>{
    const prog=gv('sch-prog');
    if(!prog.trim()){showToast('Please enter a programme name','error');return;}
    const editId=S.editingId?.type==='sched'?S.editingId.id:null;
    const existing=editId?S.schedule.find(r=>r.id===editId):null;
    const row={
      ...(existing||{}),
      id:editId||uid(),
      category:gv('sch-cat'),program:prog,facilitator:gv('sch-fac'),
      delivery:gv('sch-del'),type:gv('sch-type'),duration:gv('sch-dur'),
      month:gv('sch-month'),startDate:gv('sch-start'),endDate:gv('sch-end'),
      venue:gv('sch-venue')||existing?.venue||'TBC',
      target:gv('sch-target'),
      status:existing?.status||'planned',
      cpdId:existing?.cpdId||null
    };
    S.schedule=editId?S.schedule.map(r=>r.id===editId?row:r):[...S.schedule,row];
    save('sched',S.schedule);
    S.modal=null;S.editingId=null;
    showToast(editId?'Schedule entry updated ✓':'Schedule entry saved ✓');
  };

  const saveTch=document.querySelector('[data-save-teacher]');
  if(saveTch)saveTch.onclick=()=>{
    const name=gv('tch-name');
    if(!name.trim()){showToast('Please enter a name','error');return;}
    const t={id:uid(),name,dept:gv('tch-dept'),section:gv('tch-sect'),stage:gv('tch-stage'),grades:[],groupId:gv('tch-group')||S.groups[0]?.id};
    S.teachers=[...S.teachers,t];

// ═══ CSV EXPORT ══════════════════════════════════════════════════════════════
function exportCSV(filename, rows){
  if(!rows||!rows.length)return;
  const keys=Object.keys(rows[0]);
  const csv=[keys.join(','),...rows.map(r=>keys.map(k=>{const v=String(r[k]||'').replace(/"/g,'""');return '"'+v+'"';}).join(','))].join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download=filename;
  a.click();
}
